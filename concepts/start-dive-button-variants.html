<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>开始下潜按钮画稿</title>
  <style>
    :root {
      --ink: rgba(46, 40, 43, 0.78);
      --rose: rgba(181, 88, 123, 0.72);
      --rose-soft: rgba(181, 88, 123, 0.16);
      --paper: rgba(255, 252, 249, 0.58);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #fbf5f1;
    }
    .stage {
      position: relative;
      min-height: 100vh;
      padding: 8vh 5vw;
      overflow: hidden;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.08), rgba(255,246,243,0.34)),
        url("watercolor-door-hero-bg-clean-v1.png") center / cover no-repeat;
    }
    .title {
      margin: 0 0 4vh;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.28em;
      color: rgba(46, 40, 43, 0.48);
      text-transform: uppercase;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(170px, 1fr));
      gap: 22px;
      align-items: end;
      min-height: 64vh;
    }
    .sample {
      min-height: 260px;
      display: grid;
      align-content: end;
      justify-items: center;
      gap: 22px;
    }
    .label {
      font-size: 13px;
      letter-spacing: 0.16em;
      color: rgba(137, 80, 98, 0.72);
    }
    button {
      position: relative;
      border: 0;
      cursor: pointer;
      color: var(--ink);
      font: inherit;
      letter-spacing: 0.12em;
      background: transparent;
    }
    button span { position: relative; z-index: 1; }
    .down { letter-spacing: 0; }

    .v1 {
      padding: 16px 26px;
      border-radius: 999px;
      background:
        radial-gradient(ellipse at 64% 18%, rgba(255,255,255,.88), transparent 48%),
        rgba(255, 250, 248, 0.5);
      box-shadow:
        0 14px 32px rgba(130, 78, 92, 0.08),
        inset 0 0 0 1px rgba(181, 88, 123, 0.13);
      backdrop-filter: blur(10px);
    }
    .v1 .down {
      display: inline-grid;
      width: 26px;
      height: 26px;
      margin-left: 10px;
      place-items: center;
      border-radius: 50%;
      background: rgba(255,255,255,.54);
      color: rgba(181, 88, 123, 0.75);
    }

    .v2 {
      padding: 12px 22px 18px;
      color: rgba(55, 48, 50, 0.74);
    }
    .v2::before,
    .v2::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 190px;
      height: 40px;
      border-radius: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }
    .v2::before {
      background: radial-gradient(ellipse, rgba(255,255,255,.52), transparent 54%);
    }
    .v2::after {
      border-top: 1px solid rgba(181, 88, 123, 0.22);
      border-bottom: 1px solid rgba(181, 88, 123, 0.08);
      opacity: .7;
    }
    .v2 .down { margin-left: 8px; color: rgba(181, 88, 123, 0.7); }

    .v3 {
      padding: 13px 18px 13px 24px;
      border-radius: 8px 999px 999px 8px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.68), rgba(255,243,243,.38)),
        rgba(255, 252, 250, 0.38);
      box-shadow:
        -8px 10px 24px rgba(126, 75, 90, 0.06),
        inset 2px 0 0 rgba(181, 88, 123, 0.52),
        inset 0 0 0 1px rgba(181, 88, 123, 0.1);
      backdrop-filter: blur(8px);
    }
    .v3 .down {
      display: inline-block;
      margin-left: 12px;
      color: var(--rose);
    }

    .v4 {
      padding: 0 0 12px;
      color: rgba(45, 39, 42, 0.76);
      text-shadow: 0 1px 0 rgba(255,255,255,.82);
    }
    .v4::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 128%;
      height: 9px;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at center, rgba(181, 88, 123, 0.2), transparent 66%);
      transform: translateX(-50%);
      filter: blur(2px);
    }
    .v4 .down { margin-left: 9px; color: rgba(181, 88, 123, 0.72); }

    .v5 {
      min-width: 130px;
      padding: 14px 18px;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.64), rgba(255,246,245,.3));
      box-shadow:
        inset 0 0 0 1px rgba(181, 88, 123, 0.13),
        inset 0 -9px 16px rgba(181, 88, 123, 0.05);
    }
    .v5::before {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: inherit;
      border: 1px dashed rgba(181, 88, 123, 0.18);
      opacity: .72;
    }
    .v5 .down {
      display: block;
      margin-top: 5px;
      color: rgba(181, 88, 123, 0.62);
    }

    @media (max-width: 980px) {
      .stage { padding: 48px 22px; }
      .grid { grid-template-columns: 1fr; min-height: auto; }
      .sample { min-height: 180px; }
    }
  </style>
</head>
<body>
  <main class="stage">
    <h1 class="title">Start Dive Button Variants</h1>
    <section class="grid" aria-label="开始下潜按钮候选">
      <div class="sample">
        <button class="v1" type="button"><span>开始下潜</span><span class="down">↓</span></button>
        <div class="label">01 雾面胶囊</div>
      </div>
      <div class="sample">
        <button class="v2" type="button"><span>开始下潜</span><span class="down">↓</span></button>
        <div class="label">02 水面细纹</div>
      </div>
      <div class="sample">
        <button class="v3" type="button"><span>开始下潜</span><span class="down">↓</span></button>
        <div class="label">03 书签侧线</div>
      </div>
      <div class="sample">
        <button class="v4" type="button"><span>开始下潜</span><span class="down">↓</span></button>
        <div class="label">04 极简水痕</div>
      </div>
      <div class="sample">
        <button class="v5" type="button"><span>开始下潜</span><span class="down">↓</span></button>
        <div class="label">05 虚线贝母</div>
      </div>
    </section>
  </main>
</body>
</html>
