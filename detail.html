<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>详情</title>
<script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="guides/shared.css">
<style>
/* ---- Page-specific variables ---- */
:root {
  --search-bg: rgba(255,255,255,0.06);
  --search-border: rgba(255,255,255,0.1);
  --link-item-hover: rgba(255,255,255,0.05);
  --accent-1: rgba(120,140,255,0.28);
}

[data-theme="light"] {
  --search-bg: rgba(0,0,0,0.03);
  --search-border: rgba(0,0,0,0.08);
  --link-item-hover: rgba(0,0,0,0.04);
  --accent-1: rgba(251,114,153,0.22);
}

/* ---- Override shared blob sizes ---- */
.bg-decor { overflow: visible; }
.blob { filter: blur(120px); opacity: 0.45; }
.blob-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(80,100,220,0.5), transparent); top: -200px; left: -150px; }
.blob-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(140,80,200,0.4), transparent); top: 50%; right: -200px; bottom: auto; transform: translateY(-50%); }
.blob-3 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(60,180,160,0.35), transparent); bottom: -150px; left: 30%; top: auto; }
[data-theme="light"] .blob { opacity: 0.35; }
[data-theme="light"] .blob-1 { background: radial-gradient(circle, rgba(251,130,160,0.42), transparent); }
[data-theme="light"] .blob-2 { background: radial-gradient(circle, rgba(220,150,200,0.36), transparent); }
[data-theme="light"] .blob-3 { background: radial-gradient(circle, rgba(255,180,140,0.32), transparent); }

/* ---- Layout ---- */
.app { max-width: 800px; }

/* ---- Back Link ---- */
.back-link {
  display: inline-flex; align-items: center; gap: 4px;
  color: var(--text-tertiary); text-decoration: none;
  font-size: 0.82rem;
  transition: color 0.2s; flex-shrink: 0;
}
.back-link:hover { color: var(--link-color); }

/* ---- Detail Top Row ---- */
.detail-top {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; margin-bottom: 20px;
}
.detail-search {
  position: relative; width: 260px; flex-shrink: 0;
}
.detail-search input {
  width: 100%; padding: 8px 32px 8px 12px;
  background: var(--search-bg); border: 1px solid var(--search-border);
  border-radius: 10px; color: var(--text); font-size: 0.8rem;
  outline: none; transition: all 0.2s;
}
.detail-search input::placeholder { color: var(--text-tertiary); }
.detail-search input:focus { border-color: rgba(140,150,255,0.35); background: rgba(255,255,255,0.08); }
.detail-search .search-icon {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  color: var(--link-color); display: flex; align-items: center; pointer-events: none;
}
.link-item.hidden, .detail-subcat-header.hidden { display: none; }

.detail-subcat-header {
  font-size: 0.78rem; font-weight: 600;
  color: var(--text-secondary); letter-spacing: 0.04em;
  padding: 16px 12px 6px; display: flex; align-items: center; gap: 6px;
}
.detail-subcat-header:first-child { padding-top: 4px; }
.detail-subcat-count {
  font-size: 0.62rem; font-weight: 500; color: var(--text-tertiary);
  background: var(--search-bg); border-radius: 8px; padding: 1px 7px;
}

/* ---- Sidebar Layout ---- */
.detail-layout { display: flex; gap: 16px; align-items: flex-start; }
.detail-sidebar {
  width: 120px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 2px;
  padding-top: 4px; position: sticky; top: 20px;
}
.dt-tab {
  display: block; width: 100%; padding: 7px 12px;
  font-size: 0.72rem; color: var(--text-secondary);
  background: none; border: none; border-radius: 8px;
  text-align: left; font-family: inherit;
  transition: all 0.15s;
}
.dt-tab:hover { background: var(--link-item-hover); color: var(--text); }
.dt-tab.active { background: var(--accent-1); color: var(--text); font-weight: 600; }
.detail-content { flex: 1; min-width: 0; }

.link-item.filtered, .detail-subcat-header.filtered { display: none; }

/* ---- Page Header ---- */
.page-header {
  margin-bottom: 28px;
}
.page-title {
  font-size: 1.5rem; font-weight: 700; color: var(--text);
  letter-spacing: -0.02em; margin-bottom: 4px;
}
.page-title .breadcrumb {
  font-weight: 400; color: var(--text-tertiary); font-size: 0.8em;
}
.page-meta {
  font-size: 0.8rem; color: var(--text-tertiary);
}

/* ---- Link List Card ---- */
.link-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 14px 20px;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow: 0 4px 24px var(--card-shadow);
}
.link-card .card-inner { position: relative; z-index: 1; }

.link-item {
  display: flex; align-items: baseline; gap: 10px;
  padding: 10px 12px; border-radius: 10px;
  text-decoration: none; color: var(--text);
  transition: all 0.15s;
  margin: 0 -8px;
}
.link-item:hover { background: var(--link-item-hover); }
.link-num {
  font-size: 0.68rem; color: var(--text-tertiary); min-width: 18px;
  flex-shrink: 0;
}
.link-title {
  font-size: 0.9rem; font-weight: 500; color: var(--link-color);
  white-space: nowrap; flex-shrink: 0;
  transition: color 0.15s;
}
.link-item:hover .link-title { color: var(--link-hover); }
.link-desc {
  font-size: 0.8rem; color: var(--text-secondary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.link-arrow {
  margin-left: auto; font-size: 0.72rem; color: var(--text-tertiary);
  flex-shrink: 0; transition: transform 0.2s;
}
.link-item:hover .link-arrow { transform: translateX(3px); color: var(--link-hover); }

/* ---- Footer ---- */
.footer { text-align: center; margin-top: 48px; }
.footer span { font-size: 0.72rem; color: var(--text-tertiary); opacity: 0.6; }

/* ---- Responsive ---- */
@media (max-width: 600px) {
  .app { padding: 24px 14px 40px; }
  .link-item { flex-wrap: wrap; gap: 4px; }
  .link-desc { width: 100%; margin-left: 28px; }
  .detail-layout { flex-direction: column; }
  .detail-sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding-bottom: 4px; position: static; }
  .dt-tab { white-space: nowrap; width: auto; flex-shrink: 0; }
}
</style>
</head>
<body>

<div class="float-wrapper" id="floatWrapper">
  <div class="float-stack open" id="floatStack">
    <div class="bookmark-strip">
      <div class="bookmark-tab" id="floatHandle" title="展开工具栏" aria-label="展开工具栏"></div>
      <div class="bookmark-buttons">
        <button class="theme-toggle" id="themeToggle" title="切换主题" aria-label="切换日夜间模式"></button>
        <a href="index.html" class="float-btn" title="返回导航">⌂</a>
        <button class="float-btn" id="backToTop" title="回到顶部">↑</button>
      </div>
    </div>
  </div>
  <div class="float-w"></div>
</div>
<div class="toc-popup" id="tocPopup"></div>

<div class="bg-decor"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

<div class="app">
  <div class="detail-top">
    <a class="back-link" href="index.html">← 返回导航</a>
    <div class="detail-search">
      <input type="text" id="detailSearch" placeholder="搜索...">
      <span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></span>
    </div>
  </div>
  <div class="page-header">
    <div class="page-title" id="pageTitle"></div>
    <div class="page-meta" id="pageMeta"></div>
  </div>
  <div class="detail-layout" id="detailLayout">
    <div class="detail-sidebar" id="detailSidebar"></div>
    <div class="detail-content">
      <div class="link-card">
        <div class="card-inner" id="linkList"></div>
      </div>
    </div>
  </div>
  <footer class="footer"><span>🌱 持续更新中</span></footer>
</div>

<script src="data.js"></script>
<script src="guides/shared.js"></script>
<script>
(function() {
  // ========== Find category ==========
  const page = new URLSearchParams(window.location.search).get('page');
  let subcat = null;
  let block = null;
  let parentBlock = null;
  let parentName = '';
  let subcatIdx = -1;
  SITE_DATA.blocks.forEach(function(b) {
    if (b.page === page) { block = b; parentBlock = b; }
    if (b.subcategories) {
      b.subcategories.forEach(function(s, idx) {
        if (s.page === page) { subcat = s; parentName = b.name; parentBlock = b; subcatIdx = idx; }
      });
    }
  });

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderLinkItem(link, i, subIdx) {
    return '<a href="' + esc(link.url) + '" class="link-item" target="_blank" rel="noopener" data-subcat="' + subIdx + '">' +
      '<span class="link-num">' + (i + 1).toString().padStart(2, '0') + '</span>' +
      '<span class="link-title">' + esc(link.title) + '</span>' +
      (link.desc ? '<span class="link-desc">' + esc(link.desc) + '</span>' : '') +
      '<span class="link-arrow">→</span></a>';
  }

  if (subcat) {
    document.title = parentName + ' / ' + subcat.name + ' - My Nav';
    document.getElementById('pageTitle').innerHTML = '<span class="breadcrumb">' + esc(parentName) + ' / </span>' + esc(subcat.name);
  } else if (block && block.subcategories) {
    document.title = block.name + ' - My Nav';
    document.getElementById('pageTitle').innerHTML = esc(block.name);
  } else if (!block && !subcat) {
    document.getElementById('pageTitle').textContent = '未找到';
    document.getElementById('pageMeta').textContent = '请从导航页进入';
  }

  if (parentBlock && parentBlock.subcategories) {
    let total = 0;
    parentBlock.subcategories.forEach(function(s) { total += s.links.length; });
    document.getElementById('pageMeta').textContent = parentBlock.subcategories.length + ' 个分类 · 共 ' + total + ' 篇';
    let html = '';
    parentBlock.subcategories.forEach(function(sub, si) {
      html += '<div class="detail-subcat-header" data-subcat="' + si + '">' + esc(sub.name) + '<span class="detail-subcat-count">' + sub.links.length + '</span></div>';
      sub.links.forEach(function(link, i) { html += renderLinkItem(link, i, si); });
    });
    document.getElementById('linkList').innerHTML = html;
  }

  // ========== Sidebar ==========
  const sidebar = document.getElementById('detailSidebar');
  const layout = document.getElementById('detailLayout');
  if (parentBlock && parentBlock.subcategories && parentBlock.subcategories.length > 0) {
    layout.style.display = '';
    let tabs = '<button class="dt-tab' + (subcat ? '' : ' active') + '" data-filter="all">全部</button>';
    parentBlock.subcategories.forEach(function(s, i) {
      tabs += '<button class="dt-tab' + (i === subcatIdx ? ' active' : '') + '" data-filter="' + i + '">' + esc(s.name) + '</button>';
    });
    sidebar.innerHTML = tabs;
    if (subcat) filterBySubcat(subcatIdx);
  } else {
    layout.style.display = '';
  }

  function filterBySubcat(idx) {
    const items = document.querySelectorAll('#linkList .link-item');
    const headers = document.querySelectorAll('#linkList .detail-subcat-header');
    items.forEach(function(item) {
      if (item.getAttribute('data-subcat') === String(idx)) {
        item.classList.remove('filtered');
      } else {
        item.classList.add('filtered');
      }
    });
    headers.forEach(function(h) {
      if (h.getAttribute('data-subcat') === String(idx)) {
        h.classList.remove('filtered');
      } else {
        h.classList.add('filtered');
      }
    });
  }

  function showAll() {
    document.querySelectorAll('#linkList .link-item, #linkList .detail-subcat-header').forEach(function(el) {
      el.classList.remove('filtered');
    });
  }

  sidebar.addEventListener('click', function(e) {
    const tab = e.target.closest('.dt-tab');
    if (!tab) return;
    sidebar.querySelectorAll('.dt-tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    const filter = tab.getAttribute('data-filter');
    if (filter === 'all') {
      showAll();
    } else {
      filterBySubcat(parseInt(filter, 10));
    }
  });

  // ========== Search ==========
  const searchInput = document.getElementById('detailSearch');
  searchInput.addEventListener('input', function() {
    const q = searchInput.value.trim().toLowerCase();
    const items = document.querySelectorAll('#linkList .link-item');
    items.forEach(function(item) {
      if (!q || item.textContent.toLowerCase().indexOf(q) !== -1) {
        item.classList.remove('hidden');
      } else {
        item.classList.add('hidden');
      }
    });
    document.querySelectorAll('#linkList .detail-subcat-header').forEach(function(h) {
      let vis = false;
      let el = h.nextElementSibling;
      while (el && !el.classList.contains('detail-subcat-header')) {
        if (!el.classList.contains('hidden') && !el.classList.contains('filtered')) { vis = true; break; }
        el = el.nextElementSibling;
      }
      h.classList.toggle('hidden', !vis && q);
    });
  });
})();
</script>
</body>
</html>
