<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f8eeef">
<title>详情</title>
<script>
(function () {
  var saved = localStorage.getItem('theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
})();
</script>
<link rel="stylesheet" href="guides/shared.css">
<style>
@import url("https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap");

:root {
  --detail-bg: #fbf4f2;
  --detail-surface: rgba(255, 253, 251, 0.76);
  --detail-surface-strong: rgba(255, 253, 251, 0.92);
  --detail-ink: #30292b;
  --detail-muted: #71666a;
  --detail-faint: #a19396;
  --detail-accent: #b85f78;
  --detail-accent-soft: rgba(184, 95, 120, 0.1);
  --detail-line: rgba(76, 60, 64, 0.12);
  --detail-shadow: 0 22px 70px rgba(104, 65, 78, 0.09);
  --rail-width: 62px;
}

[data-theme="dark"] {
  --detail-bg: #151720;
  --detail-surface: rgba(27, 29, 39, 0.72);
  --detail-surface-strong: rgba(31, 33, 44, 0.92);
  --detail-ink: #eeeef4;
  --detail-muted: #aaa9b8;
  --detail-faint: #777685;
  --detail-accent: #aebdff;
  --detail-accent-soft: rgba(174, 189, 255, 0.11);
  --detail-line: rgba(226, 226, 238, 0.12);
  --detail-shadow: 0 24px 76px rgba(0, 0, 0, 0.28);
}

html { scroll-behavior: smooth; }
body {
  min-height: 100vh;
  background:
    url("concepts/water-underlay-repeat-v1.png"),
    radial-gradient(ellipse at 12% 8%, rgba(239, 196, 207, 0.24), transparent 30%),
    radial-gradient(ellipse at 92% 18%, rgba(244, 210, 205, 0.2), transparent 26%),
    linear-gradient(to bottom, #f8eeef 0%, #fbf1ee 42%, #fffaf7 100%);
  background-size: min(1080px, 125vw) auto, 100% 100%, 100% 100%, 100% 100%;
  background-blend-mode: soft-light, normal, normal, normal;
  color: var(--detail-ink);
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  overflow-x: hidden;
}
[data-theme="dark"] body {
  background:
    radial-gradient(ellipse at 74% 22%, rgba(92, 109, 169, 0.12), transparent 32%),
    linear-gradient(to bottom, #171821 0%, #151720 58%, #171821 100%);
}
button, input { font: inherit; }

.detail-rail {
  position: fixed;
  inset: 0 auto 0 0;
  z-index: 30;
  width: var(--rail-width);
  padding: 16px 7px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 9px;
}
.rail-spacer { flex: 1; }
.rail-button {
  position: relative;
  width: 48px;
  height: 48px;
  padding: 0;
  border: 0;
  border-radius: 14px;
  color: var(--detail-accent);
  background: transparent;
  display: grid;
  place-items: center;
  text-decoration: none;
  transition: background 0.18s ease, transform 0.18s ease;
}
.rail-button:hover,
.rail-button:focus-visible {
  background: var(--detail-accent-soft);
  outline: none;
}
.rail-button:active { transform: scale(0.94); }
.rail-button::after {
  content: attr(data-tooltip);
  position: absolute;
  left: calc(100% + 10px);
  top: 50%;
  z-index: 2;
  padding: 7px 10px;
  border-radius: 8px;
  color: #fff;
  background: rgba(24, 22, 24, 0.92);
  font-size: 0.7rem;
  line-height: 1;
  white-space: nowrap;
  opacity: 0;
  transform: translate(4px, -50%);
  pointer-events: none;
  transition: opacity 0.16s ease, transform 0.16s ease;
}
.rail-button:hover::after,
.rail-button:focus-visible::after {
  opacity: 1;
  transform: translate(0, -50%);
}

.detail-shell {
  position: relative;
  z-index: 1;
  width: min(1120px, calc(100% - 120px));
  margin: 0 auto;
  padding: clamp(34px, 6vw, 70px) 0 72px;
}
.detail-shell::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  opacity: 0.32;
  background:
    radial-gradient(circle at 7% 16%, rgba(255, 255, 255, 0.5) 0 5px, transparent 6px),
    radial-gradient(circle at 86% 22%, rgba(255, 255, 255, 0.34) 0 6px, transparent 7px),
    radial-gradient(circle at 18% 46%, rgba(255, 255, 255, 0.26) 0 9px, transparent 10px);
}

.detail-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: clamp(38px, 5vw, 58px);
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  color: var(--detail-muted);
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  text-decoration: none;
}
.back-link::before {
  content: "";
  width: 36px;
  height: 1px;
  background: var(--detail-accent);
}
.back-link:hover { color: var(--detail-accent); }
.detail-search {
  position: relative;
  width: min(360px, 42vw);
}
.detail-search input {
  width: 100%;
  height: 44px;
  padding: 0 42px 0 16px;
  border: 1px solid var(--detail-line);
  border-radius: 999px;
  outline: none;
  color: var(--detail-ink);
  background: rgba(255, 253, 251, 0.6);
  font-size: 0.82rem;
  transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
}
[data-theme="dark"] .detail-search input { background: rgba(27, 28, 37, 0.62); }
.detail-search input::placeholder { color: var(--detail-faint); }
.detail-search input:focus {
  border-color: color-mix(in srgb, var(--detail-accent) 44%, transparent);
  background: var(--detail-surface-strong);
  box-shadow: 0 0 0 4px var(--detail-accent-soft);
}
.search-icon {
  position: absolute;
  right: 15px;
  top: 50%;
  color: var(--detail-accent);
  display: flex;
  transform: translateY(-50%);
  pointer-events: none;
}

.page-header {
  display: grid;
  grid-template-columns: minmax(0, 1.05fr) minmax(260px, 0.72fr);
  align-items: end;
  gap: 48px;
  margin-bottom: 24px;
}
.page-kicker {
  color: var(--detail-accent);
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.page-title {
  margin-top: 14px;
  color: var(--detail-ink);
  font-family: "Noto Serif SC", "Songti SC", "STSong", "SimSun", serif;
  font-size: clamp(2.35rem, 5vw, 4.7rem);
  font-weight: 400;
  line-height: 1.05;
  letter-spacing: 0;
}
.page-title .breadcrumb {
  display: block;
  margin-bottom: 10px;
  color: var(--detail-faint);
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 0.8rem;
  font-weight: 400;
  letter-spacing: 0.08em;
}
.page-meta {
  max-width: 440px;
  color: var(--detail-muted);
  font-size: 0.84rem;
  line-height: 1.9;
}
.overview {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  margin: 34px 0 18px;
  padding: 14px 0;
  border-top: 1px solid var(--detail-line);
  border-bottom: 1px solid var(--detail-line);
}
.stat-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
.stat-pill,
.category-chip {
  min-height: 34px;
  padding: 8px 13px;
  border: 1px solid var(--detail-line);
  border-radius: 999px;
  color: var(--detail-muted);
  background: rgba(255, 253, 251, 0.42);
  font-size: 0.74rem;
  line-height: 1.2;
}
[data-theme="dark"] .stat-pill,
[data-theme="dark"] .category-chip {
  background: rgba(27, 28, 37, 0.42);
}
.category-strip {
  display: flex;
  justify-content: flex-end;
  flex-wrap: wrap;
  gap: 8px;
}
.category-chip {
  color: var(--detail-ink);
  text-decoration: none;
  transition: border-color 0.18s ease, color 0.18s ease, background 0.18s ease;
}
.category-chip:hover,
.category-chip:focus-visible {
  border-color: color-mix(in srgb, var(--detail-accent) 46%, transparent);
  color: var(--detail-accent);
  background: var(--detail-accent-soft);
  outline: none;
}
.category-strip:empty { display: none; }

.resource-panel {
  position: relative;
  overflow: hidden;
  border: 1px solid var(--detail-line);
  border-radius: 28px;
  background:
    linear-gradient(135deg, rgba(255, 253, 251, 0.9), rgba(255, 253, 251, 0.58)),
    radial-gradient(ellipse at 86% 92%, rgba(224, 158, 178, 0.16), transparent 34%);
  box-shadow: var(--detail-shadow);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}
[data-theme="dark"] .resource-panel {
  background:
    linear-gradient(135deg, rgba(31, 33, 44, 0.9), rgba(27, 28, 38, 0.66)),
    radial-gradient(ellipse at 86% 92%, rgba(122, 144, 220, 0.14), transparent 34%);
}
.resource-panel::before {
  content: "";
  position: absolute;
  right: clamp(20px, 4vw, 48px);
  bottom: clamp(14px, 3vw, 34px);
  width: clamp(88px, 13vw, 150px);
  aspect-ratio: 1.1;
  background: var(--detail-deco, url("concepts/portal-deco-message-bottle.png")) center / contain no-repeat;
  opacity: 0.22;
  pointer-events: none;
}
.card-inner {
  position: relative;
  z-index: 1;
  padding: clamp(18px, 3vw, 32px);
}
.detail-subcat-header {
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 44px;
  padding: 10px 2px 12px;
  color: var(--detail-accent);
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.detail-subcat-header:not(:first-child) {
  margin-top: 18px;
  border-top: 1px solid var(--detail-line);
}
.detail-subcat-header::after {
  content: "";
  width: 28px;
  height: 1px;
  background: color-mix(in srgb, var(--detail-accent) 54%, transparent);
}
.detail-subcat-count {
  color: var(--detail-faint);
  font-size: 0.62rem;
  letter-spacing: 0.08em;
}
.link-list {
  display: grid;
}
.link-item {
  display: grid;
  grid-template-columns: 36px minmax(150px, 0.42fr) minmax(0, 1fr) 34px;
  align-items: center;
  gap: 14px;
  min-height: 58px;
  padding: 9px 8px;
  border-top: 1px solid color-mix(in srgb, var(--detail-line) 72%, transparent);
  color: var(--detail-ink);
  text-decoration: none;
  transition: background 0.18s ease, transform 0.18s ease;
}
.detail-subcat-header + .link-item { border-top: 0; }
.link-item:hover {
  background: rgba(255, 245, 247, 0.52);
  transform: translateX(3px);
}
[data-theme="dark"] .link-item:hover { background: rgba(82, 101, 174, 0.16); }
.link-num {
  color: var(--detail-faint);
  font-size: 0.68rem;
  text-align: right;
}
.link-title {
  color: var(--detail-ink);
  font-family: "Noto Serif SC", "Songti SC", "STSong", "SimSun", serif;
  font-size: 1rem;
  font-weight: 600;
  line-height: 1.45;
}
.link-desc {
  min-width: 0;
  color: var(--detail-muted);
  font-size: 0.8rem;
  line-height: 1.65;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.link-arrow {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  color: var(--detail-faint);
  display: grid;
  place-items: center;
  font-size: 0.82rem;
  transition: color 0.18s ease, background 0.18s ease, transform 0.18s ease;
}
.link-item:hover .link-arrow {
  color: var(--detail-accent);
  background: var(--detail-accent-soft);
  transform: translateX(2px);
}
.link-item.hidden,
.detail-subcat-header.hidden { display: none; }
.empty-state {
  padding: 70px 20px;
  color: var(--detail-muted);
  text-align: center;
  font-size: 0.86rem;
}
.footer {
  margin-top: 42px;
  color: var(--detail-faint);
  font-size: 0.7rem;
  text-align: center;
}

@media (max-width: 850px) {
  .detail-shell {
    width: min(100% - 32px, 760px);
    padding-left: 48px;
  }
  .page-header { grid-template-columns: 1fr; gap: 14px; }
  .overview {
    align-items: flex-start;
    flex-direction: column;
  }
  .category-strip { justify-content: flex-start; }
  .link-item {
    grid-template-columns: 30px minmax(0, 1fr) 32px;
    align-items: start;
    gap: 8px 12px;
    padding: 14px 6px;
  }
  .link-desc {
    grid-column: 2 / 3;
    white-space: normal;
  }
  .link-arrow {
    grid-column: 3;
    grid-row: 1 / span 2;
  }
}

@media (max-width: 560px) {
  :root { --rail-width: 54px; }
  .detail-rail { padding-inline: 5px; }
  .rail-button { width: 42px; height: 42px; }
  .detail-shell {
    width: calc(100% - 18px);
    padding-top: 28px;
    padding-left: 48px;
  }
  .detail-top {
    align-items: stretch;
    flex-direction: column;
    gap: 16px;
  }
  .detail-search { width: 100%; }
  .page-title { font-size: clamp(2rem, 12vw, 3.05rem); }
  .resource-panel { border-radius: 22px; }
  .card-inner { padding: 18px 16px 22px; }
  .resource-panel::before {
    width: 104px;
    right: 12px;
    bottom: 8px;
    opacity: 0.16;
  }
  .detail-subcat-header {
    min-height: 38px;
    padding-top: 6px;
  }
}
</style>
</head>
<body>
<nav class="detail-rail" aria-label="详情页工具">
  <a class="rail-button" href="index.html" aria-label="返回导航" data-tooltip="返回导航">
    <svg width="23" height="23" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2">
      <ellipse cx="11" cy="19" rx="9" ry="7"/>
      <path d="M20 12l7-6v18l-7-4"/>
      <circle cx="7" cy="18" r="1.5" fill="currentColor"/>
    </svg>
  </a>
  <div class="rail-spacer" aria-hidden="true"></div>
  <button class="rail-button" id="themeToggle" type="button" aria-label="切换日夜模式" data-tooltip="切换日夜模式"></button>
  <button class="rail-button" id="backToTop" type="button" aria-label="回到顶部" data-tooltip="回到顶部">↑</button>
</nav>

<main class="detail-shell">
  <div class="detail-top">
    <a class="back-link" href="index.html">返回导航</a>
    <label class="detail-search" aria-label="搜索当前列表">
      <input type="search" id="detailSearch" placeholder="搜索教程、工具或站点...">
      <span class="search-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg></span>
    </label>
  </div>

  <header class="page-header">
    <div>
      <div class="page-kicker">BELOW THE SURFACE</div>
      <h1 class="page-title" id="pageTitle"></h1>
    </div>
    <p class="page-meta" id="pageMeta"></p>
  </header>

  <div class="overview" id="overview">
    <div class="stat-row" id="statRow"></div>
    <nav class="category-strip" id="categoryStrip" aria-label="分类跳转"></nav>
  </div>

  <section class="resource-panel" id="resourcePanel" aria-label="链接列表">
    <div class="card-inner" id="linkList"></div>
  </section>

  <footer class="footer">持续更新中</footer>
</main>

<script src="data.js"></script>
<script src="guides/shared.js"></script>
<script>
(function() {
  const page = new URLSearchParams(window.location.search).get('page');
  let block = null;
  let subcat = null;
  let parentBlock = null;
  let parentName = '';

  SITE_DATA.blocks.forEach(function(b) {
    if (b.page === page) {
      block = b;
      parentBlock = b;
    }
    if (b.subcategories) {
      b.subcategories.forEach(function(s) {
        if (s.page === page) {
          subcat = s;
          parentName = b.name;
          parentBlock = b;
        }
      });
    }
  });

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function slug(str, i) {
    return 'cat-' + i + '-' + String(str || '').replace(/[^\w\u4e00-\u9fa5-]+/g, '-');
  }

  function renderLinkItem(link, i) {
    return '<a href="' + esc(link.url) + '" class="link-item"' + (link.target ? ' target="' + link.target + '" rel="noopener"' : '') + '>' +
      '<span class="link-num">' + (i + 1).toString().padStart(2, '0') + '</span>' +
      '<span class="link-title">' + esc(link.title) + '</span>' +
      (link.desc ? '<span class="link-desc">' + esc(link.desc) + '</span>' : '<span class="link-desc"></span>') +
      '<span class="link-arrow">↗</span></a>';
  }

  function decoForPage(pageId) {
    if (pageId === 'tools') return 'url("concepts/portal-deco-compass.png")';
    if (pageId === 'haoyong') return 'url("concepts/portal-deco-anchor.png")';
    return 'url("concepts/portal-deco-message-bottle.png")';
  }

  const titleEl = document.getElementById('pageTitle');
  const metaEl = document.getElementById('pageMeta');
  const listEl = document.getElementById('linkList');
  const panelEl = document.getElementById('resourcePanel');
  const statRow = document.getElementById('statRow');
  const categoryStrip = document.getElementById('categoryStrip');
  panelEl.style.setProperty('--detail-deco', decoForPage(page));

  if (subcat) {
    document.title = parentName + ' / ' + subcat.name + ' - 芝士的摸鱼站';
    titleEl.innerHTML = '<span class="breadcrumb">' + esc(parentName) + '</span>' + esc(subcat.name);
  } else if (block && block.subcategories) {
    document.title = block.name + ' - 芝士的摸鱼站';
    titleEl.textContent = block.name;
  } else {
    titleEl.textContent = '未找到';
    metaEl.textContent = '请从导航页进入。';
    statRow.innerHTML = '<span class="stat-pill">0 项</span>';
    listEl.innerHTML = '<div class="empty-state">这里暂时没有可显示的内容。</div>';
    return;
  }

  const groups = subcat ? [subcat] : parentBlock.subcategories.filter(function(s) { return s.links.length; });
  const total = groups.reduce(function(sum, s) { return sum + s.links.length; }, 0);
  metaEl.textContent = '延续首页的柔和水彩感，收进更利落的目录。搜索、跳转和打开链接都尽量少一步。';
  statRow.innerHTML = '<span class="stat-pill">' + groups.length + ' 个分类</span><span class="stat-pill">' + total + ' 个入口</span>';

  let chipHtml = '';
  let html = '';
  groups.forEach(function(group, gi) {
    if (!group.links.length) return;
    const id = slug(group.name, gi);
    if (groups.length > 1) chipHtml += '<a class="category-chip" href="#' + esc(id) + '">' + esc(group.name) + '</a>';
    html += '<div class="detail-subcat-header" id="' + esc(id) + '">' + esc(group.name) + '<span class="detail-subcat-count">' + group.links.length + '</span></div>';
    group.links.forEach(function(link, i) {
      html += renderLinkItem(link, i);
    });
  });
  categoryStrip.innerHTML = chipHtml;
  listEl.innerHTML = html || '<div class="empty-state">这个分类还在慢慢补内容。</div>';

  const searchInput = document.getElementById('detailSearch');
  searchInput.addEventListener('input', function() {
    const q = searchInput.value.trim().toLowerCase();
    document.querySelectorAll('#linkList .link-item').forEach(function(item) {
      item.classList.toggle('hidden', !!q && item.textContent.toLowerCase().indexOf(q) === -1);
    });
    document.querySelectorAll('#linkList .detail-subcat-header').forEach(function(header) {
      let visible = false;
      let el = header.nextElementSibling;
      while (el && !el.classList.contains('detail-subcat-header')) {
        if (!el.classList.contains('hidden')) {
          visible = true;
          break;
        }
        el = el.nextElementSibling;
      }
      header.classList.toggle('hidden', !!q && !visible);
    });
  });
})();
</script>
</body>
</html>
