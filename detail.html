<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f8eeef">
<title>详情</title>
<script>
(function () {
  var saved = localStorage.getItem('theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
})();
</script>
<link rel="stylesheet" href="guides/shared.css">
<style>
:root {
  --detail-accent: #d45b86;
  --detail-accent-strong: #e06f98;
  --detail-accent-rgb: 212, 91, 134;
  --detail-page-bg:
    radial-gradient(ellipse at 94% 14%, rgba(var(--detail-accent-rgb), 0.07), transparent 32%),
    radial-gradient(ellipse at 10% 6%, rgba(var(--detail-accent-rgb), 0.045), transparent 30%),
    linear-gradient(180deg, #fbf5f6 0%, #fbf6f4 34%, #f5f6f8 64%, #f5f5f5 100%);
  --detail-surface: #ffffff;
  --detail-surface-strong: #fbfbfc;
  --detail-ink: #15161c;
  --detail-muted: #242630;
  --detail-faint: #686b74;
  --detail-line: #dde1e8;
  --detail-line-soft: #eceef3;
}

[data-theme="dark"] {
  --detail-page-bg:
    radial-gradient(ellipse at 80% 10%, rgba(var(--detail-accent-rgb), 0.14), transparent 34%),
    linear-gradient(180deg, #191a22 0%, #171820 58%, #181922 100%);
  --detail-surface: rgba(24, 24, 32, 0.82);
  --detail-surface-strong: rgba(255, 255, 255, 0.045);
  --detail-ink: #f1f2f6;
  --detail-muted: #c4c7d0;
  --detail-faint: #8d909a;
  --detail-line: rgba(var(--detail-accent-rgb), 0.28);
  --detail-line-soft: rgba(255, 255, 255, 0.08);
}

html { scroll-behavior: smooth; }
body {
  min-height: 100vh;
  background: var(--detail-page-bg);
  color: var(--detail-ink);
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  overflow-x: hidden;
}
button, input { font: inherit; }

.rail-button {
  position: relative;
  width: 38px;
  height: 38px;
  padding: 0;
  border: 1px solid var(--detail-line);
  border-radius: 3px;
  color: var(--detail-accent);
  background: var(--detail-surface);
  display: grid;
  place-items: center;
  text-decoration: none;
  transition: background 0.18s ease, transform 0.18s ease;
}
.rail-button:hover,
.rail-button:focus-visible {
  background: var(--detail-accent-soft);
  outline: none;
}
.rail-button:active { transform: scale(0.94); }
.rail-button::after {
  display: none;
}

.detail-shell {
  position: relative;
  z-index: 1;
  width: min(1280px, calc(100% - 32px));
  margin: 0 auto;
  padding: 18px 0 40px;
}

.detail-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 18px;
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-height: 38px;
  padding: 0 12px;
  border: 1px solid var(--detail-line);
  border-radius: 3px;
  color: var(--detail-faint);
  background: var(--detail-surface);
  font-size: 0.78rem;
  text-decoration: none;
}
.back-link::before {
  content: "←";
  color: var(--detail-accent);
}
.back-link:hover { color: var(--detail-accent); }
.top-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}
#backToTop { display: grid; }
.detail-search {
  position: relative;
  width: min(340px, 38vw);
}
.detail-search input {
  width: 100%;
  height: 38px;
  padding: 0 44px 0 18px;
  border: 1px solid var(--detail-line);
  border-radius: 3px;
  outline: none;
  color: var(--detail-ink);
  background: var(--detail-surface);
  font-size: 0.82rem;
  transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
}
[data-theme="dark"] .detail-search input { background: rgba(27, 28, 37, 0.62); }
.detail-search input::placeholder { color: var(--detail-faint); }
.detail-search input:focus {
  border-color: rgba(var(--detail-accent-rgb), 0.42);
  background: var(--detail-surface-strong);
  box-shadow: 0 0 0 3px rgba(var(--detail-accent-rgb), 0.08);
}
.search-icon {
  position: absolute;
  right: 15px;
  top: 50%;
  color: var(--detail-accent);
  display: flex;
  transform: translateY(-50%);
  pointer-events: none;
}

.page-header {
  display: block;
  align-items: center;
  margin-bottom: 10px;
  padding: 14px 16px;
  border: 1px solid var(--detail-line);
  border-radius: 3px;
  background: var(--detail-surface);
  box-shadow: 0 2px 8px rgba(40, 46, 56, 0.035);
}
.page-kicker {
  color: var(--detail-faint);
  font-size: 0.76rem;
  line-height: 1.4;
}
.page-title {
  margin-top: 4px;
  color: var(--detail-ink);
  font-size: clamp(1.55rem, 2.4vw, 2.15rem);
  font-weight: 750;
  line-height: 1.08;
  letter-spacing: 0;
}
.page-title .breadcrumb {
  display: block;
  margin-bottom: 4px;
  color: var(--detail-faint);
  font-size: 0.78rem;
  font-weight: 400;
}
.resource-panel {
  position: relative;
  border: 0;
  background: transparent;
  box-shadow: none;
}
.resource-panel::before {
  display: none;
}
.card-inner {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 8px;
  padding: 0;
}
.detail-subcat-header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  min-height: 34px;
  margin-top: 8px;
  padding: 8px 2px 3px;
  border-bottom: 1px solid var(--detail-line);
  color: var(--detail-accent);
  font-size: 0.86rem;
  font-weight: 600;
}
.detail-subcat-header:not(:first-child) {
  margin-top: 10px;
  border-top: 0;
}
.detail-subcat-header::after {
  display: none;
}
.detail-subcat-count {
  color: var(--detail-accent);
  font-size: 0.86rem;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}
.link-list {
  display: grid;
}
.link-item {
  display: grid;
  grid-template-columns: 24px minmax(0, 1fr);
  align-items: start;
  gap: 4px 8px;
  min-height: 66px;
  padding: 9px 10px;
  border: 1px solid var(--detail-line-soft);
  border-radius: 3px;
  background: var(--detail-surface);
  color: var(--detail-ink);
  text-decoration: none;
  transition: border-color 0.18s ease, background 0.18s ease;
}
.link-item:hover {
  border-color: rgba(var(--detail-accent-rgb), 0.32);
  background: rgba(var(--detail-accent-rgb), 0.07);
}
[data-theme="dark"] .link-item:hover { background: rgba(82, 101, 174, 0.16); }
.link-num {
  color: var(--detail-faint);
  font-size: 0.68rem;
  text-align: right;
  font-variant-numeric: tabular-nums;
  line-height: 1.65;
}
.link-title {
  color: var(--detail-ink);
  font-size: 0.92rem;
  font-weight: 700;
  line-height: 1.35;
}
.link-desc {
  grid-column: 2 / 3;
  min-width: 0;
  color: var(--detail-muted);
  font-size: 0.74rem;
  line-height: 1.35;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.link-item.hidden,
.detail-subcat-header.hidden { display: none; }
.empty-state {
  padding: 70px 20px;
  color: var(--detail-muted);
  text-align: center;
  font-size: 1rem;
}
.footer {
  margin-top: 24px;
  color: var(--detail-faint);
  font-size: 0.82rem;
  text-align: center;
}

@media (max-width: 850px) {
  .detail-shell {
    width: min(100% - 24px, 760px);
  }
  .link-item {
    grid-template-columns: 24px minmax(0, 1fr);
    align-items: start;
    gap: 4px 8px;
    padding: 9px 10px;
  }
  .link-desc {
    grid-column: 2 / 3;
    white-space: normal;
  }
}

@media (max-width: 560px) {
  .rail-button { width: 42px; height: 42px; }
  .detail-shell {
    width: calc(100% - 18px);
    padding-top: 12px;
  }
  .detail-top {
    align-items: stretch;
    flex-direction: column;
    gap: 16px;
  }
  .detail-search { width: 100%; }
  .top-actions { justify-content: space-between; width: 100%; }
  .top-actions .detail-search { flex: 1; min-width: 0; }
  .page-title { font-size: clamp(1.45rem, 8vw, 2rem); }
  .card-inner { padding: 0; }
  .detail-subcat-header {
    min-height: 38px;
    padding-top: 6px;
  }
}
</style>
</head>
<body>
<main class="detail-shell">
  <div class="detail-top">
    <a class="back-link" href="index.html">返回导航</a>
    <div class="top-actions">
      <label class="detail-search" aria-label="搜索当前列表">
        <input type="search" id="detailSearch" placeholder="搜索当前目录...">
        <span class="search-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg></span>
      </label>
      <button class="rail-button" id="themeToggle" type="button" aria-label="切换日夜模式"></button>
      <button class="rail-button" id="backToTop" type="button" aria-label="回到顶部">↑</button>
    </div>
  </div>

  <header class="page-header">
    <div>
      <div class="page-kicker">目录</div>
      <h1 class="page-title" id="pageTitle"></h1>
    </div>
  </header>

  <section class="resource-panel" id="resourcePanel" aria-label="链接列表">
    <div class="card-inner" id="linkList"></div>
  </section>

  <footer class="footer">持续更新中</footer>
</main>

<script src="data.js"></script>
<script src="guides/shared.js"></script>
<script>
(function() {
  const page = new URLSearchParams(window.location.search).get('page');
  let block = null;
  let subcat = null;
  let parentBlock = null;
  let parentName = '';

  SITE_DATA.blocks.forEach(function(b) {
    if (b.page === page) {
      block = b;
      parentBlock = b;
    }
    if (b.subcategories) {
      b.subcategories.forEach(function(s) {
        if (s.page === page) {
          subcat = s;
          parentName = b.name;
          parentBlock = b;
        }
      });
    }
  });

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function slug(str, i) {
    return 'cat-' + i + '-' + String(str || '').replace(/[^\w\u4e00-\u9fa5-]+/g, '-');
  }

  function renderLinkItem(link, i) {
    return '<a href="' + esc(link.url) + '" class="link-item"' + (link.target ? ' target="' + link.target + '" rel="noopener"' : '') + '>' +
      '<span class="link-num">' + (i + 1).toString().padStart(2, '0') + '</span>' +
      '<span class="link-title">' + esc(link.title) + '</span>' +
      (link.desc ? '<span class="link-desc">' + esc(link.desc) + '</span>' : '<span class="link-desc"></span>') + '</a>';
  }

  const titleEl = document.getElementById('pageTitle');
  const listEl = document.getElementById('linkList');

  if (subcat) {
    document.title = parentName + ' / ' + subcat.name + ' - 芝士的摸鱼站';
    titleEl.innerHTML = '<span class="breadcrumb">' + esc(parentName) + '</span>' + esc(subcat.name);
  } else if (block && block.subcategories) {
    document.title = block.name + ' - 芝士的摸鱼站';
    titleEl.textContent = block.name;
  } else {
    titleEl.textContent = '未找到';
    listEl.innerHTML = '<div class="empty-state">这里暂时没有可显示的内容。</div>';
    return;
  }

  const groups = subcat ? [subcat] : parentBlock.subcategories.filter(function(s) { return s.links.length; });

  let html = '';
  groups.forEach(function(group, gi) {
    if (!group.links.length) return;
    const id = slug(group.name, gi);
    html += '<div class="detail-subcat-header" id="' + esc(id) + '"><span>' + esc(group.name) + '</span><span class="detail-subcat-count">· ' + group.links.length + '</span></div>';
    group.links.forEach(function(link, i) {
      html += renderLinkItem(link, i);
    });
  });
  listEl.innerHTML = html || '<div class="empty-state">这个分类还在慢慢补内容。</div>';

  const searchInput = document.getElementById('detailSearch');
  searchInput.addEventListener('input', function() {
    const q = searchInput.value.trim().toLowerCase();
    document.querySelectorAll('#linkList .link-item').forEach(function(item) {
      item.classList.toggle('hidden', !!q && item.textContent.toLowerCase().indexOf(q) === -1);
    });
    document.querySelectorAll('#linkList .detail-subcat-header').forEach(function(header) {
      let visible = false;
      let el = header.nextElementSibling;
      while (el && !el.classList.contains('detail-subcat-header')) {
        if (!el.classList.contains('hidden')) {
          visible = true;
          break;
        }
        el = el.nextElementSibling;
      }
      header.classList.toggle('hidden', !!q && !visible);
    });
  });
})();
</script>
</body>
</html>
