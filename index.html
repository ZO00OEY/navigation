<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f8eeef">
<title>摸鱼神国</title>
<script>
(function () {
  var saved = localStorage.getItem('theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
})();
</script>
<link rel="stylesheet" href="guides/shared.css">
<style>
:root {
  --page-bg: #f8f3f2;
  --surface: rgba(255, 253, 251, 0.88);
  --surface-solid: #fffdfb;
  --surface-muted: #f1e9e8;
  --line: rgba(76, 60, 64, 0.12);
  --line-strong: rgba(76, 60, 64, 0.22);
  --ink: #30292b;
  --ink-muted: #74686b;
  --ink-faint: #a19396;
  --accent: #b85f78;
  --accent-soft: #efd1d9;
  --accent-wash: rgba(210, 123, 147, 0.13);
  --sidebar-width: 226px;
  --hero-control: rgba(255, 253, 251, 0.74);
  --hero-control-hover: rgba(255, 253, 251, 0.96);
  --hero-control-line: rgba(62, 48, 52, 0.16);
  --shadow: 0 24px 70px rgba(92, 55, 65, 0.12);
}

[data-theme="dark"] {
  --page-bg: #111218;
  --surface: rgba(27, 28, 37, 0.86);
  --surface-solid: #1b1c25;
  --surface-muted: #23242f;
  --line: rgba(226, 226, 238, 0.1);
  --line-strong: rgba(226, 226, 238, 0.2);
  --ink: #eeeef4;
  --ink-muted: #aaa9b8;
  --ink-faint: #777685;
  --accent: #aebdff;
  --accent-soft: #343a58;
  --accent-wash: rgba(130, 148, 230, 0.12);
  --hero-control: rgba(19, 20, 28, 0.62);
  --hero-control-hover: rgba(27, 28, 39, 0.9);
  --hero-control-line: rgba(235, 235, 245, 0.18);
  --shadow: 0 28px 80px rgba(0, 0, 0, 0.32);
}

html { scroll-behavior: smooth; }
body {
  background: var(--page-bg);
  color: var(--ink);
  overflow-x: hidden;
  font-family: "Noto Serif SC", "Songti SC", "STSong", "SimSun", serif;
}
button, input { font: inherit; }
.page-shell {
  width: 100%;
}

.hero {
  position: relative;
  min-height: min(100svh, 940px);
  height: max(720px, 100svh);
  overflow: hidden;
  isolation: isolate;
  background: #f8eeef;
}
.hero-art {
  position: absolute;
  max-width: none;
  object-position: center center;
  user-select: none;
  pointer-events: none;
  transition: filter 0.8s ease, opacity 0.8s ease;
}
[data-theme="dark"] .hero-art {
  filter: brightness(0.3) saturate(0.72) hue-rotate(18deg) contrast(1.08);
}
[data-theme="dark"] .hero { background: #111218; }
.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.08), transparent 32%),
    linear-gradient(90deg, rgba(255,253,251,0.2), transparent 44%);
  transition: background 0.8s ease;
}
[data-theme="dark"] .hero::after {
  background:
    radial-gradient(circle at 76% 17%, rgba(218,225,255,0.16), transparent 14%),
    linear-gradient(180deg, rgba(7,9,19,0.08), rgba(8,10,22,0.45));
}

#rippleCanvas {
  position: absolute;
  inset: 0;
  z-index: 3;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.topbar-group { display: flex; align-items: center; gap: 10px; }
.icon-button {
  width: 42px;
  height: 42px;
  border: 1px solid var(--hero-control-line);
  border-radius: 14px;
  color: var(--ink);
  background: var(--hero-control);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  display: grid;
  place-items: center;
  transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
}
.icon-button:hover {
  transform: translateY(-2px);
  background: var(--hero-control-hover);
  border-color: var(--line-strong);
}
.menu-dots { display: flex; gap: 3px; }
.menu-dots i {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: currentColor;
}
.nav-rail {
  position: fixed;
  inset: 0 auto 0 0;
  z-index: 38;
  width: 62px;
  padding: 16px 7px;
  border-right: 1px solid rgba(120, 88, 98, 0.055);
  background: transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 9px;
  transition: opacity 0.2s ease, transform 0.28s ease;
}
body.sidebar-open .nav-rail {
  opacity: 0;
  transform: translateX(-12px);
  pointer-events: none;
}
.rail-logo.is-dissolving svg { opacity: 0; transform: scale(0.72); }
.rail-logo svg { transition: opacity 0.14s ease, transform 0.18s ease; }
.logo-particle {
  position: fixed;
  z-index: 60;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent);
  pointer-events: none;
  animation: logoParticle 0.46s cubic-bezier(.18,.7,.28,1) forwards;
}
.rail-spacer { height: 9px; }
.rail-button {
  position: relative;
  width: 48px;
  height: 48px;
  padding: 0;
  border: 0;
  border-radius: 14px;
  color: var(--accent);
  background: transparent;
  display: grid;
  place-items: center;
  transition: color 0.18s ease, background 0.18s ease, transform 0.18s ease;
}
.rail-button:hover,
.rail-button:focus-visible {
  color: var(--accent);
  background: rgba(218, 104, 150, 0.12);
  outline: none;
}
.rail-button:active { transform: scale(0.94); }
.rail-button::after {
  content: attr(data-tooltip);
  position: absolute;
  left: calc(100% + 10px);
  top: 50%;
  z-index: 2;
  padding: 7px 10px;
  border-radius: 8px;
  color: #fff;
  background: rgba(24, 22, 24, 0.92);
  box-shadow: 0 8px 24px rgba(35, 22, 28, 0.16);
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 0.7rem;
  line-height: 1;
  white-space: nowrap;
  opacity: 0;
  transform: translate(4px, -50%);
  pointer-events: none;
  transition: opacity 0.16s ease, transform 0.16s ease;
}
.rail-button:hover::after,
.rail-button:focus-visible::after {
  opacity: 1;
  transform: translate(0, -50%);
}
.rail-logo {
  color: var(--accent);
  margin-bottom: 1px;
}
[data-theme="dark"] .nav-rail {
  border-right-color: rgba(168, 184, 236, 0.07);
}
[data-theme="dark"] .rail-button {
  color: #91a8ef;
}
[data-theme="dark"] .rail-button:hover,
[data-theme="dark"] .rail-button:focus-visible {
  color: #adc0ff;
  background: rgba(111, 137, 226, 0.12);
}

.hero-copy {
  position: absolute;
  z-index: 5;
  top: clamp(145px, 16vh, 205px);
  left: clamp(78px, 8vw, 140px);
  width: auto;
  animation: copyIn 0.9s 0.12s both cubic-bezier(.2,.75,.2,1);
  transition: translate 0.34s cubic-bezier(.22,.78,.25,1);
}
.hero-eyebrow {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 17px;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  color: var(--ink-muted);
  font-size: calc(0.72rem * var(--hero-copy-ratio, 1));
  letter-spacing: 0.22em;
  text-transform: uppercase;
  width: max-content;
  max-width: none;
  translate: 0 var(--eyebrow-lift, 0px);
  transition: translate 0.22s ease;
}
.hero-eyebrow::before {
  content: "";
  width: 36px;
  height: 1px;
  background: var(--accent);
}
.hero-copy h1 {
  width: max-content;
  max-width: none;
  font-size: var(--hero-title-size, clamp(3.2rem, 6.6vw, 7rem));
  font-weight: 400;
  line-height: 0.96;
  letter-spacing: -0.075em;
  white-space: nowrap;
}
.hero-copy h1 .title-line {
  display: block;
  width: max-content;
  white-space: nowrap;
}
.hero-copy h1 .title-line-accent {
  margin-top: 0.1em;
  color: var(--accent);
  font-style: italic;
}
.hero-copy p {
  max-width: 390px;
  margin-top: 22px;
  color: var(--ink-muted);
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: calc(0.9rem * var(--hero-copy-ratio, 1));
  line-height: 1.9;
  letter-spacing: 0.03em;
}
.hero-action {
  position: absolute;
  z-index: 5;
  left: var(--hero-action-left, 92px);
  top: var(--hero-action-top, auto);
  display: inline-flex;
  align-items: center;
  gap: 13px;
  margin: 0;
  padding: 0;
  border: 0;
  background: transparent;
  color: var(--ink);
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: calc(0.78rem * var(--hero-copy-ratio, 1));
  letter-spacing: 0.1em;
}
.hero-action .arrow {
  width: 38px;
  height: 38px;
  border: 1px solid var(--line-strong);
  border-radius: 50%;
  display: grid;
  place-items: center;
  transition: transform 0.2s ease, background 0.2s ease;
}
.hero-action:hover .arrow {
  transform: translateX(4px);
  background: var(--surface);
}

.door-hotspot {
  position: absolute;
  z-index: 6;
  border: 0;
  padding: 0;
  background: transparent;
  border-radius: 4px;
  opacity: 1;
  transform-origin: center bottom;
  transform:
    perspective(900px)
    translate3d(var(--door-x, 0), var(--door-y, 0), 0)
    rotateX(var(--door-rx, 0deg))
    rotateY(var(--door-ry, 0deg));
  will-change: transform;
}
.door-hotspot:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 8px;
}
.door-visual {
  position: absolute;
  inset: 0;
  overflow: hidden;
  border-radius: 5px;
  pointer-events: none;
  transform-origin: 50% 88%;
  will-change: transform, filter;
}
.door-visual-layer {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}
.door-visual-layer img {
  position: absolute;
  max-width: none;
  user-select: none;
  pointer-events: none;
}
.door-core {
  inset: var(--door-pad-y, 18px) var(--door-pad-x, 18px);
  border-radius: 3px;
  -webkit-mask-image:
    linear-gradient(to right, transparent, #000 4px, #000 calc(100% - 4px), transparent),
    linear-gradient(to bottom, transparent, #000 5px, #000 calc(100% - 5px), transparent);
  -webkit-mask-composite: source-in;
  mask-image:
    linear-gradient(to right, transparent, #000 4px, #000 calc(100% - 4px), transparent),
    linear-gradient(to bottom, transparent, #000 5px, #000 calc(100% - 5px), transparent);
  mask-composite: intersect;
}
.door-eraser {
  position: absolute;
  z-index: 5;
  pointer-events: none;
  border-radius: 5px;
  filter: blur(2px);
  opacity: 0.9;
  -webkit-mask-image:
    linear-gradient(to right, transparent, rgba(0,0,0,.72) 6px, #000 13px, #000 calc(100% - 13px), rgba(0,0,0,.72) calc(100% - 6px), transparent),
    linear-gradient(to bottom, transparent, rgba(0,0,0,.72) 6px, #000 13px, #000 calc(100% - 13px), rgba(0,0,0,.72) calc(100% - 6px), transparent);
  -webkit-mask-composite: source-in;
  mask-image:
    linear-gradient(to right, transparent, rgba(0,0,0,.72) 6px, #000 13px, #000 calc(100% - 13px), rgba(0,0,0,.72) calc(100% - 6px), transparent),
    linear-gradient(to bottom, transparent, rgba(0,0,0,.72) 6px, #000 13px, #000 calc(100% - 13px), rgba(0,0,0,.72) calc(100% - 6px), transparent);
  mask-composite: intersect;
}
[data-theme="dark"] .door-visual {
  filter: brightness(0.3) saturate(0.72) hue-rotate(18deg) contrast(1.08);
}
[data-theme="dark"] .door-eraser {
  filter: blur(1.5px) brightness(0.3) saturate(0.72) hue-rotate(18deg) contrast(1.08);
}
.door-hotspot.door-pressed .door-visual {
  animation: doorPress 0.4s cubic-bezier(.18,.82,.24,1);
}
.door-aura {
  position: absolute;
  z-index: 7;
  pointer-events: none;
  border-radius: 46% 54% 50% 43% / 55% 46% 54% 45%;
  opacity: 0;
  background:
    radial-gradient(ellipse at 48% 52%,
      rgba(243, 210, 220, 0.24) 0%,
      rgba(235, 183, 201, 0.2) 28%,
      rgba(225, 157, 181, 0.1) 53%,
      transparent 76%),
    radial-gradient(circle at 27% 42%, rgba(218, 145, 170, 0.08) 0 1px, transparent 1.8px),
    radial-gradient(circle at 63% 31%, rgba(240, 201, 214, 0.11) 0 1.2px, transparent 2px),
    radial-gradient(circle at 72% 68%, rgba(207, 128, 156, 0.065) 0 0.8px, transparent 1.7px);
  background-size: auto, 9px 11px, 13px 10px, 8px 14px;
  filter: blur(10px) saturate(0.9);
  transform: scale(0.82) rotate(-1deg);
  will-change: transform, opacity, filter;
}
.door-aura::before {
  content: "";
  position: absolute;
  inset: 7% 5%;
  border-radius: inherit;
  background:
    radial-gradient(ellipse at 52% 48%,
      rgba(246, 219, 226, 0.2),
      rgba(228, 169, 190, 0.1) 44%,
      transparent 72%),
    repeating-radial-gradient(circle at 38% 54%,
      rgba(204, 132, 158, 0.045) 0 0.7px,
      transparent 0.9px 4px);
  background-size: auto, 7px 7px;
  filter: blur(14px) saturate(0.88);
  mix-blend-mode: normal;
}
.hero.door-awake .door-aura {
  animation: doorAura 0.86s cubic-bezier(.18,.64,.24,1);
}

.scroll-note {
  position: absolute;
  z-index: 5;
  left: var(--scroll-note-left, 92px);
  top: var(--scroll-note-top, auto);
  bottom: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--ink-muted);
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  transition: translate 0.34s cubic-bezier(.22,.78,.25,1);
}
body.sidebar-open .hero-copy,
body.sidebar-open .hero-action,
body.sidebar-open .scroll-note {
  translate: 226px 0;
}
.scroll-note::before {
  content: "";
  width: 1px;
  height: 34px;
  background: linear-gradient(var(--accent), transparent);
  animation: breathe 2.2s infinite ease-in-out;
}

.sidebar-backdrop {
  display: none;
}
.sidebar {
  position: fixed;
  inset: 0 auto 0 0;
  z-index: 42;
  width: min(226px, calc(100vw - 18px));
  padding: 12px 10px 10px;
  border-right: 1px solid rgba(120, 88, 98, 0.08);
  background: rgba(255, 247, 247, 0.24);
  box-shadow: 12px 0 34px rgba(49, 35, 39, 0.035);
  backdrop-filter: blur(5px) saturate(1.02);
  -webkit-backdrop-filter: blur(5px) saturate(1.02);
  transform: translateX(-102%);
  transition: transform 0.34s cubic-bezier(.22,.78,.25,1);
  display: flex;
  flex-direction: column;
}
body.sidebar-open .sidebar { transform: none; }
.sidebar-head {
  min-height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 4px;
}
.sidebar-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--accent);
  opacity: 0;
  transform: translateX(-8px);
  transition: opacity 0.24s 0.12s ease, transform 0.3s 0.1s ease;
}
body.sidebar-open .sidebar-title { opacity: 1; transform: none; }
.sidebar-actions { display: flex; align-items: center; gap: 0; }
.sidebar-icon-button {
  width: 38px;
  height: 38px;
  border: 0;
  border-radius: 11px;
  color: var(--accent);
  background: transparent;
  display: grid;
  place-items: center;
  transition: color 0.18s ease, background 0.18s ease;
}
.sidebar-icon-button:hover { color: var(--accent); background: var(--accent-wash); }
.sidebar-body {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  padding-top: 18px;
}
.sidebar-nav {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 2px 2px 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--line-strong) transparent;
}
.sidebar-group { margin-bottom: 22px; }
.sidebar-group-title {
  padding: 0 10px 7px;
  color: var(--ink-faint);
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 0.68rem;
}
.sidebar-link {
  min-height: 42px;
  padding: 10px;
  border-radius: 11px;
  color: var(--ink);
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 0.78rem;
}
.sidebar-link {
  text-shadow: 0 1px 5px rgba(255, 253, 251, 0.82);
}
.sidebar-link:hover { background: rgba(255, 245, 247, 0.38); }
.sidebar-link-arrow { color: var(--ink-faint); }
.sidebar-empty {
  display: none;
  padding: 28px 12px;
  color: var(--ink-faint);
  text-align: center;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 0.74rem;
}
.sidebar-foot {
  padding-top: 10px;
  border-top: 1px solid rgba(116, 84, 94, 0.09);
  background: linear-gradient(to top, rgba(255, 249, 248, 0.18), transparent);
}
.sidebar-settings {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 2px;
  min-height: 44px;
  padding: 0 4px 8px;
}
.sidebar-setting {
  width: 40px;
  height: 40px;
  padding: 0;
  border: 0;
  border-radius: 11px;
  color: var(--accent);
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 0;
}
.sidebar-setting svg,
.sidebar-setting span {
  display: block;
  flex: 0 0 auto;
}
.sidebar-setting span {
  width: 18px;
  height: 18px;
}
.sidebar-setting span svg { width: 18px; height: 18px; }
.sidebar-setting:hover { color: var(--accent); background: var(--accent-wash); }
[data-theme="dark"] .sidebar {
  background: rgba(13, 16, 28, 0.28);
  box-shadow: 12px 0 34px rgba(0, 0, 0, 0.08);
}
[data-theme="dark"] .sidebar-link {
  text-shadow: 0 1px 5px rgba(8, 10, 20, 0.78);
}
[data-theme="dark"] .sidebar-link:hover {
  background: rgba(82, 101, 174, 0.2);
}
[data-theme="dark"] .sidebar-title,
[data-theme="dark"] .sidebar-icon-button,
[data-theme="dark"] .sidebar-setting {
  color: #91a8ef;
}

.search-overlay {
  position: fixed;
  inset: 0;
  z-index: 70;
  padding: clamp(72px, 10vh, 112px) 20px 24px;
  background: rgba(54, 45, 49, 0.2);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}
.search-overlay.open { opacity: 1; pointer-events: auto; }
.search-dialog {
  width: min(760px, calc(100vw - 40px));
  max-height: min(680px, calc(100vh - 120px));
  margin: 0 auto;
  border: 1px solid rgba(115, 82, 93, 0.12);
  border-radius: 26px;
  background: color-mix(in srgb, var(--surface-solid) 97%, transparent);
  box-shadow: 0 28px 90px rgba(67, 43, 51, 0.2);
  overflow: hidden;
  transform: translateY(-10px) scale(0.985);
  transition: transform 0.24s cubic-bezier(.2,.75,.25,1);
}
.search-overlay.open .search-dialog { transform: none; }
.search-box {
  height: 76px;
  padding: 0 18px 0 24px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 14px;
  color: var(--accent);
}
.search-box input {
  min-width: 0;
  flex: 1;
  border: 0;
  outline: 0;
  color: var(--ink);
  background: transparent;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 1rem;
}
.search-box input::placeholder { color: var(--ink-faint); }
.search-close {
  width: 38px;
  height: 38px;
  border: 0;
  border-radius: 12px;
  color: var(--ink-faint);
  background: transparent;
  font-size: 1.45rem;
}
.search-close:hover { color: var(--accent); background: var(--accent-wash); }
.search-results {
  max-height: calc(min(680px, 100vh - 120px) - 77px);
  padding: 12px;
  overflow-y: auto;
}
.search-result {
  padding: 13px 14px;
  border-radius: 15px;
  color: var(--ink);
  text-decoration: none;
  display: grid;
  grid-template-columns: 32px 1fr;
  gap: 10px;
  align-items: center;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
}
.search-result:hover { background: var(--accent-wash); }
.search-result-icon { color: var(--accent); display: grid; place-items: center; }
.search-result small { display: block; margin-top: 3px; color: var(--ink-faint); font-size: 0.68rem; }
.search-empty { padding: 42px 18px; color: var(--ink-faint); text-align: center; font-size: 0.78rem; }
[data-theme="dark"] .search-box,
[data-theme="dark"] .search-result-icon { color: #91a8ef; }
.profile-row {
  min-height: 58px;
  padding: 8px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  gap: 11px;
  color: var(--ink);
  background: transparent;
}

<script>
(function () {
  var hero = document.getElementById('hero');
  var art = document.getElementById('heroArt');
  var canvas = document.getElementById('rippleCanvas');
  var ctx = canvas.getContext('2d');
  var door = document.getElementById('doorHotspot');
  var heroCopy = document.querySelector('.hero-copy');
  var heroTitle = document.querySelector('.hero-copy h1');
  var heroEyebrow = document.querySelector('.hero-eyebrow');
  var titleLines = document.querySelectorAll('.hero-copy .title-line');
  var heroAction = document.getElementById('discoverButton');
  var scrollNote = document.querySelector('.scroll-note');
  var doorLayerImages = document.querySelectorAll('.door-layer-image');
  var doorEraser = document.getElementById('doorEraser');
  var doorEraserCtx = doorEraser.getContext('2d');
  var aura = document.getElementById('doorAura');
  var sidebar = document.getElementById('sidebar');
  var backdrop = document.getElementById('sidebarBackdrop');
  var themeIcon = document.getElementById('themeIcon');
  var railThemeIcon = document.getElementById('railThemeIcon');
  var sidebarNav = document.getElementById('sidebarNav');
  var searchOverlay = document.getElementById('searchOverlay');
  var siteSearch = document.getElementById('siteSearch');
  var searchResults = document.getElementById('searchResults');
  var railLogo = document.getElementById('sidebarOpen');
  var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var compactSidebarQuery = window.matchMedia('(max-width: 760px)');
  var ripples = [];
  var distortionBuffer = document.createElement('canvas');
  var distortionCtx = distortionBuffer.getContext('2d');
  var lastRipple = { x: -999, y: -999, time: 0 };
  var lastDoorRipple = { x: -999, y: -999, time: 0 };
  var pointerVelocity = { x: 0, y: 0 };
  var doorMotion = {
    hovering: false,
    targetX: 0, targetY: 0, targetRX: 0, targetRY: 0,
    x: 0, y: 0, rx: 0, ry: 0
  };
  var imageMap = { scale: 1, offsetX: 0, offsetY: 0 };
  var sceneLayout = {
    heroHeight: null,
    actionLeft: null,
    actionTop: null,
    noteLeft: null,
    noteTop: null
  };
  var SOURCE = { width: 1672, height: 941, waterY: 600 };
  var DOOR = { x: 1023, y: 236, width: 184, height: 369 };
  var DOOR_PAD = { x: 7, y: 7 };

  function escapeHtml(value) {
    return String(value || '').replace(/[&<>"']/g, function (char) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char];
    });
  }

  function buildPortalCards() {
    var grid = document.getElementById('portalGrid');
    var blocks = ((typeof SITE_DATA !== 'undefined' && SITE_DATA.blocks) || []).filter(function (block) {
      return block.type !== 'profile';
    });
    grid.innerHTML = blocks.map(function (block, index) {
      var links = [];
      (block.subcategories || []).forEach(function (sub) {
        links = links.concat(sub.links || []);
      });
      links = links.concat(block.links || []);
      var href = block.page ? 'detail.html?page=' + encodeURIComponent(block.page) : (links[0] && links[0].url || '#');
      var desc = links.slice(0, 3).map(function (link) { return link.title; }).join(' · ');
      return '<a class="portal-card" href="' + escapeHtml(href) + '">' +
        '<span class="portal-index">0' + (index + 1) + ' / 0' + blocks.length + '</span>' +
        '<span class="card-arrow">↗</span>' +
        '<h3>' + escapeHtml(block.name) + '</h3>' +
        '<p>' + escapeHtml(desc || '内容正在慢慢浮出水面。') + '</p>' +
      '</a>';
    }).join('');
  }

  function getProfile() {
    return ((typeof SITE_DATA !== 'undefined' && SITE_DATA.blocks) || []).find(function (block) {
      return block.type === 'profile';
    }) || {};
  }

  function buildSidebar() {
    var blocks = ((typeof SITE_DATA !== 'undefined' && SITE_DATA.blocks) || []).filter(function (block) {
      return block.type !== 'profile';
    });
    sidebarNav.innerHTML = blocks.map(function (block) {
      var links = [];
      (block.subcategories || []).forEach(function (sub) {
        links = links.concat(sub.links || []);
      });
      links = links.concat(block.links || []);
      return '<section class="sidebar-group">' +
        '<div class="sidebar-group-title">' + escapeHtml(block.name) + '</div>' +
        links.map(function (link) {
          return '<a class="sidebar-link" href="' + escapeHtml(link.url) + '" data-sidebar-search="' +
            escapeHtml((link.title || '') + ' ' + (link.desc || '') + ' ' + block.name) + '"' +
            (link.target ? ' target="' + escapeHtml(link.target) + '" rel="noopener"' : '') + '>' +
            '<span>' + escapeHtml(link.title) + '</span><span class="sidebar-link-arrow">›</span></a>';
        }).join('') +
      '</section>';
    }).join('');

    var profile = getProfile();
    var avatar = profile.avatar
      ? '<img class="profile-avatar" src="' + escapeHtml(profile.avatar) + '" alt="">'
      : '<span class="profile-avatar"></span>';
    document.getElementById('profileRow').innerHTML =
      avatar +
      '<span class="profile-copy"><span class="profile-name">' +
      escapeHtml(profile.username || profile.name || '个人资料') +
      '</span><span class="profile-bio">' +
      escapeHtml(profile.bio || '个人介绍稍后补充') +
      '</span></span><span class="sidebar-link-arrow">›</span>';
  }

  function getSearchItems() {
    var items = [];
    ((typeof SITE_DATA !== 'undefined' && SITE_DATA.blocks) || []).forEach(function (block) {
      if (block.type === 'profile') return;
      var links = [];
      (block.subcategories || []).forEach(function (sub) {
        links = links.concat(sub.links || []);
      });
      links = links.concat(block.links || []);
      links.forEach(function (link) {
        items.push({
          title: link.title || '',
          desc: link.desc || block.name || '',
          group: block.name || '',
          url: link.url || '#',
          target: link.target || ''
        });
      });
    });
    return items;
  }

  function renderSearchResults() {
    var query = siteSearch.value.trim().toLowerCase();
    var items = getSearchItems().filter(function (item) {
      return !query || (item.title + ' ' + item.desc + ' ' + item.group).toLowerCase().indexOf(query) !== -1;
    }).slice(0, 14);
    if (!items.length) {
      searchResults.innerHTML = '<div class="search-empty">没有找到对应入口</div>';
      return;
    }
    searchResults.innerHTML = items.map(function (item) {
      return '<a class="search-result" href="' + escapeHtml(item.url) + '"' +
        (item.target ? ' target="' + escapeHtml(item.target) + '" rel="noopener"' : '') + '>' +
        '<span class="search-result-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg></span>' +
        '<span><strong>' + escapeHtml(item.title) + '</strong><small>' +
        escapeHtml(item.group + (item.desc ? ' · ' + item.desc : '')) +
        '</small></span></a>';
    }).join('');
  }

  function syncThemeStatus() {
    var dark = document.documentElement.getAttribute('data-theme') === 'dark';
    var icon = dark
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.7 15.1A8.5 8.5 0 018.9 3.3 8.5 8.5 0 1020.7 15.1z"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"/></svg>';
    themeIcon.innerHTML = icon;
    railThemeIcon.innerHTML = icon;
    document.querySelector('meta[name="theme-color"]').setAttribute('content', dark ? '#111218' : '#f8eeef');
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    syncThemeStatus();
  }

  function createClickBurst(event) {
    if (reducedMotion) return;
    if (event.target.closest && event.target.closest('.rail-logo')) return;
    var dark = document.documentElement.getAttribute('data-theme') === 'dark';
    var hues = dark
      ? [220, 235, 250, 260, 270, 280, 240, 255]
      : [340, 350, 355, 0, 10, 20, 330, 345];
    for (var i = 0; i < 24; i++) {
      var particle = document.createElement('div');
      var angle = Math.PI * 2 * i / 24 + (Math.random() - 0.5) * 0.5;
      var distance = 30 + Math.random() * 85;
      var hue = hues[Math.floor(Math.random() * hues.length)];
      particle.className = 'firework-particle' + (Math.random() < 0.2 ? ' star' : '');
      particle.style.cssText =
        '--tx:' + Math.cos(angle) * distance + 'px;' +
        '--ty:' + Math.sin(angle) * distance + 'px;' +
        'background:hsl(' + hue + ',85%,' + (60 + Math.random() * 20) + '%);' +
        'left:' + event.clientX + 'px;top:' + event.clientY + 'px;';
      document.body.appendChild(particle);
      window.setTimeout(function (node) { node.remove(); }, 900, particle);
    }
  }

  function openSidebar() {
    document.body.classList.add('sidebar-open');
    sidebar.setAttribute('aria-hidden', 'false');
    window.setTimeout(resizeCanvas, 360);
  }

  function closeSidebar() {
    document.body.classList.remove('sidebar-open');
    sidebar.setAttribute('aria-hidden', 'true');
    window.setTimeout(resizeCanvas, 360);
  }

  function handleViewportChange() {
    if (compactSidebarQuery.matches) closeSidebar();
    resizeCanvas();
  }

  function openSearch() {
    searchOverlay.classList.add('open');
    searchOverlay.setAttribute('aria-hidden', 'false');
    renderSearchResults();
    window.setTimeout(function () { siteSearch.focus(); }, 40);
  }

  function closeSearch() {
    searchOverlay.classList.remove('open');
    searchOverlay.setAttribute('aria-hidden', 'true');
  }

  function dissolveLogoAndOpen() {
    if (reducedMotion) {
      openSidebar();
      return;
    }
    var rect = railLogo.getBoundingClientRect();
    var dark = document.documentElement.getAttribute('data-theme') === 'dark';
    var color = dark ? '#91a8ef' : '#d96f98';
    railLogo.classList.add('is-dissolving');
    for (var i = 0; i < 22; i++) {
      var particle = document.createElement('i');
      var angle = Math.random() * Math.PI * 2;
      var distance = 18 + Math.random() * 30;
      particle.className = 'logo-particle';
      particle.style.left = (rect.left + rect.width * (0.35 + Math.random() * 0.3)) + 'px';
      particle.style.top = (rect.top + rect.height * (0.35 + Math.random() * 0.3)) + 'px';
      particle.style.background = color;
      particle.style.setProperty('--px', Math.cos(angle) * distance + 'px');
      particle.style.setProperty('--py', Math.sin(angle) * distance + 'px');
      document.body.appendChild(particle);
      window.setTimeout(function (node) { node.remove(); }, 500, particle);
    }
    window.setTimeout(function () {
      openSidebar();
      railLogo.classList.remove('is-dissolving');
    }, 180);
  }

  function fitHeroTypography(heroRect, visualDoorLeft, visualDoorTop) {
    var compact = heroRect.width <= 850;
    var preferred = compact
      ? Math.min(72, Math.max(50, heroRect.width * 0.095))
      : Math.min(112, Math.max(60, heroRect.width * 0.066));
    var railSafeLeft = heroRect.left + (heroRect.width <= 560 ? 74 : 92);
    var doorScreenLeft = heroRect.left + visualDoorLeft;
    var doorScreenTop = heroRect.top + visualDoorTop;
    var safetyGap = Math.max(18, heroRect.width * 0.022);
    var availableWidth = Math.max(130, doorScreenLeft - railSafeLeft - safetyGap);

    heroCopy.style.left = (railSafeLeft - heroRect.left) + 'px';
    heroCopy.style.right = 'auto';
    heroCopy.style.width = availableWidth + 'px';
    heroCopy.style.setProperty('--hero-title-size', preferred + 'px');
    var minimum = compact ? 24 : 48;
    var fitted = preferred;
    var widestLine = 0;
    titleLines.forEach(function (line) {
      widestLine = Math.max(widestLine, line.getBoundingClientRect().width);
    });
    if (widestLine > availableWidth) {
      fitted = Math.max(minimum, preferred * availableWidth / widestLine);
    }
    heroCopy.style.setProperty('--hero-title-size', fitted.toFixed(2) + 'px');
    heroCopy.style.setProperty('--hero-copy-ratio', Math.max(0.72, fitted / preferred).toFixed(3));

    heroCopy.style.setProperty('--eyebrow-lift', '0px');
    var eyebrowRect = heroEyebrow.getBoundingClientRect();
    var doorOverlapX = eyebrowRect.right + safetyGap > doorScreenLeft;
    var doorOverlapY = eyebrowRect.bottom + safetyGap > doorScreenTop;
    if (doorOverlapX && doorOverlapY) {
      var lift = Math.min(42, eyebrowRect.bottom + safetyGap - doorScreenTop);
      heroCopy.style.setProperty('--eyebrow-lift', (-lift) + 'px');
    }
  }

  function setLayoutValue(key, value, apply) {
    if (sceneLayout[key] !== null && Math.abs(sceneLayout[key] - value) < 0.75) return;
    sceneLayout[key] = value;
    apply(value);
  }

  function positionHeroPrompts(heroRect, sceneBottom, topFlowScene) {
    var safeLeft = heroRect.width <= 560 ? 92 : Math.max(92, heroCopy.offsetLeft);
    var visibleBottom = Math.min(heroRect.height, sceneBottom);
    var noteTop = Math.max(0, visibleBottom - 50);
    var copyRect = heroCopy.getBoundingClientRect();
    var copyBottom = copyRect.bottom - heroRect.top;
    var actionTop = topFlowScene
      ? Math.max(copyBottom + 22, noteTop - 76)
      : copyBottom + 24;
    actionTop = Math.max(0, Math.min(actionTop, noteTop - 58));

    setLayoutValue('actionLeft', safeLeft, function (value) {
      hero.style.setProperty('--hero-action-left', value.toFixed(2) + 'px');
    });
    setLayoutValue('actionTop', actionTop, function (value) {
      hero.style.setProperty('--hero-action-top', value.toFixed(2) + 'px');
    });
    setLayoutValue('noteLeft', safeLeft, function (value) {
      hero.style.setProperty('--scroll-note-left', value.toFixed(2) + 'px');
    });
    setLayoutValue('noteTop', noteTop, function (value) {
      hero.style.setProperty('--scroll-note-top', value.toFixed(2) + 'px');
    });
  }

  function updateImageMap() {
    var rect = hero.getBoundingClientRect();
    var compactBaseHeight = rect.width <= 760
      ? Math.min(window.innerHeight || 920, 920)
      : rect.height;
    var coverScale = Math.max(rect.width / SOURCE.width, compactBaseHeight / SOURCE.height);
    var scale = coverScale;
    var objectPosition = getComputedStyle(art).objectPosition.split(/\s+/);
    var positionX = objectPosition[0] && objectPosition[0].endsWith('%')
      ? parseFloat(objectPosition[0]) / 100
      : 0.5;
    var positionY = objectPosition[1] && objectPosition[1].endsWith('%')
      ? parseFloat(objectPosition[1]) / 100
      : 0.5;
    var regionSourceWidth = DOOR.width + DOOR_PAD.x * 2;
    var naturalDoorWidth = regionSourceWidth * coverScale;
    var sceneConstrained = naturalDoorWidth > rect.width / 3;
    var topFlowScene = sceneConstrained && rect.width <= 760;
    if (sceneConstrained) {
      scale = (rect.width / 4) / regionSourceWidth;
      positionY = topFlowScene ? 0 : 1;
    }
    if (topFlowScene) {
      var sceneHeight = SOURCE.height * scale;
      var targetHeroHeight = Math.ceil(sceneHeight);
      setLayoutValue('heroHeight', targetHeroHeight, function (value) {
        hero.style.height = value + 'px';
      });
      rect = hero.getBoundingClientRect();
    } else {
      if (sceneLayout.heroHeight !== null) {
        sceneLayout.heroHeight = null;
        hero.style.height = '';
        rect = hero.getBoundingClientRect();
      }
    }
    imageMap.scale = scale;
    imageMap.offsetX = (rect.width - SOURCE.width * scale) * positionX;
    imageMap.offsetY = (rect.height - SOURCE.height * scale) * positionY;
    art.style.width = (SOURCE.width * scale) + 'px';
    art.style.height = (SOURCE.height * scale) + 'px';
    art.style.left = imageMap.offsetX + 'px';
    art.style.top = imageMap.offsetY + 'px';

    var regionX = DOOR.x - DOOR_PAD.x;
    var regionY = DOOR.y - DOOR_PAD.y;
    var left = imageMap.offsetX + regionX * scale;
    var top = imageMap.offsetY + regionY * scale;
    var width = (DOOR.width + DOOR_PAD.x * 2) * scale;
    var height = (DOOR.height + DOOR_PAD.y * 2) * scale;
    var padX = DOOR_PAD.x * scale;
    var padY = DOOR_PAD.y * scale;
    door.style.left = left + 'px';
    door.style.top = top + 'px';
    door.style.width = width + 'px';
    door.style.height = height + 'px';
    door.style.setProperty('--door-pad-x', padX + 'px');
    door.style.setProperty('--door-pad-y', padY + 'px');
    doorLayerImages.forEach(function (image) {
      var isCore = image.closest('.door-core');
      image.style.width = (SOURCE.width * scale) + 'px';
      image.style.height = (SOURCE.height * scale) + 'px';
      image.style.left = (-(isCore ? DOOR.x : regionX) * scale) + 'px';
      image.style.top = (-(isCore ? DOOR.y : regionY) * scale) + 'px';
    });
    doorEraser.style.left = left + 'px';
    doorEraser.style.top = top + 'px';
    doorEraser.style.width = width + 'px';
    doorEraser.style.height = height + 'px';
    aura.style.left = (left - width * 0.36) + 'px';
    aura.style.top = (top - height * 0.12) + 'px';
    aura.style.width = (width * 1.72) + 'px';
    aura.style.height = (height * 1.24) + 'px';
    fitHeroTypography(rect, left, top);
    positionHeroPrompts(rect, imageMap.offsetY + SOURCE.height * scale, topFlowScene);
  }

  function paintDoorEraser() {
    if (!art.complete || !art.naturalWidth) return;
    var width = DOOR.width + DOOR_PAD.x * 2;
    var height = DOOR.height + DOOR_PAD.y * 2;
    var sampleWidth = 40;
    var sampleGap = 20;
    doorEraser.width = width;
    doorEraser.height = height;
    doorEraserCtx.clearRect(0, 0, width, height);
    doorEraserCtx.save();
    doorEraserCtx.filter = 'blur(10px)';
    doorEraserCtx.globalAlpha = 0.78;
    doorEraserCtx.drawImage(
      art,
      DOOR.x - sampleGap - sampleWidth,
      DOOR.y - DOOR_PAD.y,
      sampleWidth,
      height,
      -10,
      -4,
      width * 0.66,
      height + 8
    );
    doorEraserCtx.globalAlpha = 0.72;
    doorEraserCtx.drawImage(
      art,
      DOOR.x + DOOR.width + sampleGap,
      DOOR.y - DOOR_PAD.y,
      sampleWidth,
      height,
      width * 0.34,
      -4,
      width * 0.72,
      height + 8
    );
    doorEraserCtx.filter = 'blur(4px)';
    var wash = doorEraserCtx.createRadialGradient(
      width * 0.5, height * 0.48, width * 0.08,
      width * 0.5, height * 0.5, width * 0.72
    );
    wash.addColorStop(0, 'rgba(244, 214, 222, 0.16)');
    wash.addColorStop(0.58, 'rgba(237, 195, 208, 0.12)');
    wash.addColorStop(1, 'rgba(224, 164, 185, 0.025)');
    doorEraserCtx.globalAlpha = 1;
    doorEraserCtx.fillStyle = wash;
    doorEraserCtx.fillRect(0, 0, width, height);
    doorEraserCtx.restore();
  }

  function resizeCanvas() {
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    updateImageMap();
    var rect = hero.getBoundingClientRect();
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    paintDoorEraser();
  }

  function sourcePoint(clientX, clientY) {
    var rect = hero.getBoundingClientRect();
    return {
      x: (clientX - rect.left - imageMap.offsetX) / imageMap.scale,
      y: (clientY - rect.top - imageMap.offsetY) / imageMap.scale,
      screenX: clientX - rect.left,
      screenY: clientY - rect.top
    };
  }

  function addRipple(x, y, strength, velocity) {
    var velocityX = velocity && velocity.x || 0;
    var velocityY = velocity && velocity.y || 0;
    var velocityLength = Math.hypot(velocityX, velocityY);
    if (velocityLength > 26) {
      velocityX = velocityX / velocityLength * 26;
      velocityY = velocityY / velocityLength * 26;
    }
    ripples.push({
      x: x,
      y: y,
      age: 0,
      life: 1050 + Math.random() * 350,
      strength: strength || 1,
      wobble: Math.random() * Math.PI * 2,
      vx: velocityX,
      vy: velocityY
    });
    if (ripples.length > 14) ripples.shift();
  }

  function addDoorReflectionRipple(event, force) {
    if (reducedMotion) return;
    var point = sourcePoint(event.clientX, event.clientY);
    var now = performance.now();
    var distanceFromDoorBottom = Math.max(0, DOOR.y + DOOR.height - point.y);
    var reflectedSourceY = SOURCE.waterY + 18 + Math.min(190, distanceFromDoorBottom * 0.46);
    var reflectedX = imageMap.offsetX + point.x * imageMap.scale;
    var reflectedY = imageMap.offsetY + reflectedSourceY * imageMap.scale;
    var distance = Math.hypot(reflectedX - lastDoorRipple.x, reflectedY - lastDoorRipple.y);
    if (!force && (distance < 11 || now - lastDoorRipple.time < 48)) return;
    var velocity = {
      x: lastDoorRipple.time ? reflectedX - lastDoorRipple.x : 0,
      y: lastDoorRipple.time ? reflectedY - lastDoorRipple.y : 0
    };
    addRipple(reflectedX, reflectedY, force ? 0.86 : 0.58, velocity);
    lastDoorRipple = { x: reflectedX, y: reflectedY, time: now };
  }

  function drawWaterDistortion(ripple, progress, dark) {
    var ease = 1 - Math.pow(1 - progress, 3);
    var fade = Math.sin(Math.PI * progress) * ripple.strength;
    var radiusX = Math.round(38 + ease * 92);
    var radiusY = Math.round(14 + ease * 30);
    var width = radiusX * 2;
    var height = radiusY * 2;
    if (distortionBuffer.width !== width || distortionBuffer.height !== height) {
      distortionBuffer.width = width;
      distortionBuffer.height = height;
    } else {
      distortionCtx.clearRect(0, 0, width, height);
    }

    distortionCtx.save();
    distortionCtx.filter = dark
      ? 'brightness(0.3) saturate(0.72) hue-rotate(18deg) contrast(1.08)'
      : 'none';
    var stripHeight = 2;
    for (var localY = 0; localY < height; localY += stripHeight) {
      var normalizedY = (localY - radiusY) / radiusY;
      var envelope = Math.max(0, 1 - normalizedY * normalizedY);
      var phase = normalizedY * 8.5 + ripple.wobble + progress * 8;
      var shiftX = Math.sin(phase) * (3 + 11 * fade) * envelope;
      var shiftY = Math.cos(phase * 0.68) * (1.2 + 3.2 * fade) * envelope;
      var screenX = ripple.x - radiusX - shiftX;
      var screenY = ripple.y - radiusY + localY - shiftY;
      var sourceX = (screenX - imageMap.offsetX) / imageMap.scale;
      var sourceY = (screenY - imageMap.offsetY) / imageMap.scale;
      distortionCtx.drawImage(
        art,
        sourceX,
        sourceY,
        width / imageMap.scale,
        stripHeight / imageMap.scale,
        0,
        localY,
        width,
        stripHeight + 0.5
      );
    }
    distortionCtx.restore();

    distortionCtx.globalCompositeOperation = 'destination-in';
    distortionCtx.save();
    distortionCtx.translate(radiusX, radiusY);
    distortionCtx.scale(1, radiusY / radiusX);
    var mask = distortionCtx.createRadialGradient(0, 0, radiusX * 0.12, 0, 0, radiusX);
    mask.addColorStop(0, 'rgba(0,0,0,0.94)');
    mask.addColorStop(0.52, 'rgba(0,0,0,0.74)');
    mask.addColorStop(0.82, 'rgba(0,0,0,0.22)');
    mask.addColorStop(1, 'rgba(0,0,0,0)');
    distortionCtx.fillStyle = mask;
    distortionCtx.fillRect(-radiusX, -radiusX, radiusX * 2, radiusX * 2);
    distortionCtx.restore();
    distortionCtx.globalCompositeOperation = 'source-over';

    ctx.save();
    ctx.globalAlpha = Math.min(0.92, 0.38 + fade * 0.62);
    ctx.drawImage(distortionBuffer, ripple.x - radiusX, ripple.y - radiusY, width, height);
    ctx.globalAlpha = 0.16 * fade;
    ctx.strokeStyle = dark ? 'rgba(194,205,250,0.55)' : 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.ellipse(ripple.x, ripple.y, radiusX * 0.72, radiusY * 0.42, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function drawRipple(ripple) {
    var progress = ripple.age / ripple.life;
    var dark = document.documentElement.getAttribute('data-theme') === 'dark';
    drawWaterDistortion(ripple, progress, dark);
  }

  function updateDoorMotion(now) {
    var easing = doorMotion.hovering ? 0.14 : 0.12;
    doorMotion.x += (doorMotion.targetX - doorMotion.x) * easing;
    doorMotion.y += (doorMotion.targetY - doorMotion.y) * easing;
    doorMotion.rx += (doorMotion.targetRX - doorMotion.rx) * easing;
    doorMotion.ry += (doorMotion.targetRY - doorMotion.ry) * easing;
    var floatX = doorMotion.hovering ? Math.sin(now * 0.0021) * 0.46 : 0;
    var floatY = doorMotion.hovering ? Math.sin(now * 0.0016 + 1.3) * 0.34 : 0;
    var floatR = doorMotion.hovering ? Math.sin(now * 0.00125) * 0.14 : 0;
    door.style.setProperty('--door-x', (doorMotion.x + floatX).toFixed(3) + 'px');
    door.style.setProperty('--door-y', (doorMotion.y + floatY).toFixed(3) + 'px');
    door.style.setProperty('--door-rx', (doorMotion.rx + floatR).toFixed(3) + 'deg');
    door.style.setProperty('--door-ry', (doorMotion.ry - floatR).toFixed(3) + 'deg');
  }

  function resetDoorMotion(immediate) {
    doorMotion.hovering = false;
    doorMotion.targetX = 0;
    doorMotion.targetY = 0;
    doorMotion.targetRX = 0;
    doorMotion.targetRY = 0;
    if (!immediate) return;
    doorMotion.x = 0;
    doorMotion.y = 0;
    doorMotion.rx = 0;
    doorMotion.ry = 0;
    door.style.setProperty('--door-x', '0px');
    door.style.setProperty('--door-y', '0px');
    door.style.setProperty('--door-rx', '0deg');
    door.style.setProperty('--door-ry', '0deg');
  }

  var lastFrame = performance.now();
  function animate(now) {
    var delta = Math.min(now - lastFrame, 40);
    lastFrame = now;
    ctx.clearRect(0, 0, hero.clientWidth, hero.clientHeight);
    ripples.forEach(function (ripple) {
      ripple.age += delta;
      drawRipple(ripple);
    });
    ripples = ripples.filter(function (ripple) { return ripple.age < ripple.life; });
    updateDoorMotion(now);
    requestAnimationFrame(animate);
  }

  hero.addEventListener('pointermove', function (event) {
    if (reducedMotion || event.pointerType === 'touch') return;
    var point = sourcePoint(event.clientX, event.clientY);
    if (point.y < SOURCE.waterY) return;
    var now = performance.now();
    var distance = Math.hypot(point.screenX - lastRipple.x, point.screenY - lastRipple.y);
    var minDistance = 16;
    var minTime = 42;
    if (distance < minDistance || now - lastRipple.time < minTime) return;
    pointerVelocity.x = lastRipple.time ? point.screenX - lastRipple.x : 0;
    pointerVelocity.y = lastRipple.time ? point.screenY - lastRipple.y : 0;
    addRipple(point.screenX, point.screenY, 0.9, pointerVelocity);
    lastRipple = { x: point.screenX, y: point.screenY, time: now };
  });

  hero.addEventListener('pointerdown', function (event) {
    if (reducedMotion) return;
    var point = sourcePoint(event.clientX, event.clientY);
    if (point.y >= SOURCE.waterY) addRipple(point.screenX, point.screenY, 1.2, { x: 0, y: 0 });
  });

  function awakenDoor() {
    resetDoorMotion(true);
    hero.classList.remove('door-awake');
    door.classList.remove('door-pressed');
    void hero.offsetWidth;
    hero.classList.add('door-awake');
    door.classList.add('door-pressed');
    window.setTimeout(openSidebar, reducedMotion ? 0 : 210);
    window.setTimeout(function () {
      door.classList.remove('door-pressed');
      resetDoorMotion(true);
    }, reducedMotion ? 0 : 460);
    window.setTimeout(function () {
      hero.classList.remove('door-awake');
    }, reducedMotion ? 0 : 900);
  }

  door.addEventListener('pointerenter', function (event) {
    doorMotion.hovering = true;
    addDoorReflectionRipple(event, true);
  });
  door.addEventListener('pointermove', function (event) {
    if (reducedMotion) return;
    var rect = door.getBoundingClientRect();
    var nx = (event.clientX - rect.left) / rect.width - 0.5;
    var ny = (event.clientY - rect.top) / rect.height - 0.5;
    doorMotion.targetX = nx * 4.2;
    doorMotion.targetY = ny * 2.4;
    doorMotion.targetRX = -ny * 2.8;
    doorMotion.targetRY = nx * 5.2;
    addDoorReflectionRipple(event, false);
  });
  door.addEventListener('pointerleave', function () {
    resetDoorMotion(false);
  });

  document.getElementById('sidebarOpen').addEventListener('click', dissolveLogoAndOpen);
  document.getElementById('railSearch').addEventListener('click', openSearch);
  document.getElementById('sidebarClose').addEventListener('click', closeSidebar);
  backdrop.addEventListener('click', closeSidebar);
  door.addEventListener('click', awakenDoor);
  document.getElementById('discoverButton').addEventListener('click', function () {
    document.getElementById('content').scrollIntoView({ behavior: reducedMotion ? 'auto' : 'smooth' });
  });

  document.addEventListener('keydown', function (event) {
    if (event.key !== 'Escape') return;
    if (searchOverlay.classList.contains('open')) closeSearch();
    else closeSidebar();
  });
  document.addEventListener('pointerdown', function (event) {
    if (!compactSidebarQuery.matches || !document.body.classList.contains('sidebar-open')) return;
    if (sidebar.contains(event.target)) return;
    closeSidebar();
  });

  document.getElementById('sidebarSearchFocus').addEventListener('click', openSearch);
  document.getElementById('searchClose').addEventListener('click', closeSearch);
  siteSearch.addEventListener('input', renderSearchResults);
  searchOverlay.addEventListener('click', function (event) {
    if (event.target === searchOverlay) closeSearch();
  });
  searchResults.addEventListener('click', function (event) {
    if (event.target.closest('.search-result')) closeSearch();
  });
  sidebarNav.addEventListener('click', function (event) {
    if (event.target.closest('.sidebar-link')) closeSidebar();
  });
  document.getElementById('profileRow').addEventListener('click', function () {
    var content = document.getElementById('content');
    closeSidebar();
    content.scrollIntoView({ behavior: reducedMotion ? 'auto' : 'smooth' });
  });

  document.getElementById('themeToggle').addEventListener('click', function () {
    var current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'dark' ? 'light' : 'dark');
  });
  document.getElementById('railThemeToggle').addEventListener('click', function () {
    var current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'dark' ? 'light' : 'dark');
  });
  document.addEventListener('click', createClickBurst);

  art.addEventListener('load', resizeCanvas);
  window.addEventListener('resize', handleViewportChange);
  if (compactSidebarQuery.addEventListener) {
    compactSidebarQuery.addEventListener('change', handleViewportChange);
  } else {
    compactSidebarQuery.addListener(handleViewportChange);
  }
  document.getElementById('pageShell').addEventListener('transitionend', resizeCanvas);
  document.title = (typeof SITE_DATA !== 'undefined' && SITE_DATA.title) || '摸鱼神国';
  buildPortalCards();
  buildSidebar();
  renderSearchResults();
  syncThemeStatus();
  resizeCanvas();
  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
