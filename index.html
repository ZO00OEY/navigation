<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f8eeef">
<title>摸鱼神国</title>
<script>
(function () {
  var saved = localStorage.getItem('theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
})();
</script>
<link rel="stylesheet" href="guides/shared.css">
<link rel="stylesheet" href="styles/home.css">
</head>
<body>
<nav class="nav-rail" aria-label="快捷导航">
  <button class="rail-button rail-logo" id="sidebarOpen" type="button" aria-label="弹出侧边栏" data-tooltip="弹出侧边栏">
    <svg width="25" height="25" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2">
      <ellipse cx="11" cy="19" rx="9" ry="7"/>
      <path d="M20 12l7-6v18l-7-4"/>
      <circle cx="7" cy="18" r="1.5" fill="currentColor"/>
    </svg>
  </button>
  <div class="rail-spacer" aria-hidden="true"></div>
  <button class="rail-button" id="railSearch" type="button" aria-label="搜索" data-tooltip="搜索">
    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
      <circle cx="11" cy="11" r="7"/>
      <path d="M20 20l-4-4"/>
    </svg>
  </button>
  <button class="rail-button" id="railThemeToggle" type="button" aria-label="切换日夜模式" data-tooltip="切换日夜模式">
    <span id="railThemeIcon"></span>
  </button>
</nav>

<aside class="sidebar" id="sidebar" aria-hidden="true">
  <div class="sidebar-head">
    <div class="sidebar-title">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2">
        <ellipse cx="11" cy="19" rx="9" ry="7"/>
        <path d="M20 12l7-6v18l-7-4"/>
        <circle cx="7" cy="18" r="1.5" fill="currentColor"/>
      </svg>
      <span>摸鱼神国</span>
    </div>
    <div class="sidebar-actions">
      <button class="sidebar-icon-button" id="sidebarClose" type="button" aria-label="收起侧边栏">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <rect x="3" y="4" width="7" height="16" rx="2"/>
          <rect x="12" y="4" width="9" height="16" rx="2"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="sidebar-body">
    <nav class="sidebar-nav" id="sidebarNav" aria-label="站点导航"></nav>
  </div>
  <div class="sidebar-foot">
    <div class="sidebar-settings">
      <button class="sidebar-setting" id="sidebarSearchFocus" type="button" aria-label="搜索" title="搜索">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="11" cy="11" r="7"/>
          <path d="M20 20l-4-4"/>
        </svg>
      </button>
      <button class="sidebar-setting" type="button" aria-label="设置" title="设置">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.34 1.88l.06.06-2.83 2.83-.06-.06A1.7 1.7 0 0015 19.4a1.7 1.7 0 00-1 .6 1.7 1.7 0 00-.4 1.1V21h-4v-.1A1.7 1.7 0 008.6 19.4a1.7 1.7 0 00-1.88.34l-.06.06-2.83-2.83.06-.06A1.7 1.7 0 004.6 15a1.7 1.7 0 00-.6-1 1.7 1.7 0 00-1.1-.4H3v-4h.1A1.7 1.7 0 004.6 8.6a1.7 1.7 0 00-.34-1.88l-.06-.06 2.83-2.83.06.06A1.7 1.7 0 009 4.6a1.7 1.7 0 001-.6 1.7 1.7 0 00.4-1.1V3h4v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.88-.34l.06-.06 2.83 2.83-.06.06A1.7 1.7 0 0019.4 9c.15.37.37.7.65.98.28.28.66.43 1.05.42h.1v4h-.1a1.7 1.7 0 00-1.7.6z"/></svg>
      </button>
      <button class="sidebar-setting" id="themeToggle" type="button" aria-label="切换日夜模式" title="切换日夜模式">
        <span id="themeIcon"></span>
      </button>
    </div>
    <div class="profile-row" id="profileRow"></div>
  </div>
</aside>
<div class="search-overlay" id="searchOverlay" aria-hidden="true">
  <div class="search-dialog" role="dialog" aria-modal="true" aria-label="搜索摸鱼神国">
    <div class="search-box">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="11" cy="11" r="7"/>
        <path d="M20 20l-4-4"/>
      </svg>
      <input id="siteSearch" type="search" placeholder="搜索教程、工具和站点…" autocomplete="off">
      <button class="search-close" id="searchClose" type="button" aria-label="关闭搜索">×</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<div class="page-shell" id="pageShell">
<section class="hero" id="hero" aria-label="摸鱼神国首页">
  <div class="hero-backdrop" aria-hidden="true"></div>
  <img class="hero-art" id="heroArt" src="concepts/watercolor-door-hero-v1.png" alt="">
  <canvas id="rippleCanvas" aria-hidden="true"></canvas>

  <div class="hero-copy">
    <div class="hero-eyebrow">A quiet doorway to somewhere else</div>
    <h1>
      <span class="title-line">在忙碌之外，</span>
      <span class="title-line title-line-accent">留一扇门。</span>
    </h1>
    <p>这里收着一些教程、工具和偶然发现的好东西。门没有催促你，只在水面尽头安静地等。</p>
  </div>

  <button class="hero-action" id="discoverButton" type="button">
    <span>向下看看</span>
    <span class="arrow">↓</span>
  </button>

  <canvas class="door-eraser" id="doorEraser" aria-hidden="true"></canvas>
  <button class="door-hotspot" id="doorHotspot" type="button" aria-label="推开门，打开侧边栏">
    <span class="door-visual" aria-hidden="true">
      <span class="door-visual-layer door-core">
        <img class="door-layer-image" src="concepts/watercolor-door-hero-v1.png" alt="">
      </span>
    </span>
  </button>
  <div class="door-aura" id="doorAura"></div>
  <div class="scroll-note">水面以下，还有一些东西</div>
</section>

<div class="water-to-paper" aria-hidden="true">
  <span></span>
</div>

<main class="content" id="content">
  <div class="content-inner">
    <div class="section-head">
      <div>
        <div class="section-kicker">BELOW THE SURFACE</div>
        <h2>潜入水面之下。</h2>
      </div>
      <p>首屏负责让人停下来，功能区负责让人顺利抵达。这里先沿用现有数据，把教程、工具与收藏重新整理成更安静的入口。</p>
    </div>
    <div class="portal-grid" id="portalGrid"></div>
  </div>
</main>

<section class="seabed-scene" id="seabedScene" aria-label="海底祈愿区">
  <img class="seabed-art" src="concepts/watercolor-seabed-footer-v2.png" alt="">
  <div class="seabed-fish-layer" id="seabedFishLayer" aria-hidden="true"></div>

  <div class="seabed-prayer">
    <p>
      执掌划水的
      <button class="fish-god" id="fishGod" type="button">摸鱼之神</button>
      啊，请赐予我 ——
    </p>
    <p>永远有年假的假象，永远不加班的自由，永远不必来的周一。</p>
  </div>

  <div class="shell-button" id="shellButton" data-shell-state="closed" role="button" tabindex="0" aria-label="打开祈愿贝壳" aria-expanded="false">
    <span class="shell-halo" aria-hidden="true"></span>
    <img class="shell-frame shell-frame-closed" src="concepts/shell/shell-closed.png" alt="">
    <img class="shell-frame shell-frame-half" src="concepts/shell/shell-half.png" alt="">
    <img class="shell-frame shell-frame-open" src="concepts/shell/shell-open.png" alt="">
    <button class="pearl-button" id="pearlButton" type="button" aria-label="点击珍珠，召唤摸鱼">
      <img class="shell-pearl" src="concepts/shell/shell-pearl.png" alt="">
    </button>
  </div>

  <div class="seabed-message" id="seabedMessage" role="status" aria-live="polite"></div>
  <div class="seabed-meta">
    <span>摸鱼神国 · 持续整理中</span>
    <span>愿你在工位得享片刻喘息</span>
  </div>
</section>
</div>

<script src="data.js"></script>
<script src="scripts/home-layout.js"></script>
<script src="scripts/home.js"></script>
<script src="scripts/seabed.js"></script>
</body>
</html>
