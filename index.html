<style>
/* ========== Reset & Variables ========== */

:root {
  --bg: #0a0a14;
  --card-bg: rgba(255,255,255,0.035);
  --card-border: rgba(255,255,255,0.07);
  --card-hover-bg: rgba(255,255,255,0.055);
  --card-hover-border: rgba(255,255,255,0.14);
  --card-shadow: rgba(0,0,0,0.25);
  --text: #e4e4ec;
  --text-secondary: #9494a8;
  --text-tertiary: #6b6b80;
  --search-bg: rgba(255,255,255,0.06);
  --search-border: rgba(255,255,255,0.1);
  --search-focus: rgba(140,150,255,0.35);
  --search-focus-bg: rgba(255,255,255,0.08);
  --search-focus-shadow: rgba(140,150,255,0.1);
  --gap: 14px;
  --radius: 18px;
  --link-color: #8fa8ff;
  --link-hover: #b8c8ff;
  --link-item-hover: rgba(255,255,255,0.05);
  --accent-1: rgba(120,140,255,0.28);
  --accent-2: rgba(100,220,180,0.28);
  --accent-3: rgba(220,150,255,0.28);
  --accent-4: rgba(255,180,120,0.28);
  --social-btn-bg: rgba(255,255,255,0.06);
  --social-btn-border: rgba(255,255,255,0.08);
  --social-btn-hover-bg: rgba(255,255,255,0.12);
  --social-btn-hover-border: rgba(255,255,255,0.18);
  --avatar-bg: linear-gradient(135deg, rgba(120,140,255,0.4), rgba(180,140,255,0.4));
  --avatar-color: #d0d4ff;
}

[data-theme="light"] {
  --bg: #f3eff3;
  --card-bg: rgba(255,255,255,0.62);
  --card-border: rgba(0,0,0,0.06);
  --card-hover-bg: rgba(255,255,255,0.82);
  --card-hover-border: rgba(251,114,153,0.22);
  --card-shadow: rgba(0,0,0,0.06);
  --text: #18181e;
  --text-secondary: #6b6b80;
  --text-tertiary: #999;
  --search-bg: rgba(0,0,0,0.03);
  --search-border: rgba(0,0,0,0.08);
  --search-focus: rgba(251,114,153,0.4);
  --search-focus-bg: rgba(251,114,153,0.05);
  --search-focus-shadow: rgba(251,114,153,0.12);
  --link-color: #d44070;
  --link-hover: #fb7299;
  --link-item-hover: rgba(0,0,0,0.04);
  --accent-1: rgba(251,114,153,0.22);
  --accent-2: rgba(80,200,170,0.22);
  --accent-3: rgba(150,110,220,0.22);
  --accent-4: rgba(255,150,80,0.22);
  --social-btn-bg: rgba(0,0,0,0.04);
  --social-btn-border: rgba(0,0,0,0.08);
  --social-btn-hover-bg: rgba(0,0,0,0.08);
  --social-btn-hover-border: rgba(0,0,0,0.15);
  --avatar-bg: linear-gradient(135deg, rgba(251,114,153,0.35), rgba(200,140,200,0.35));
  --avatar-color: #b04060;
}

body { line-height: 1.5; overflow-x: hidden; }


/* ---- Blob size overrides ---- */
.blob { filter: blur(120px); opacity: 0.32; }
.blob-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(80,100,220,0.5), transparent); top: -200px; left: -150px; }
.blob-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(140,80,200,0.4), transparent); top: 50%; right: -200px; transform: translateY(-50%); }
.blob-3 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(60,180,160,0.35), transparent); bottom: -150px; left: 30%; }
[data-theme="light"] .blob-1 { background: radial-gradient(circle, rgba(251,130,160,0.42), transparent); }
[data-theme="light"] .blob-2 { background: radial-gradient(circle, rgba(220,150,200,0.36), transparent); }
[data-theme="light"] .blob-3 { background: radial-gradient(circle, rgba(255,180,140,0.32), transparent); }
[data-theme="light"] .blob { opacity: 0.35; }


/* ========== Layout ========== */
.app { position: relative; z-index: 1; max-width: 880px; margin: 0 auto; padding: 40px 24px 60px; }

.header { display: flex; align-items: center; gap: 14px; margin-bottom: 0; flex-wrap: wrap; }
.header-avatar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
.header-avatar {
  width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
  background: var(--avatar-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; font-weight: 600; color: var(--avatar-color);
}
.header-avatar-img {
  width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
  object-fit: cover; border: 2px solid var(--card-border);
}
.header-avatar-cap { font-size: 0.65rem; color: var(--text-tertiary); letter-spacing: 0.04em; }
.header-info { display: flex; flex-direction: column; gap: 2px; }
.header-info .hi-name { font-size: 1.05rem; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
.header-info .hi-sub  { font-size: 0.8rem; color: var(--text-secondary); display: flex; align-items: center; flex-wrap: wrap; gap: 2px; }
.header-info .hi-sub a { color: var(--link-color); text-decoration: none; transition: color 0.2s; font-weight: 500; }
.header-info .hi-sub a:hover { color: var(--link-hover); }
.header-info .hi-sep { color: var(--text-tertiary); margin: 0 3px; opacity: 0.4; }

/* ========== Top Row ========== */
.top-row {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 24px; margin-bottom: 20px;
}

/* ========== Search ========== */
.search-wrap { flex-shrink: 0; width: 340px; padding-top: 4px; }
.search-box { position: relative; width: 100%; }
.search-box input {
  width: 100%; padding: 12px 16px 12px 40px;
  background: var(--search-bg); border: 1px solid var(--search-border);
  border-radius: 12px; color: var(--text); font-size: 0.9rem;
  outline: none; transition: all 0.25s;
}
.search-box input::placeholder { color: var(--text-tertiary); }
.search-box input:focus { border-color: var(--search-focus); background: var(--search-focus-bg); box-shadow: 0 0 0 3px var(--search-focus-shadow); }
.search-box .search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--link-color); display: flex; align-items: center; pointer-events: none;
}
.search-clear {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--text-tertiary); cursor: pointer;
  font-size: 1rem; padding: 2px 6px; border-radius: 4px; display: none;
  transition: color 0.15s;
}
.search-clear:hover { color: var(--text); }
.search-clear.visible { display: block; }

/* ========== Bento Grid ========== */
.bento-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: auto;
  gap: var(--gap);
}

/* ========== Card Base ========== */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 22px 24px;
  transition: all 0.3s ease;
  overflow: hidden;
  position: relative;
  min-height: 0;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  opacity: 0; transition: opacity 0.3s;
}
.card:hover {
  background: var(--card-hover-bg);
  border-color: var(--card-hover-border);
  transform: translateY(-1px);
  box-shadow: 0 8px 32px var(--card-shadow);
}
.card:hover::before { opacity: 1; }
.card-header { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; }
.card-header .card-icon { display: flex; align-items: center; color: var(--link-color); }
.card-header .card-title { font-size: 0.95rem; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
.card-toggle-text {
  margin-left: auto; font-size: 0.7rem; color: var(--text-tertiary);
  flex-shrink: 0; transition: color 0.2s;
}
.card-toggle-text:hover { color: var(--link-color); }
.card-toggle-text .ct-expand { display: none; }
.card-toggle-text .ct-collapse { display: inline; }
.card.is-card-collapsed .card-toggle-text .ct-expand { display: inline; }
.card.is-card-collapsed .card-toggle-text .ct-collapse { display: none; }
.card.is-card-collapsed .card-header { margin-bottom: 8px; }
.card-more {
  font-size: 0.65rem; color: var(--link-color); text-decoration: none;
  padding: 2px 6px; border-radius: 4px; transition: all 0.2s; white-space: nowrap;
  margin-left: auto;
}
.card-more:hover { background: var(--link-item-hover); color: var(--link-hover); }

.view-toggle {
  margin-left: 6px; background: none; border: 1px solid var(--card-border);
  color: var(--text-tertiary); font-size: 0.85rem; cursor: pointer;
  padding: 2px 6px; border-radius: 6px; transition: all 0.2s;
  line-height: 1; flex-shrink: 0;
}
.view-toggle:hover { color: var(--text); border-color: var(--card-hover-border); background: var(--link-item-hover); }

/* Card accent colors */
.card.accent-1::before { background: linear-gradient(90deg, rgba(120,140,255,0.8), transparent); }
.card.accent-2::before { background: linear-gradient(90deg, rgba(100,220,180,0.8), transparent); }
.card.accent-3::before { background: linear-gradient(90deg, rgba(220,150,255,0.8), transparent); }
.card.accent-4::before { background: linear-gradient(90deg, rgba(255,180,120,0.8), transparent); }

/* ========== Nav-Links Card ========== */
.subcat {
  margin-bottom: 10px;
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 12px; overflow: hidden;
  transition: all 0.25s;
}
.subcat:last-child { margin-bottom: 0; }
.subcat:hover { border-color: var(--card-hover-border); }
.subcat-name {
  font-size: 0.74rem; font-weight: 600;
  letter-spacing: 0.04em; color: var(--text-secondary);
  padding: 10px 14px;
  user-select: none; transition: color 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.subcat-name:hover { color: var(--text); }
.subcat-label { flex-shrink: 0; }
.subcat-badge {
  font-size: 0.62rem; font-weight: 500; color: var(--text-tertiary);
  background: var(--search-bg); border-radius: 8px; padding: 1px 7px;
  flex-shrink: 0;
}
.subcat-actions {
  margin-left: auto; display: flex; align-items: center; gap: 4px;
  flex-shrink: 0;
}
.subcat-expand {
  font-size: 0.65rem; color: var(--text-tertiary); cursor: pointer;
  background: none; border: none; padding: 2px 6px; border-radius: 4px;
  transition: color 0.2s; white-space: nowrap;
}
.subcat-expand:hover { color: var(--link-color); }
.subcat-more {
  font-size: 0.65rem; color: var(--link-color); text-decoration: none;
  padding: 2px 6px; border-radius: 4px; transition: all 0.2s; white-space: nowrap;
}
.subcat-more:hover { background: var(--link-item-hover); color: var(--link-hover); }
.subcat .expand-hint { display: none; }
.subcat .collapse-hint { display: inline; }
.subcat.is-collapsed .expand-hint { display: inline; }
.subcat.is-collapsed .collapse-hint { display: none; }
.subcat.is-expanded .expand-hint { display: none; }
.subcat.is-expanded .collapse-hint { display: inline; }
.subcat-body {
  padding: 0 8px 8px 8px;
  transition: max-height 0.35s ease; overflow: hidden;
}
.subcat.is-collapsed .subcat-body { max-height: 0; padding-top: 0; padding-bottom: 0; opacity: 0; }
.subcat:not(.is-expanded) .link-extra { display: none; }

.card-footer-link {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px; margin-bottom: 10px; border-radius: 10px;
  text-decoration: none; transition: all 0.2s;
  background: var(--accent-1); border: 1px solid transparent;
}
.card-footer-link:hover { border-color: var(--link-color); transform: translateY(-1px); }
.cfl-badge {
  font-size: 0.7rem; font-weight: 600; color: var(--link-color);
  background: var(--card-bg); padding: 2px 10px; border-radius: 6px;
  white-space: nowrap; flex-shrink: 0;
}
.cfl-desc {
  font-size: 0.72rem; color: var(--text-secondary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.card-footer-link .link-arrow {
  margin-left: auto; font-size: 0.7rem; color: var(--link-color);
  flex-shrink: 0; transition: transform 0.2s;
}
.card-footer-link:hover .link-arrow { transform: translateX(3px); }

/* ========== Flat Subs ========== */
.flat-subs { display: flex; flex-direction: column; gap: 10px; }
.fs-header {
  font-size: 0.74rem; font-weight: 600;
  color: var(--text-secondary); letter-spacing: 0.04em;
  padding: 0 4px 4px; margin-bottom: 2px;
  border-bottom: 1px solid var(--card-border);
  display: flex; align-items: baseline; gap: 6px;
}
.fs-header .fs-more {
  font-size: 0.62rem; color: var(--link-color); text-decoration: none;
  margin-left: auto; font-weight: 400;
}
.fs-header .fs-more:hover { color: var(--link-hover); }
.fs-links { display: flex; flex-direction: column; padding-left: 8px; }
.fs-links .link-item { margin: 0 -4px; }

/* ========== Grid Subs ========== */
.grid-subs { column-count: 3; column-gap: 16px; }
.gs-section { break-inside: avoid; margin-bottom: 12px; }
.gs-header {
  font-size: 0.72rem; font-weight: 600;
  color: var(--text-secondary); letter-spacing: 0.04em;
  padding: 0 4px 4px; margin-bottom: 4px;
  border-bottom: 1px solid var(--card-border);
}
.gs-links { display: flex; flex-direction: column; padding-left: 8px; gap: 1px; }
.gs-links .link-item { margin: 0; }

.link-item {
  display: flex; align-items: baseline; gap: 8px;
  padding: 7px 10px; border-radius: 8px;
  text-decoration: none; color: var(--text);
  transition: all 0.15s;
  margin: 0 -6px;
}
.link-item:hover { background: var(--link-item-hover); }
.link-title {
  font-size: 0.85rem; font-weight: 500; color: var(--link-color);
  white-space: nowrap; flex-shrink: 0;
  transition: color 0.15s;
}
.link-item:hover .link-title { color: var(--link-hover); }
.link-desc {
  font-size: 0.78rem; color: var(--text-secondary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.link-item .link-arrow {
  margin-left: auto; font-size: 0.7rem; color: var(--text-tertiary);
  opacity: 0; transition: opacity 0.15s; flex-shrink: 0;
}
.link-item:hover .link-arrow { opacity: 1; }

/* Flat links (no subcategories) */
.flat-links { display: flex; flex-direction: column; }
.flat-links.dual { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
.flat-links.dual .link-desc { display: none; }

/* ========== Tabs Layout ========== */
.tabs-layout { display: flex; gap: 0; padding: 0; }
.tabs-nav {
  width: 178px; flex-shrink: 0;
  border-right: 1px solid var(--card-border);
  display: flex; flex-direction: column;
  overflow-y: auto; max-height: 380px;
}
.tab-item {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 14px; border: none; background: none;
  color: var(--text-secondary); font-size: 0.78rem;
  cursor: pointer; text-align: left;
  transition: all 0.2s;
  border-left: 2px solid transparent;
  font-family: inherit;
}
.tab-item:hover { color: var(--text); background: var(--link-item-hover); }
.tab-item.active {
  color: var(--link-color); background: var(--link-item-hover);
  border-left-color: var(--link-color);
}
.tab-item .tab-badge {
  font-size: 0.6rem; color: var(--text-tertiary);
  background: var(--search-bg); border-radius: 8px;
  padding: 0px 6px; margin-left: auto;
}
.tab-item.active .tab-badge { color: var(--link-color); }
.tabs-panels { flex: 1; min-width: 0; padding: 8px 12px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.tab-panel.multi.active { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
.tab-panel .link-item { margin: 0 -4px; }
.tab-panel-footer {
  margin-top: 8px; padding-top: 8px;
  border-top: 1px solid var(--card-border);
  text-align: right;
}
.tab-panel-footer a {
  font-size: 0.7rem; color: var(--link-color); text-decoration: none;
}
.tab-panel-footer a:hover { color: var(--link-hover); }

/* ========== Card Hidden (search filter) ========== */
.card.hidden { display: none; }

/* ========== No Results ========== */
.no-results {
  display: none; grid-column: 1 / -1; text-align: center;
  padding: 48px 24px; color: var(--text-secondary); font-size: 0.9rem;
}
.no-results.visible { display: block; }

/* ========== Footer ========== */
.footer { text-align: center; margin-top: 48px; padding-top: 24px; }
.footer span { font-size: 0.72rem; color: var(--text-tertiary); opacity: 0.6; }
.footer-poem {
  margin-top: 16px; padding-top: 16px;
  border-top: 1px solid var(--card-border);
  font-size: 0.72rem; color: var(--text-tertiary);
  line-height: 2; opacity: 0.5;
}
.footer-poem em { font-style: normal; color: var(--link-color); opacity: 0.7; }

/* ========== Responsive ========== */
@media (max-width: 900px) {
  .bento-grid { grid-template-columns: repeat(2, 1fr); }
  .app { padding: 28px 16px 40px; }
  .blob-1 { width: 350px; height: 350px; top: -120px; left: -80px; }
  .blob-2 { width: 300px; height: 300px; right: -120px; }
  .blob-3 { width: 250px; height: 250px; bottom: -80px; }
  .top-row { flex-direction: column; gap: 10px; }
  .search-wrap { width: 100%; }
  .grid-subs { column-count: 2; }
}
@media (max-width: 560px) {
  .bento-grid { grid-template-columns: 1fr; }
  .card { padding: 18px; }
  .flat-links.dual { grid-template-columns: 1fr; }
  .grid-subs { column-count: 1; }
  .tabs-layout { flex-direction: column; }
  .tabs-nav {
    flex-direction: row; width: 100%; max-height: none;
    overflow-x: auto; overflow-y: hidden;
    border-right: none; border-bottom: 1px solid var(--card-border);
  }
  .tab-item {
    white-space: nowrap; border-left: none;
    border-bottom: 2px solid transparent;
  }
  .tab-item.active { border-left-color: transparent; border-bottom-color: var(--link-color); }
  .tab-panel.multi.active { grid-template-columns: 1fr; }
  .header-avatar, .header-avatar-img { width: 40px; height: 40px; }
  .header-avatar { font-size: 1rem; }
  .top-row { flex-direction: column; gap: 8px; }
  .search-wrap { width: 100%; }
}
</style>
</head>

<script>
(function() {
  const ACCENTS = ['accent-1','accent-2','accent-3','accent-4'];
  const grid = document.getElementById('bentoGrid');
  const noResults = document.getElementById('noResults');
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');

  var viewModes = {};
  try { viewModes = JSON.parse(localStorage.getItem('viewModes') || '{}'); } catch(e) { viewModes = {}; }

  function getViewMode(idx, defaultLayout) {
    return viewModes[idx] || defaultLayout;
  }
  function setViewMode(idx, mode) {
    viewModes[idx] = mode;
    localStorage.setItem('viewModes', JSON.stringify(viewModes));
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function getIconSvg(icon) {
    var s = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">';
    if (icon === '📚') s += '<path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>';
    else if (icon === '🛠️') s += '<path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>';
    else if (icon === '🌐') s += '<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>';
    else return icon;
    return s + '</svg>';
  }

  // ========== Render header ==========
  function renderHeader() {
    const profile = SITE_DATA.blocks.find(function(b) { return b.type === 'profile'; });
    if (!profile) return;
    const h = document.getElementById('siteHeader');
    const initial = (profile.name || '?')[0];
    let avatarHtml;
    if (profile.avatar) {
      avatarHtml = '<img class="header-avatar-img" src="' + esc(profile.avatar) + '" alt="avatar">';
    } else {
      avatarHtml = '<div class="header-avatar">' + esc(initial) + '</div>';
    }
    let html = '<div class="header-avatar-col">';
    html += avatarHtml;
    if (profile.username) html += '<span class="header-avatar-cap">' + esc(profile.username) + '</span>';
    html += '</div>';
    html += '<div class="header-info">';
    html += '<span class="hi-name">' + esc(profile.name) + '</span>';
    html += '<span class="hi-sub hi-bio">' + esc(profile.bio || '') + '</span>';
    if (profile.socials && profile.socials.length) {
      html += '<span class="hi-sub hi-links">';
      profile.socials.forEach(function(s, i) {
        if (i > 0) html += '<span class="hi-sep">·</span>';
        html += '<a href="' + esc(s.url) + '">' + esc(s.name) + '</a>';
      });
      html += '</span>';
    }
    html += '</div>';
    h.innerHTML = html;
  }

  document.title = SITE_DATA.title;
  document.getElementById('footerInfo').textContent = '🌱 持续更新中';

  // ========== Render blocks ==========

  function renderNavLinks(block) {
    const VISIBLE = 5;
    let html = '';
    if (block.subcategories && block.subcategories.length) {
      block.subcategories.forEach(function(sub) {
        const links = sub.links || [];
        const hasMore = links.length > VISIBLE;
        html += '<div class="subcat' + (hasMore ? ' is-collapsed' : '') + '">';
        html += '<div class="subcat-name">';
        html += '<span class="subcat-label">' + esc(sub.name) + '</span>';
        html += '<span class="subcat-badge">' + links.length + '</span>';
        html += '<span class="subcat-actions">';
        if (hasMore) {
          html += '<button class="subcat-expand">' +
            '<span class="expand-hint">展开</span>' +
            '<span class="collapse-hint">收起</span>' +
            '</button>';
        }
        if (sub.page) {
          html += '<a class="subcat-more" href="detail.html?page=' + esc(sub.page) + '">更多</a>';
        }
        html += '</span>';
        html += '</div>';
        html += '<div class="subcat-body' + (links.length >= 4 ? ' multi' : '') + '">';
        links.forEach(function(link, i) {
          html += '<a href="' + esc(link.url) + '" class="link-item' + (i >= VISIBLE ? ' link-extra' : '') + '"' + (link.target ? ' target="' + link.target + '" rel="noopener"' : '') + ' data-searchable>' +
            '<span class="link-title">' + esc(link.title) + '</span>' +
            (link.desc ? '<span class="link-desc">' + esc(link.desc) + '</span>' : '') +
            '<span class="link-arrow">→</span></a>';
        });
        html += '</div>';
        html += '</div>';
      });
    } else if (block.links && block.links.length) {
      const dual = block.links.length > 3 ? ' dual' : '';
      html += '<div class="flat-links' + dual + '">';
      block.links.forEach(function(link) { html += renderLink(link); });
      html += '</div>';
    }
    return html;
  }

  function renderLink(link) {
    return '<a href="' + esc(link.url) + '" class="link-item"' + (link.target ? ' target="' + link.target + '" rel="noopener"' : '') + ' data-searchable>' +
      '<span class="link-title">' + esc(link.title) + '</span>' +
      (link.desc ? '<span class="link-desc">' + esc(link.desc) + '</span>' : '') +
      '<span class="link-arrow">→</span></a>';
  }

  function renderFlatSubs(block) {
    let html = '<div class="flat-subs">';
    block.subcategories.forEach(function(sub) {
      html += '<div class="fs-section">';
      html += '<div class="fs-header">' + esc(sub.name);
      if (sub.page) html += '<a class="fs-more" href="detail.html?page=' + esc(sub.page) + '">更多 →</a>';
      html += '</div><div class="fs-links">';
      (sub.links || []).forEach(function(link) { html += renderLink(link); });
      html += '</div></div>';
    });
    html += '</div>';
    return html;
  }

  function renderGridSubs(block) {
    let html = '<div class="grid-subs">';
    block.subcategories.forEach(function(sub) {
      html += '<div class="gs-section">';
      html += '<div class="gs-header">' + esc(sub.name);
      if (sub.page) html += '<a class="gs-more" href="detail.html?page=' + esc(sub.page) + '">更多 →</a>';
      html += '</div><div class="gs-links">';
      (sub.links || []).forEach(function(link) { html += renderLink(link); });
      html += '</div></div>';
    });
    html += '</div>';
    return html;
  }

  function renderTabs(block) {
    var html = '<div class="tabs-layout">';
    html += '<div class="tabs-nav">';
    block.subcategories.forEach(function(sub, i) {
      html += '<button class="tab-item' + (i === 0 ? ' active' : '') + '" data-tab="' + i + '">';
      html += esc(sub.name);
      html += '<span class="tab-badge">' + (sub.links || []).length + '</span>';
      html += '</button>';
    });
    html += '</div>';
    html += '<div class="tabs-panels">';
    block.subcategories.forEach(function(sub, i) {
      var multi = (sub.links || []).length >= 4 ? ' multi' : '';
      html += '<div class="tab-panel' + multi + (i === 0 ? ' active' : '') + '" data-tab="' + i + '">';
      (sub.links || []).forEach(function(link) {
        html += renderLink(link);
      });
      if (sub.page) {
        html += '<div class="tab-panel-footer"><a href="detail.html?page=' + esc(sub.page) + '">更多 →</a></div>';
      }
      html += '</div>';
    });
    html += '</div>';
    html += '</div>';
    return html;
  }

  function renderCardInner(block, blockIndex) {
    var hasSubcats = block.subcategories && block.subcategories.length;
    var layout = block.layout || '';
    var effectiveLayout = getViewMode(blockIndex, layout);
    var canToggle = hasSubcats && layout === 'grid';
    var inner = '';
    inner += '<div class="card-header">';
    if (block.icon) inner += '<span class="card-icon">' + getIconSvg(block.icon) + '</span>';
    inner += '<span class="card-title">' + esc(block.name) + '</span>';
    if (canToggle) {
      var isAlt = effectiveLayout === 'tabs';
      inner += '<button class="view-toggle" data-block="' + blockIndex + '" title="' + (isAlt ? '网格视图' : '列表视图') + '">';
      inner += isAlt ? '⊞' : '☰';
      inner += '</button>';
    }
    if (hasSubcats && !effectiveLayout) inner += '<span class="card-toggle-text"><span class="ct-expand">展开</span><span class="ct-collapse">收起</span></span>';
    if (hasSubcats && block.page) inner += '<a class="card-more" href="detail.html?page=' + esc(block.page) + '">更多</a>';
    inner += '</div>';
    if (block.cardFooter) {
      inner += '<a href="' + esc(block.cardFooter.url) + '" class="card-footer-link" data-searchable>' +
        '<span class="cfl-badge">' + esc(block.cardFooter.title) + '</span>' +
        '<span class="cfl-desc">' + esc(block.cardFooter.desc) + '</span>' +
        '<span class="link-arrow">→</span></a>';
    }
    if (effectiveLayout === 'flat') inner += renderFlatSubs(block);
    else if (effectiveLayout === 'grid') inner += renderGridSubs(block);
    else if (effectiveLayout === 'tabs') inner += renderTabs(block);
    else inner += renderNavLinks(block);
    return { inner: inner, isCollapsible: hasSubcats && !effectiveLayout };
  }

  function renderAll() {
    grid.innerHTML = '';
    let accentIdx = 0;
    SITE_DATA.blocks.forEach(function(block, blockIndex) {
      if (block.type === 'profile') return;
      const card = document.createElement('div');
      const origCols = block.cols || 4;
      const origRows = block.rows || 1;
      card.className = 'card ' + ACCENTS[accentIdx % ACCENTS.length];
      accentIdx++;
      card.style.gridColumn = 'span ' + origCols;
      card.style.gridRow = 'span ' + origRows;
      card.setAttribute('data-orig-cols', origCols);
      card.setAttribute('data-orig-rows', origRows);
      card.setAttribute('data-searchable', '');
      card.setAttribute('data-block-index', blockIndex);

      var result = renderCardInner(block, blockIndex);
      card.innerHTML = result.inner;
      if (result.isCollapsible) card.classList.add('is-collapsible');
      grid.appendChild(card);
    });
  }

  // ========== Search ==========
  function filterCards() {
    const q = searchInput.value.trim().toLowerCase();
    let anyVisible = false;

    if (!q) {
      searchClear.classList.remove('visible');
    } else {
      searchClear.classList.add('visible');
    }

    const cards = grid.querySelectorAll('.card');
    cards.forEach(function(card) {
      const text = (card.getAttribute('data-searchable') || '') + ' ' + (card.textContent || '').toLowerCase();
      if (!q || text.indexOf(q) !== -1) {
        card.classList.remove('hidden');
        anyVisible = true;
      } else {
        card.classList.add('hidden');
      }
    });

    if (!anyVisible && q) {
      noResults.classList.add('visible');
    } else {
      noResults.classList.remove('visible');
    }
  }

  searchInput.addEventListener('input', filterCards);
  searchClear.addEventListener('click', function() {
    searchInput.value = '';
    filterCards();
    searchInput.focus();
  });

  // ========== Responsive: clamp cols on small screens ==========
  function clampSpans() {
    const width = window.innerWidth;
    const cards = grid.querySelectorAll('.card');
    cards.forEach(function(card) {
      const origCols = parseInt(card.getAttribute('data-orig-cols'), 10) || 4;
      const origRows = parseInt(card.getAttribute('data-orig-rows'), 10) || 1;
      if (width <= 560) {
        card.style.gridColumn = 'span 1';
        card.style.gridRow = 'span ' + origRows;
      } else if (width <= 900) {
        card.style.gridColumn = 'span ' + Math.min(origCols, 2);
        card.style.gridRow = 'span ' + origRows;
      } else {
        card.style.gridColumn = 'span ' + origCols;
        card.style.gridRow = 'span ' + origRows;
      }
    });
  }

  window.addEventListener('resize', clampSpans);

  // ========== Card & Subcategory Toggle ==========
  grid.addEventListener('click', function(e) {
    if (e.target.closest('a')) return;
    const expandBtn = e.target.closest('.subcat-expand');
    if (expandBtn) {
      const sc = expandBtn.closest('.subcat');
      if (sc) sc.classList.toggle('is-expanded');
      return;
    }
    const tabItem = e.target.closest('.tab-item');
    if (tabItem) {
      var idx = tabItem.getAttribute('data-tab');
      var layout = tabItem.closest('.tabs-layout');
      layout.querySelectorAll('.tab-item').forEach(function(t) { t.classList.toggle('active', t === tabItem); });
      var panels = layout.querySelector('.tabs-panels');
      panels.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.toggle('active', p.getAttribute('data-tab') === idx); });
      return;
    }
    const viewToggle = e.target.closest('.view-toggle');
    if (viewToggle) {
      var blockIdx = parseInt(viewToggle.getAttribute('data-block'), 10);
      var card = viewToggle.closest('.card');
      var currentMode = getViewMode(blockIdx, 'grid');
      var newMode = currentMode === 'tabs' ? 'grid' : 'tabs';
      setViewMode(blockIdx, newMode);
      var block = SITE_DATA.blocks[blockIdx];
      var result = renderCardInner(block, blockIdx);
      card.innerHTML = result.inner;
      if (result.isCollapsible) card.classList.add('is-collapsible');
      else card.classList.remove('is-collapsible', 'is-card-collapsed');
      return;
    }
    const nameEl = e.target.closest('.subcat-name');
    if (nameEl) {
      const sc2 = nameEl.closest('.subcat');
      if (sc2) sc2.classList.toggle('is-collapsed');
      return;
    }
    const cardHeader = e.target.closest('.is-collapsible > .card-header');
    if (cardHeader) {
      const card = cardHeader.parentElement;
      const subcats = card.querySelectorAll('.subcat');
      let anyOpen = false;
      subcats.forEach(function(s) { if (!s.classList.contains('is-collapsed')) anyOpen = true; });
      subcats.forEach(function(s) { s.classList.toggle('is-collapsed', anyOpen); });
      card.classList.toggle('is-card-collapsed', anyOpen);
    }
  });

  // ========== Init ==========
  renderHeader();
  renderAll();
  clampSpans();
})();
</script>
</body>
</html>
