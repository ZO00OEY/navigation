<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杜一帆 - 汇得科技名片</title>
  <style>
    :root {
      --navy: #0a1b2c;
      --blue: #123b5b;
      --teal: #0d8f8a;
      --ice: #e8f1f3;
      --ink: #102335;
      --muted: #587080;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 1200px;
      height: 720px;
      margin: 0;
      overflow: hidden;
      background: #dce5e8;
      font-family: "Microsoft YaHei UI", "PingFang SC", sans-serif;
    }

    .card {
      position: relative;
      width: 1200px;
      height: 720px;
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 77% 16%, rgba(13, 143, 138, .12), transparent 26%),
        linear-gradient(112deg, #ffffff 0 64%, #edf4f5 64% 100%);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 18px;
      background: linear-gradient(180deg, var(--teal), var(--blue));
    }

    .grid {
      position: absolute;
      right: -110px;
      top: -235px;
      width: 630px;
      height: 630px;
      opacity: .25;
      transform: rotate(30deg);
      background-image:
        linear-gradient(rgba(18, 59, 91, .28) 1px, transparent 1px),
        linear-gradient(90deg, rgba(18, 59, 91, .28) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: linear-gradient(130deg, #000, transparent 72%);
    }

    .content {
      position: absolute;
      inset: 0 390px 0 0;
      padding: 62px 54px 52px 72px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .brand-mark {
      position: relative;
      width: 50px;
      height: 50px;
      border: 2px solid var(--teal);
      transform: rotate(45deg);
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      background: var(--teal);
    }

    .brand-mark::before { inset: 10px 22px; }
    .brand-mark::after { inset: 22px 10px; }

    .brand-cn {
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 8px;
      color: var(--navy);
    }

    .brand-en {
      margin-top: 2px;
      font: 600 13px/1.2 "Segoe UI", sans-serif;
      letter-spacing: 4px;
      color: var(--teal);
    }

    .identity {
      display: flex;
      align-items: end;
      gap: 20px;
      margin-top: 70px;
    }

    .name {
      font-size: 68px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 9px;
      color: var(--navy);
    }

    .role {
      margin-bottom: 5px;
      padding-left: 20px;
      border-left: 2px solid var(--teal);
      font-size: 25px;
      letter-spacing: 3px;
      color: var(--blue);
    }

    .contacts {
      display: grid;
      grid-template-columns: 1fr 1.15fr;
      gap: 20px 30px;
      margin-top: 52px;
      font-size: 22px;
    }

    .contact {
      display: flex;
      align-items: center;
      gap: 13px;
      min-width: 0;
    }

    .contact.address { grid-column: 1 / -1; }

    .icon {
      display: grid;
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid rgba(13, 143, 138, .38);
      border-radius: 50%;
      color: var(--teal);
      font: 700 15px/1 "Segoe UI", sans-serif;
    }

    .company-line {
      position: absolute;
      left: 72px;
      bottom: 48px;
      display: flex;
      align-items: center;
      gap: 18px;
      color: var(--muted);
      font-size: 17px;
      letter-spacing: 1px;
    }

    .company-line::before {
      content: "";
      width: 52px;
      height: 2px;
      background: var(--teal);
    }

    .qr-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 390px;
      height: 720px;
      padding: 76px 46px 50px;
      text-align: center;
      background: linear-gradient(180deg, rgba(10, 27, 44, .97), rgba(18, 59, 91, .97));
      color: white;
    }

    .qr-label {
      font-size: 25px;
      font-weight: 600;
      letter-spacing: 4px;
    }

    .qr-subtitle {
      margin: 10px 0 30px;
      font-size: 14px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, .62);
    }

    .qr-wrap {
      width: 298px;
      height: 298px;
      padding: 12px;
      border-radius: 8px;
      background: white;
      box-shadow: 0 22px 50px rgba(0, 0, 0, .24);
    }

    .qr-wrap img {
      display: block;
      width: 274px;
      height: 274px;
    }

    .scan {
      margin-top: 28px;
      font-size: 18px;
      letter-spacing: 3px;
    }

    .website {
      margin-top: 58px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, .16);
      font: 600 18px/1.2 "Segoe UI", sans-serif;
      letter-spacing: 2px;
      color: #9fd9d5;
    }

    .credentials {
      margin-top: 14px;
      font-size: 13px;
      line-height: 1.7;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, .55);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="grid"></div>
    <section class="content">
      <header class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <div class="brand-cn">汇得科技</div>
          <div class="brand-en">HUIDE TECHNOLOGY</div>
        </div>
      </header>

      <div class="identity">
        <div class="name">杜一帆</div>
        <div class="role">采购专员</div>
      </div>

      <div class="contacts">
        <div class="contact"><span class="icon">T</span><span>138 1798 6893</span></div>
        <div class="contact"><span class="icon">E</span><span>duyf@huide.com</span></div>
        <div class="contact address"><span class="icon">A</span><span>上海市金山区金山卫镇春华路 180 号</span></div>
      </div>

      <div class="company-line">聚氨酯制品研发、生产、销售与技术服务</div>
    </section>

    <aside class="qr-panel">
      <div class="qr-label">企业微信</div>
      <div class="qr-subtitle">WECom CONTACT</div>
      <div class="qr-wrap"><img src="qr-code.png" alt="杜一帆企业微信二维码"></div>
      <div class="scan">扫码添加联系人</div>
      <div class="website">WWW.HUIDE.COM</div>
      <div class="credentials">1997 年创立 · 2018 年上市<br>国家专精特新小巨人企业 · 国家绿色工厂</div>
    </aside>
  </main>
</body>
</html>
