<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据导出 - 供应链小工具</title>
<script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="../../../guides/shared.css">
<link rel="stylesheet" href="../../../guides/tutorial.css">
<style>
.link-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin: 10px 0; }
.link-table th, .link-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--card-border); }
.link-table th { color: var(--text-tertiary); font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; }
.link-table td a { color: var(--link-color); text-decoration: none; }
.link-table td a:hover { color: var(--link-hover); }
.link-table td { color: var(--text-secondary); }
.link-table tr:hover td { background: var(--link-item-hover); }
.footer { text-align: center; margin-top: 36px; padding-top: 20px; }
.footer span { font-size: 0.72rem; color: var(--text-tertiary); opacity: 0.6; }
</style>
</head>
<body style="padding:32px 28px">

<section class="step">
  <div class="step-head">
    <span class="step-num">07</span>
    <span class="step-title">数据导出</span>
  </div>
  <div class="step-body">
    <p>供应链相关数据的导出方式和注意事项：</p>
    <table class="link-table">
      <thead><tr><th>数据类型</th><th>导出方式</th><th>格式</th></tr></thead>
      <tbody>
        <tr><td>商品列表</td><td>商家后台 → 商品管理 → 导出</td><td>Excel</td></tr>
        <tr><td>库存报表</td><td>商家后台 → 库存管理 → 导出报表</td><td>Excel / CSV</td></tr>
        <tr><td>采购记录</td><td>商家后台 → 采购管理 → 导出记录</td><td>Excel</td></tr>
        <tr><td>物流明细</td><td>京东物流后台 → 报表中心</td><td>Excel</td></tr>
      </tbody>
    </table>
  </div>
</section>

<footer class="footer"><span>🌱 供应链小工具 · 数据导出</span></footer>

<script>
(function() {
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'set-theme') {
      document.documentElement.setAttribute('data-theme', e.data.theme);
    }
  });
})();
</script>
</body>
</html>
