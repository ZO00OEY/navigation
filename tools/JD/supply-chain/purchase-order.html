<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成纵向采购单 - 供应链小工具</title>
<script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="../../../guides/shared.css">
<link rel="stylesheet" href="../../../guides/tutorial.css">
<style>
.note-info { background: rgba(140,130,220,0.1); border-color: rgba(140,130,220,0.2); }
.footer { text-align: center; margin-top: 36px; padding-top: 20px; }
.footer span { font-size: 0.72rem; color: var(--text-tertiary); opacity: 0.6; }
</style>
</head>
<body style="padding:32px 28px">

<section class="step">
  <div class="step-head">
    <span class="step-num">08</span>
    <span class="step-title">生成纵向采购单</span>
  </div>
  <div class="step-body">
    <p>根据商品数据自动生成纵向格式采购单，方便提交审核与归档。</p>
    <div class="note note-info">
      <strong>🚧 功能预留：</strong>此工具正在规划中，具体功能待补充。
    </div>
  </div>
</section>

<footer class="footer"><span>🌱 供应链小工具 · 采购单</span></footer>

<script>
(function() {
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'set-theme') {
      document.documentElement.setAttribute('data-theme', e.data.theme);
    }
  });
})();
</script>
</body>
</html>
