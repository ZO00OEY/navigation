<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>供应链小工具 - 芝士的摸鱼站</title>
<script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="../../../guides/shared.css">
<style>
.bg-decor { overflow: visible; }
.blob { filter: blur(120px); opacity: 0.45; }
.blob-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(80,100,220,0.5), transparent); top: -200px; left: -150px; }
.blob-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(140,80,200,0.4), transparent); top: 50%; right: -200px; bottom: auto; transform: translateY(-50%); }
.blob-3 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(60,180,160,0.35), transparent); bottom: -150px; left: 30%; top: auto; }
[data-theme="light"] .blob { opacity: 0.35; }
[data-theme="light"] .blob-1 { background: radial-gradient(circle, rgba(251,130,160,0.42), transparent); }
[data-theme="light"] .blob-2 { background: radial-gradient(circle, rgba(220,150,200,0.36), transparent); }
[data-theme="light"] .blob-3 { background: radial-gradient(circle, rgba(255,180,140,0.32), transparent); }

.app { max-width: 900px; }

.back-link {
  display: inline-flex; align-items: center; gap: 4px;
  color: var(--text-tertiary); text-decoration: none;
  font-size: 0.82rem; transition: color 0.2s; margin-bottom: 20px;
}
.back-link:hover { color: var(--link-color); }

.card {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: var(--radius); padding: 48px 32px;
  text-align: center; color: var(--text-secondary); line-height: 1.8;
  box-shadow: 0 4px 24px var(--card-shadow);
}
.card .icon { font-size: 3rem; margin-bottom: 16px; }
.card h2 { font-size: 1.1rem; color: var(--text); margin-bottom: 8px; }

.footer { text-align: center; margin-top: 48px; }
.footer span { font-size: 0.72rem; color: var(--text-tertiary); opacity: 0.6; }
</style>
</head>
<body>

<div class="float-wrapper" id="floatWrapper">
  <div class="float-stack open" id="floatStack">
    <div class="bookmark-strip">
      <div class="bookmark-tab" id="floatHandle" title="展开工具栏" aria-label="展开工具栏"></div>
      <div class="bookmark-buttons">
        <button class="theme-toggle" id="themeToggle" title="切换主题" aria-label="切换日夜间模式"></button>
        <a href="../../../index.html" class="float-btn" title="返回导航">⌂</a>
        <button class="float-btn" id="backToTop" title="回到顶部">↑</button>
      </div>
    </div>
  </div>
  <div class="float-w"></div>
</div>

<div class="bg-decor"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

<div class="app">
  <a class="back-link" href="../../../index.html">← 返回导航</a>
  <div class="card">
    <div class="icon">🚧</div>
    <h2>即将上线</h2>
    <p>供应链小工具正在开发中…</p>
  </div>
  <footer class="footer"><span>🌱 供应链小工具</span></footer>
</div>

<script src="../../../guides/shared.js"></script>
</body>
</html>
