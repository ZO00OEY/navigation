<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>截图照片裁边 - 芝士的摸鱼站</title>
<script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="../../guides/shared.css">
<style>
.app { max-width: 1120px; }
.tool-card {
  padding: 0;
}
.tool-card h1 { font-size: 1.4rem; line-height: 1.35; margin-bottom: 8px; }
.subtitle { color: var(--text-secondary); font-size: 0.84rem; line-height: 1.7; margin-bottom: 20px; }
.drop-zone {
  display: grid;
  place-items: center;
  min-height: 132px;
  border: 1.5px dashed var(--card-hover-border);
  border-radius: 8px;
  background: var(--code-bg);
  color: var(--text-secondary);
  text-align: center;
  padding: 24px;
  transition: border-color 0.2s, background 0.2s;
}
.drop-zone.dragging { border-color: var(--link-color); background: var(--btn-link-bg); }
.drop-zone strong { color: var(--text); font-size: 0.96rem; display: block; margin-bottom: 6px; }
.file-input { display: none; }
.workspace {
  margin-top: 14px;
  border: 1px solid var(--card-border);
  border-radius: 8px;
  background: var(--card-bg);
  overflow: hidden;
}
.controls {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  gap: 16px;
  align-items: center;
  padding: 14px 16px;
}
.primary-actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.settings { display: grid; gap: 10px; justify-content: start; }
.btn {
  border: 1px solid var(--btn-link-border);
  background: var(--btn-link-bg);
  color: var(--text);
  border-radius: 10px;
  padding: 9px 14px;
  font-size: 0.84rem;
  text-decoration: none;
}
.btn:hover { background: var(--btn-link-hover-bg); }
.btn[disabled] { opacity: 0.45; pointer-events: none; }
.btn-primary { border-color: var(--link-color); color: var(--link-color); }
.btn-quiet { background: transparent; }
.range-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--text-secondary);
  font-size: 0.82rem;
}
.range-label input[type="range"] { width: 150px; }
.toggle-label {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  color: var(--text-secondary);
  font-size: 0.82rem;
  cursor: pointer;
}
.toggle-label input { position: absolute; width: 1px; height: 1px; opacity: 0; }
.toggle-track {
  position: relative;
  width: 36px;
  height: 20px;
  flex: 0 0 auto;
  border: 1px solid var(--card-hover-border);
  border-radius: 999px;
  background: var(--code-bg);
  transition: background 0.18s, border-color 0.18s;
}
.toggle-track::after {
  content: "";
  position: absolute;
  top: 2px;
  left: 2px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--text-tertiary);
  transition: transform 0.18s, background 0.18s;
}
.toggle-label input:checked + .toggle-track { border-color: var(--link-color); background: var(--btn-link-bg); }
.toggle-label input:checked + .toggle-track::after { transform: translateX(16px); background: var(--link-color); }
.toggle-label input:focus-visible + .toggle-track { outline: 2px solid var(--link-color); outline-offset: 2px; }
.status { color: var(--text-tertiary); font-size: 0.78rem; text-align: right; white-space: nowrap; }
.thumb-section {
  position: sticky;
  top: 0;
  z-index: 30;
  margin-top: 10px;
  border: 1px solid var(--card-border);
  border-radius: 8px;
  background: var(--bg);
  box-shadow: 0 6px 18px var(--card-shadow);
  padding: 12px 16px 14px;
}
.thumb-heading {
  display: flex;
  justify-content: space-between;
  color: var(--text-secondary);
  font-size: 0.78rem;
  margin-bottom: 10px;
}
.thumb-heading strong { color: var(--text); font-weight: 600; }
.thumb-list {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 0 0 4px;
}
.thumb {
  position: relative;
  flex: 0 0 92px;
  min-height: 124px;
  border: 1px solid var(--card-border);
  border-radius: 6px;
  background: transparent;
  color: var(--text-secondary);
  padding: 6px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
}
.thumb:hover, .thumb.active { border-color: var(--link-color); }
.thumb canvas {
  width: auto;
  height: auto;
  max-width: 78px;
  max-height: 96px;
  margin: 0 auto 5px;
  background: transparent;
}
.thumb span {
  display: block;
  overflow: hidden;
  font-size: 0.7rem;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.result-list { display: grid; gap: 16px; margin-top: 20px; }
.result-card {
  scroll-margin-top: 156px;
  border: 1px solid var(--card-border);
  border-radius: 8px;
  background: var(--card-bg);
  padding: 16px;
}
.result-head {
  display: grid;
  gap: 10px;
  justify-items: start;
  margin-bottom: 12px;
}
.file-name {
  color: var(--text);
  font-size: 0.9rem;
  font-weight: 600;
  word-break: break-all;
}
.meta { color: var(--text-tertiary); font-size: 0.78rem; }
.item-actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.item-setting {
  display: inline-flex;
  gap: 8px;
  align-items: center;
  color: var(--text-secondary);
  font-size: 0.8rem;
  padding: 4px 2px;
  cursor: pointer;
}
  .item-setting input {
    -webkit-appearance: none;
    appearance: none;
  width: 22px;
  height: 22px;
  flex: 0 0 22px;
  display: grid;
  place-items: center;
  border: 1.5px solid var(--card-hover-border);
  border-radius: 5px;
  background: var(--bg);
  transition: background 0.16s, border-color 0.16s;
}
.item-setting input::after {
  content: "✓";
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  line-height: 1;
  transform: scale(0);
  transition: transform 0.12s;
}
.item-setting input:checked { border-color: var(--link-color); background: var(--link-color); }
.item-setting input:checked::after { transform: scale(1); }
.item-setting input:focus-visible { outline: 2px solid var(--link-color); outline-offset: 2px; }
.preview-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}
.preview h2 {
  color: var(--text-secondary);
  font-size: 0.82rem;
  font-weight: 600;
  margin-bottom: 8px;
}
.canvas-wrap {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  height: auto;
  background: transparent;
  padding: 0;
}
canvas { display: block; max-width: 100%; max-height: 100%; width: auto; height: auto; }
.canvas-wrap canvas { max-height: 520px; border: 1px solid var(--card-border); border-radius: 4px; }
.footer { text-align: center; margin-top: 40px; }
.footer span { color: var(--text-tertiary); font-size: 0.72rem; opacity: 0.65; }
@media (max-width: 720px) {
  .preview-grid { grid-template-columns: 1fr; }
  .controls { grid-template-columns: 1fr; gap: 12px; }
  .settings { justify-content: stretch; }
  .status { text-align: left; }
  .btn { text-align: center; }
  .range-label { justify-content: space-between; }
  .canvas-wrap canvas { max-height: 58vh; }
}
</style>
</head>
<body>
<div class="app">
  <a class="back-link" href="../../detail.html?page=tools">← 返回工具目录</a>

  <main class="tool-card">
    <h1>截图照片裁边</h1>
    <p class="subtitle">上传手机截图后，自动找出中间连续的照片区域，裁掉上下方黑边或白边。小面积按钮、数字、时间戳会被当作界面杂物忽略。</p>

    <label class="drop-zone" id="dropZone">
      <input class="file-input" id="fileInput" type="file" accept="image/*" multiple>
      <span><strong>点击或拖入图片</strong>可一次选择多张，本地处理，不上传到服务器</span>
    </label>

    <section class="workspace" aria-label="批量处理设置">
      <div class="controls">
        <div class="primary-actions">
          <button class="btn btn-primary" id="downloadAllBtn" type="button" disabled>下载全部</button>
          <button class="btn btn-quiet" id="clearAllBtn" type="button" disabled>清除全部</button>
        </div>
        <div class="settings">
          <label class="range-label">
            识别灵敏度
            <input id="sensitivity" type="range" min="1" max="8" value="3">
          </label>
          <label class="toggle-label">
            <input id="overlayGlobalToggle" type="checkbox">
            <span class="toggle-track" aria-hidden="true"></span>
            <span>所有图片去掉边缘按钮和文字</span>
          </label>
          <label class="toggle-label">
            <input id="sideCropToggle" type="checkbox">
            <span class="toggle-track" aria-hidden="true"></span>
            <span>所有图片裁剪左右侧空白</span>
          </label>
        </div>
        <span class="status" id="status">等待图片</span>
      </div>
    </section>
    <div class="thumb-section" id="thumbSection" hidden>
      <div class="thumb-heading"><strong>图片导航</strong><span id="itemCount">共 0 张</span></div>
      <div class="thumb-list" id="thumbList" aria-label="裁剪结果快速预览"></div>
    </div>
    <div class="result-list" id="resultList"></div>
  </main>

  <footer class="footer"><span>🐾 通用摸鱼小工具</span></footer>
</div>

<script src="../../guides/shared.js"></script>
<script>
(function() {
  var fileInput = document.getElementById('fileInput');
  var dropZone = document.getElementById('dropZone');
  var sensitivity = document.getElementById('sensitivity');
  var overlayGlobalToggle = document.getElementById('overlayGlobalToggle');
  var sideCropToggle = document.getElementById('sideCropToggle');
  var statusText = document.getElementById('status');
  var downloadAllBtn = document.getElementById('downloadAllBtn');
  var clearAllBtn = document.getElementById('clearAllBtn');
  var thumbSection = document.getElementById('thumbSection');
  var itemCount = document.getElementById('itemCount');
  var thumbList = document.getElementById('thumbList');
  var resultList = document.getElementById('resultList');
  var items = [];

  function setStatus(text) {
    statusText.textContent = text;
  }

  function setHasItems(hasItems) {
    downloadAllBtn.disabled = !hasItems;
    clearAllBtn.disabled = !hasItems;
    thumbSection.hidden = !hasItems;
    itemCount.textContent = '共 ' + items.length + ' 张';
  }

  function loadFiles(fileList) {
    var files = Array.prototype.filter.call(fileList, function(file) {
      return file.type.match(/^image\//);
    });
    files.forEach(loadFile);
    if (files.length) setStatus('正在处理 ' + files.length + ' 张图片');
  }

  function loadFile(file) {
    if (!file || !file.type.match(/^image\//)) return;
    var reader = new FileReader();
    reader.onload = function() {
      var img = new Image();
      img.onload = function() {
        addItem(file, img);
        setStatus('已处理 ' + items.length + ' 张图片');
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

  function rowStats(imageData) {
    var data = imageData.data;
    var width = imageData.width;
    var height = imageData.height;
    var step = Math.max(1, Math.floor(width / 320));
    var stats = new Array(height);
    for (var y = 0; y < height; y++) {
      var background = 0;
      var total = 0;
      for (var x = 0; x < width; x += step) {
        var i = (y * width + x) * 4;
        var r = data[i];
        var g = data[i + 1];
        var b = data[i + 2];
        var max = Math.max(r, g, b);
        var min = Math.min(r, g, b);
        var luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        var nearlyBlack = luma < 24 && max - min < 22;
        var nearlyWhite = luma > 238 && max - min < 22;
        if (nearlyBlack || nearlyWhite) background++;
        total++;
      }
      stats[y] = { background: background / total };
    }
    return stats;
  }

  function smooth(values, radius) {
    var out = new Array(values.length);
    var sum = 0;
    for (var i = 0; i < values.length; i++) {
      sum += values[i];
      if (i > radius * 2) sum -= values[i - radius * 2 - 1];
      out[i] = sum / Math.min(i + 1, radius * 2 + 1);
    }
    return out;
  }

  function findCrop(stats, height) {
    var backgroundLimit = 0.91 + Number(sensitivity.value) * 0.01;
    var background = stats.map(function(row) { return row.background; });
    var active = smooth(background, 5).map(function(score) { return score <= backgroundLimit; });
    var best = { start: 0, end: height - 1, len: 0 };
    var start = -1;
    var gap = 0;
    for (var y = 0; y < height; y++) {
      if (active[y]) {
        if (start < 0) start = y;
        gap = 0;
      } else if (start >= 0 && ++gap > 16) {
        var end = y - gap;
        if (end - start > best.len) best = { start: start, end: end, len: end - start };
        start = -1;
        gap = 0;
      }
    }
    if (start >= 0 && height - 1 - start > best.len) best = { start: start, end: height - 1, len: height - 1 - start };
    if (best.len < height * 0.2) return { top: 0, bottom: height };
    while (best.start < best.end && stats[best.start].background > backgroundLimit) best.start++;
    while (best.end > best.start && stats[best.end].background > backgroundLimit) best.end--;
    return {
      top: best.start,
      bottom: best.end + 1
    };
  }

  function findSideCrop(imageData, crop) {
    var data = imageData.data;
    var width = imageData.width;
    var height = imageData.height;
    var step = Math.max(1, Math.floor((crop.bottom - crop.top) / 420));
    var backgroundLimit = 0.91 + Number(sensitivity.value) * 0.01;

    function columnBackground(x) {
      var background = 0;
      var total = 0;
      for (var y = crop.top; y < crop.bottom; y += step) {
        var i = (y * width + x) * 4;
        var r = data[i];
        var g = data[i + 1];
        var b = data[i + 2];
        var max = Math.max(r, g, b);
        var min = Math.min(r, g, b);
        var luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        if ((luma < 24 || luma > 238) && max - min < 22) background++;
        total++;
      }
      return background / total;
    }

    var left = 0;
    var right = width - 1;
    while (left < right && columnBackground(left) > backgroundLimit) left++;
    while (right > left && columnBackground(right) > backgroundLimit) right--;
    if (right - left < width * 0.2) return crop;
    crop.left = left;
    crop.right = right + 1;
    return crop;
  }

  function includeConnectedOverlay(imageData, crop) {
    var width = imageData.width;
    var height = imageData.height;
    var data = imageData.data;
    var step = Math.max(1, Math.ceil(width / 320));
    var gridWidth = Math.ceil(width / step);

    function classify(x, y) {
      var i = (Math.min(height - 1, y * step) * width + Math.min(width - 1, x * step)) * 4;
      var r = data[i];
      var g = data[i + 1];
      var b = data[i + 2];
      var max = Math.max(r, g, b);
      var min = Math.min(r, g, b);
      var luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
      return max - min < 24 ? (luma < 30 ? 1 : (luma > 232 ? 2 : 0)) : 0;
    }

    function connectedEdge(seedY, minY, maxY) {
      if (seedY < minY || seedY > maxY) return null;
      var gridHeight = Math.ceil(height / step);
      var startY = Math.max(0, Math.floor(minY / step));
      var endY = Math.min(gridHeight - 1, Math.floor(maxY / step));
      var y = Math.min(endY, Math.max(startY, Math.floor(seedY / step)));
      var counts = [0, 0, 0];
      for (var x = 0; x < gridWidth; x++) counts[classify(x, y)]++;
      var color = counts[1] >= counts[2] ? 1 : 2;
      if (counts[color] < gridWidth * 0.35) return null;

      var visited = new Uint8Array(gridWidth * (endY - startY + 1));
      var queue = [];
      for (x = 0; x < gridWidth; x++) {
        if (classify(x, y) === color) queue.push([x, y]);
      }
      var minFound = y;
      var maxFound = y;
      for (var q = 0; q < queue.length; q++) {
        var point = queue[q];
        x = point[0];
        y = point[1];
        var key = (y - startY) * gridWidth + x;
        if (visited[key] || classify(x, y) !== color) continue;
        visited[key] = 1;
        minFound = Math.min(minFound, y);
        maxFound = Math.max(maxFound, y);
        if (x > 0) queue.push([x - 1, y]);
        if (x + 1 < gridWidth) queue.push([x + 1, y]);
        if (y > startY) queue.push([x, y - 1]);
        if (y < endY) queue.push([x, y + 1]);
      }
      return { min: minFound * step, max: Math.min(height, (maxFound + 1) * step) };
    }

    function bottomOverlayTop(bottom) {
      var sampleStep = Math.max(1, Math.ceil(width / 600));
      var minY = Math.max(crop.top + 1, bottom - Math.min(Math.round(height * 0.12), Math.round(width * 0.22)));
      for (var y = minY; y < bottom; y++) {
        var run = 0;
        for (var x = 0; x < width; x += sampleStep) {
          var current = (y * width + x) * 4;
          var previous = ((y - 1) * width + x) * 4;
          var difference = Math.abs(data[current] - data[previous]) +
            Math.abs(data[current + 1] - data[previous + 1]) +
            Math.abs(data[current + 2] - data[previous + 2]);
          run = difference > 90 ? run + sampleStep : 0;
          if (run >= width * 0.12) return y;
        }
      }
      return bottom;
    }

    var reach = Math.round(height * 0.18);
    if (crop.top > 0) {
      var topOverlay = connectedEdge(crop.top - 1, 0, Math.min(height - 1, crop.top + reach));
      if (topOverlay) crop.top = Math.max(crop.top, topOverlay.max);
    }
    if (crop.bottom < height) {
      var originalBottom = crop.bottom;
      var bottomOverlay = connectedEdge(crop.bottom, Math.max(0, crop.bottom - reach), height - 1);
      if (bottomOverlay) crop.bottom = Math.min(crop.bottom, bottomOverlay.min);
      if (!bottomOverlay || originalBottom - crop.bottom < width * 0.03) crop.bottom = bottomOverlayTop(originalBottom);
    }
    if (crop.bottom - crop.top < height * 0.2) return findCrop(rowStats(imageData), height);
    return crop;
  }

  function addItem(file, img) {
    var card = document.createElement('section');
    card.className = 'result-card';
    card.innerHTML =
      '<div class="result-head">' +
        '<div><div class="file-name"></div><div class="meta"></div></div>' +
        '<div class="item-actions">' +
          '<label class="item-setting"><input class="overlay-check" type="checkbox"><span>去掉边缘按钮和文字</span></label>' +
          '<label class="item-setting"><input class="side-check" type="checkbox"><span>裁剪左右侧空白</span></label>' +
          '<button class="btn download-item" type="button">下载这张</button>' +
        '</div>' +
      '</div>' +
      '<div class="preview-grid">' +
        '<section class="preview"><h2>原图</h2><div class="canvas-wrap"><canvas></canvas></div></section>' +
        '<section class="preview"><h2>裁剪后</h2><div class="canvas-wrap"><canvas></canvas></div></section>' +
      '</div>';
    resultList.appendChild(card);

    var thumb = document.createElement('button');
    thumb.className = 'thumb';
    thumb.type = 'button';
    thumb.title = file.name;
    thumb.innerHTML = '<canvas width="72" height="88"></canvas><span></span>';
    thumb.querySelector('span').textContent = file.name;
    thumbList.appendChild(thumb);

    var canvases = card.querySelectorAll('canvas');
    var item = {
      file: file,
      img: img,
      card: card,
      sourceCanvas: canvases[0],
      resultCanvas: canvases[1],
      thumb: thumb,
      thumbCanvas: thumb.querySelector('canvas'),
      overlayCheck: card.querySelector('.overlay-check'),
      sideCheck: card.querySelector('.side-check'),
      downloadBtn: card.querySelector('.download-item'),
      meta: card.querySelector('.meta'),
      url: ''
    };
    item.overlayCheck.checked = overlayGlobalToggle.checked;
    item.sideCheck.checked = sideCropToggle.checked;
    card.querySelector('.file-name').textContent = file.name;
    item.downloadBtn.addEventListener('click', function() { downloadItem(item); });
    item.overlayCheck.addEventListener('change', function() { cropItem(item); });
    item.sideCheck.addEventListener('change', function() { cropItem(item); });
    thumb.addEventListener('click', function() {
      document.querySelectorAll('.thumb.active').forEach(function(node) { node.classList.remove('active'); });
      thumb.classList.add('active');
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    items.push(item);
    setHasItems(true);
    cropItem(item);
  }

  function drawThumb(canvas, source) {
    var scale = Math.min(78 / source.width, 96 / source.height);
    canvas.width = Math.max(1, Math.round(source.width * scale));
    canvas.height = Math.max(1, Math.round(source.height * scale));
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(source, 0, 0, canvas.width, canvas.height);
  }

  function cropItem(item) {
    var sourceCanvas = item.sourceCanvas;
    var resultCanvas = item.resultCanvas;
    var sourceCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
    var resultCtx = resultCanvas.getContext('2d');
    sourceCanvas.width = item.img.naturalWidth;
    sourceCanvas.height = item.img.naturalHeight;
    sourceCtx.drawImage(item.img, 0, 0);
    var imageData = sourceCtx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
    var removeOverlay = item.overlayCheck.checked;
    var cropSides = item.sideCheck.checked;
    var crop = findCrop(rowStats(imageData), sourceCanvas.height);
    if (removeOverlay) crop = includeConnectedOverlay(imageData, crop);
    crop.left = 0;
    crop.right = sourceCanvas.width;
    if (cropSides) crop = findSideCrop(imageData, crop);
    var cropHeight = crop.bottom - crop.top;
    var cropWidth = crop.right - crop.left;
    resultCanvas.width = cropWidth;
    resultCanvas.height = cropHeight;
    resultCtx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
    resultCtx.drawImage(sourceCanvas, crop.left, crop.top, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);
    drawThumb(item.thumbCanvas, resultCanvas);
    if (item.url) URL.revokeObjectURL(item.url);
    resultCanvas.toBlob(function(blob) {
      item.url = URL.createObjectURL(blob);
    }, 'image/png');
    item.meta.textContent = '已裁掉顶部 ' + crop.top + 'px，底部 ' + (sourceCanvas.height - crop.bottom) + 'px' +
      (cropSides ? '，左侧 ' + crop.left + 'px，右侧 ' + (sourceCanvas.width - crop.right) + 'px' : '') +
      (removeOverlay ? '，已去掉边缘按钮和文字' : '');
  }

  function cropAll() {
    items.forEach(cropItem);
    if (items.length) setStatus('已重新处理 ' + items.length + ' 张图片');
  }

  function setAll(setting, checked) {
    items.forEach(function(item) { item[setting].checked = checked; });
    cropAll();
  }

  function croppedName(name) {
    return name.replace(/\.[^.]+$/, '') + '-cropped.png';
  }

  function downloadItem(item) {
    if (!item.url) return;
    var a = document.createElement('a');
    a.href = item.url;
    a.download = croppedName(item.file.name);
    a.click();
  }

  function clearAll() {
    items.forEach(function(item) {
      if (item.url) URL.revokeObjectURL(item.url);
    });
    items = [];
    resultList.innerHTML = '';
    thumbList.innerHTML = '';
    fileInput.value = '';
    setHasItems(false);
    setStatus('等待图片');
  }

  dropZone.addEventListener('dragover', function(event) {
    event.preventDefault();
    dropZone.classList.add('dragging');
  });
  dropZone.addEventListener('dragleave', function() {
    dropZone.classList.remove('dragging');
  });
  dropZone.addEventListener('drop', function(event) {
    event.preventDefault();
    dropZone.classList.remove('dragging');
    loadFiles(event.dataTransfer.files);
  });
  fileInput.addEventListener('change', function() {
    loadFiles(fileInput.files);
  });
  sensitivity.addEventListener('input', cropAll);
  overlayGlobalToggle.addEventListener('change', function() { setAll('overlayCheck', overlayGlobalToggle.checked); });
  sideCropToggle.addEventListener('change', function() { setAll('sideCheck', sideCropToggle.checked); });
  clearAllBtn.addEventListener('click', clearAll);
  downloadAllBtn.addEventListener('click', function() {
    items.forEach(function(item, index) {
      setTimeout(function() { downloadItem(item); }, index * 120);
    });
  });
})();
</script>
</body>
</html>
