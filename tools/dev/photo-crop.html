<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>截图照片裁边 - 芝士的摸鱼站</title>
<script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="../../guides/shared.css">
<style>
.app { max-width: 1160px; padding-top: 32px; }
.tool-card { padding: 0; }
.tool-head { margin-bottom: 10px; }
.tool-card h1 { color: var(--text); font-size: 1.45rem; line-height: 1.3; margin-bottom: 6px; }
.subtitle { color: var(--text-secondary); font-size: 0.84rem; line-height: 1.7; }
.drop-zone {
  display: grid;
  place-items: center;
  min-height: 144px;
  margin-bottom: 12px;
  border: 1.5px dashed var(--card-hover-border);
  border-radius: 8px;
  background: var(--code-bg);
  color: var(--text-secondary);
  padding: 22px;
  text-align: center;
  transition: border-color 0.16s, background 0.16s, transform 0.16s;
}
.drop-zone:hover,
.drop-zone.dragging { border-color: var(--link-color); background: var(--btn-link-bg); }
.drop-zone:active { transform: translateY(1px); }
.drop-zone strong { display: block; color: var(--text); font-size: 1rem; line-height: 1.4; margin-bottom: 5px; }
.drop-zone span { display: block; font-size: 0.82rem; line-height: 1.65; }
.file-input { display: none; }
.workspace {
  border: 1px solid var(--card-border);
  border-radius: 8px;
  background: var(--bg);
  box-shadow: 0 8px 18px var(--card-shadow);
  overflow: hidden;
}
.controls {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
  padding: 10px 12px;
}
.primary-actions,
.settings,
.item-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.settings { justify-content: flex-start; min-width: 0; }
.mode-control {
  display: inline-flex;
  gap: 4px;
  border: 1px solid var(--card-border);
  border-radius: 8px;
  background: var(--card-bg);
  padding: 3px;
}
.mode-control input { position: absolute; opacity: 0; pointer-events: none; }
.mode-control span {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  border-radius: 6px;
  color: var(--text-secondary);
  padding: 5px 10px;
  font-size: 0.82rem;
  line-height: 1.35;
  cursor: pointer;
}
.mode-control input:checked + span {
  background: var(--btn-link-bg);
  color: var(--link-color);
  font-weight: 700;
}
.mode-control input:focus-visible + span { outline: 2px solid var(--link-color); outline-offset: 2px; }
.mode-control-small span {
  min-height: 24px;
  padding: 3px 8px;
  font-size: 0.76rem;
}
.btn {
  border: 1px solid var(--btn-link-border);
  background: var(--btn-link-bg);
  color: var(--text);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 0.82rem;
  line-height: 1.35;
  text-decoration: none;
  transition: border-color 0.16s, background 0.16s, transform 0.16s;
}
.btn:hover { border-color: var(--card-hover-border); background: var(--btn-link-hover-bg); }
.btn:active { transform: translateY(1px); }
.btn:focus-visible { outline: 2px solid var(--link-color); outline-offset: 2px; }
.btn[disabled] { opacity: 0.42; pointer-events: none; }
.btn-primary { border-color: var(--link-color); color: var(--link-color); font-weight: 700; }
.btn-quiet { background: transparent; }
.check-label,
.item-setting {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-height: 34px;
  border: 1px solid var(--card-border);
  border-radius: 8px;
  background: var(--card-bg);
  color: var(--text-secondary);
  padding: 7px 10px 7px 8px;
  font-size: 0.82rem;
  line-height: 1.35;
  cursor: pointer;
  transition: border-color 0.16s, background 0.16s, color 0.16s;
}
.check-label:hover,
.item-setting:hover { border-color: var(--card-hover-border); background: var(--card-hover-bg); color: var(--text); }
.check-label input,
.item-setting input {
  -webkit-appearance: none;
  appearance: none;
  width: 17px;
  height: 17px;
  flex: 0 0 17px;
  display: grid;
  place-items: center;
  border: 1.5px solid var(--card-hover-border);
  border-radius: 4px;
  background: var(--bg);
  transition: background 0.16s, border-color 0.16s;
}
.check-label input::after,
.item-setting input::after {
  content: "✓";
  color: var(--bg);
  font-size: 13px;
  font-weight: 800;
  line-height: 1;
  transform: scale(0);
  transition: transform 0.12s;
}
.check-label input:checked,
.item-setting input:checked { border-color: var(--link-color); background: var(--link-color); }
.check-label input:checked::after,
.item-setting input:checked::after { transform: scale(1); }
.check-label input:focus-visible,
.item-setting input:focus-visible { outline: 2px solid var(--link-color); outline-offset: 2px; }
.status {
  color: var(--text-tertiary);
  font-size: 0.76rem;
  line-height: 1.35;
  text-align: right;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.thumb-section {
  display: grid;
  grid-template-columns: auto auto minmax(0, 1fr);
  gap: 10px;
  align-items: center;
  border-top: 1px solid var(--card-border);
  padding: 8px 12px;
}
.thumb-section[hidden] { display: none; }
.thumb-heading { color: var(--text-secondary); font-size: 0.76rem; white-space: nowrap; }
.thumb-heading strong { color: var(--text); font-weight: 600; }
.preview-browser {
  display: grid;
  grid-column: 1 / -1;
  grid-template-columns: 214px minmax(0, 1fr);
  gap: 12px;
}
.left-preview-pane {
  display: grid;
  align-content: start;
  gap: 8px;
  min-width: 0;
}
.left-preview-head {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.thumb-list {
  display: grid;
  gap: 8px;
  min-width: 0;
  max-height: var(--preview-max-height, 430px);
  overflow-y: auto;
  padding-right: 4px;
}
.thumb-pair {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 96px));
  gap: 8px;
  align-items: center;
  border: 1px solid var(--card-border);
  border-radius: 8px;
  background: transparent;
  padding: 8px;
  cursor: pointer;
}
.thumb-pair:hover,
.thumb-pair.active {
  border-color: var(--link-color);
  background: var(--btn-link-bg);
  box-shadow: 0 0 0 2px var(--btn-link-bg);
}
.thumb-pair:focus-visible { outline: 2px solid var(--link-color); outline-offset: 2px; }
.preview-pane {
  display: grid;
  align-content: start;
  gap: 6px;
  min-width: 0;
}
.preview-pane-head {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  gap: 8px;
  align-items: center;
}
.preview-pane-title {
  color: var(--text-secondary);
  font-size: 0.76rem;
  line-height: 1.35;
}
.preview-canvas-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.thumb {
  aspect-ratio: 1;
  width: 100%;
  background: transparent;
}
.thumb canvas {
  width: 100%;
  height: 100%;
  margin: 0 auto;
  object-fit: contain;
}
.thumb span { display: none; }
.preview-pane canvas {
  display: block;
  max-width: 100%;
  max-height: var(--preview-max-height, 430px);
  width: auto;
  height: auto;
  border: 1px solid var(--card-border);
  border-radius: 8px;
  background: var(--code-bg);
  padding: 8px;
  margin: 0 auto;
}
canvas { display: block; max-width: 100%; max-height: 100%; width: auto; height: auto; }
.footer { display: none; }
@media (max-width: 820px) {
  .controls { grid-template-columns: 1fr; }
  .settings { justify-content: flex-start; }
  .status { text-align: left; }
  .btn { text-align: center; }
  .check-label,
  .item-setting { width: 100%; }
  .thumb-section { grid-template-columns: 1fr; }
  .preview-browser { grid-template-columns: 1fr; }
  .preview-canvas-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="app">
  <a class="back-link" href="../../detail.html?page=tools">← 返回工具目录</a>

  <main class="tool-card">
    <div class="tool-head">
      <h1>截图照片裁边</h1>
    </div>

    <label class="drop-zone" id="dropZone">
      <input class="file-input" id="fileInput" type="file" accept="image/*" multiple>
      <span>
        <strong>点击或拖入图片</strong>
        可一次选择多张，本地处理，不上传到服务器。自动找出中间连续的照片区域，裁掉上下方黑边或白边；小面积按钮、数字、时间戳会被当作界面杂物忽略。
      </span>
    </label>

    <section class="workspace" aria-label="批量处理设置">
      <div class="controls">
        <div class="primary-actions">
          <button class="btn btn-primary" id="downloadAllBtn" type="button" disabled>下载全部</button>
          <button class="btn btn-quiet" id="clearAllBtn" type="button" disabled>清除全部</button>
        </div>
        <div class="settings">
          <div class="mode-control" aria-label="裁剪模式">
            <label><input name="cropMode" type="radio" value="safe" checked><span>谨慎裁剪</span></label>
            <label><input name="cropMode" type="radio" value="bold"><span>大胆裁剪</span></label>
          </div>
        </div>
        <span class="status" id="status" aria-live="polite">等待图片</span>
      </div>
      <div class="thumb-section" id="thumbSection" hidden>
        <div class="thumb-heading"><strong>结果预览</strong></div>
        <span class="status" id="itemCount">共 0 张</span>
        <div class="preview-browser" id="previewBrowser">
          <div class="left-preview-pane">
            <div class="thumb-list" id="thumbList" aria-label="结果组快速预览"></div>
          </div>
          <div class="preview-pane">
            <div class="preview-pane-head">
              <div class="preview-pane-title">右侧预览</div>
              <div class="mode-control mode-control-small" aria-label="当前图片裁剪模式">
                <label><input name="selectedCropMode" type="radio" value="safe"><span>谨慎</span></label>
                <label><input name="selectedCropMode" type="radio" value="bold"><span>大胆</span></label>
              </div>
            </div>
            <div class="preview-canvas-grid" id="selectedPreviewGrid">
              <canvas class="source-preview" id="selectedSourcePreviewCanvas"></canvas>
              <canvas id="selectedPreviewCanvas"></canvas>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer"><span>🐾 通用摸鱼小工具</span></footer>
</div>

<script src="../../guides/shared.js"></script>
<script>
(function() {
  var fileInput = document.getElementById('fileInput');
  var dropZone = document.getElementById('dropZone');
  var cropModeInputs = document.querySelectorAll('input[name="cropMode"]');
  var selectedCropModeInputs = document.querySelectorAll('input[name="selectedCropMode"]');
  var statusText = document.getElementById('status');
  var downloadAllBtn = document.getElementById('downloadAllBtn');
  var clearAllBtn = document.getElementById('clearAllBtn');
  var thumbSection = document.getElementById('thumbSection');
  var itemCount = document.getElementById('itemCount');
  var thumbList = document.getElementById('thumbList');
  var selectedPreviewGrid = document.getElementById('selectedPreviewGrid');
  var selectedSourcePreviewCanvas = document.getElementById('selectedSourcePreviewCanvas');
  var selectedPreviewCanvas = document.getElementById('selectedPreviewCanvas');
  var items = [];

  function setStatus(text) {
    statusText.textContent = text;
  }

  function setHasItems(hasItems) {
    downloadAllBtn.disabled = !hasItems;
    clearAllBtn.disabled = !hasItems;
    thumbSection.hidden = !hasItems;
    itemCount.textContent = '共 ' + items.length + ' 张';
  }

  function updatePreviewHeight() {
    var top = selectedPreviewGrid.getBoundingClientRect().top;
    var height = Math.max(220, window.innerHeight - top - 24);
    document.documentElement.style.setProperty('--preview-max-height', height + 'px');
  }

  function currentGlobalCropMode() {
    var checked = document.querySelector('input[name="cropMode"]:checked');
    return checked ? checked.value : 'safe';
  }

  function selectedItem() {
    return items.find(function(item) { return item.thumbPair.classList.contains('active'); }) || null;
  }

  function updateSelectedCropMode(item) {
    selectedCropModeInputs.forEach(function(input) {
      input.checked = !!item && input.value === item.cropMode;
    });
  }

  function selectItem(item, scroll) {
    items.forEach(function(current) {
      current.thumbPair.classList.toggle('active', current === item);
    });
    updateSelectedCropMode(item);
    drawSelectedPreview(item);
    item.thumbPair.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
    if (scroll) selectedPreviewCanvas.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function drawSelectedPreview(item) {
    selectedSourcePreviewCanvas.width = item.sourceCanvas.width;
    selectedSourcePreviewCanvas.height = item.sourceCanvas.height;
    selectedSourcePreviewCanvas.getContext('2d').drawImage(item.sourceCanvas, 0, 0);
    selectedPreviewCanvas.width = item.resultCanvas.width;
    selectedPreviewCanvas.height = item.resultCanvas.height;
    selectedPreviewCanvas.getContext('2d').drawImage(item.resultCanvas, 0, 0);
    updatePreviewHeight();
  }

  function moveSelection(direction) {
    if (!items.length) return;
    var index = items.findIndex(function(item) { return item.thumbPair.classList.contains('active'); });
    if (index < 0) index = 0;
    index = Math.min(items.length - 1, Math.max(0, index + direction));
    selectItem(items[index], false);
  }

  function loadFiles(fileList) {
    var files = Array.prototype.filter.call(fileList, function(file) {
      return file.type.match(/^image\//);
    });
    files.forEach(loadFile);
    if (files.length) setStatus('正在处理 ' + files.length + ' 张图片');
  }

  function loadFile(file) {
    if (!file || !file.type.match(/^image\//)) return;
    var reader = new FileReader();
    reader.onload = function() {
      var img = new Image();
      img.onload = function() {
        addItem(file, img);
        setStatus('已处理 ' + items.length + ' 张图片');
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

  function rowStats(imageData) {
    var data = imageData.data;
    var width = imageData.width;
    var height = imageData.height;
    var step = Math.max(1, Math.floor(width / 320));
    var stats = new Array(height);
    for (var y = 0; y < height; y++) {
      var background = 0;
      var total = 0;
      for (var x = 0; x < width; x += step) {
        var i = (y * width + x) * 4;
        var r = data[i];
        var g = data[i + 1];
        var b = data[i + 2];
        var max = Math.max(r, g, b);
        var min = Math.min(r, g, b);
        var luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        var nearlyBlack = luma < 24 && max - min < 22;
        var nearlyWhite = luma > 238 && max - min < 22;
        if (nearlyBlack || nearlyWhite) background++;
        total++;
      }
      stats[y] = { background: background / total };
    }
    return stats;
  }

  function smooth(values, radius) {
    var out = new Array(values.length);
    var sum = 0;
    for (var i = 0; i < values.length; i++) {
      sum += values[i];
      if (i > radius * 2) sum -= values[i - radius * 2 - 1];
      out[i] = sum / Math.min(i + 1, radius * 2 + 1);
    }
    return out;
  }

  function backgroundLimit(mode) {
    return mode === 'bold' ? 0.94 : 0.88;
  }

  function findCrop(stats, height, mode) {
    var limit = backgroundLimit(mode);
    var background = stats.map(function(row) { return row.background; });
    var active = smooth(background, 5).map(function(score) { return score <= limit; });
    var best = { start: 0, end: height - 1, len: 0 };
    var start = -1;
    var gap = 0;
    for (var y = 0; y < height; y++) {
      if (active[y]) {
        if (start < 0) start = y;
        gap = 0;
      } else if (start >= 0 && ++gap > 16) {
        var end = y - gap;
        if (end - start > best.len) best = { start: start, end: end, len: end - start };
        start = -1;
        gap = 0;
      }
    }
    if (start >= 0 && height - 1 - start > best.len) best = { start: start, end: height - 1, len: height - 1 - start };
    if (best.len < height * 0.2) return { top: 0, bottom: height };
    while (best.start < best.end && stats[best.start].background > limit) best.start++;
    while (best.end > best.start && stats[best.end].background > limit) best.end--;
    return {
      top: best.start,
      bottom: best.end + 1
    };
  }

  function findSideCrop(imageData, crop, mode) {
    var data = imageData.data;
    var width = imageData.width;
    var height = imageData.height;
    var step = Math.max(1, Math.floor((crop.bottom - crop.top) / 420));
    var limit = backgroundLimit(mode);

    function columnBackground(x) {
      var background = 0;
      var total = 0;
      for (var y = crop.top; y < crop.bottom; y += step) {
        var i = (y * width + x) * 4;
        var r = data[i];
        var g = data[i + 1];
        var b = data[i + 2];
        var max = Math.max(r, g, b);
        var min = Math.min(r, g, b);
        var luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        if ((luma < 24 || luma > 238) && max - min < 22) background++;
        total++;
      }
      return background / total;
    }

    var left = 0;
    var right = width - 1;
    while (left < right && columnBackground(left) > limit) left++;
    while (right > left && columnBackground(right) > limit) right--;
    if (right - left < width * 0.2) return crop;
    crop.left = left;
    crop.right = right + 1;
    return crop;
  }

  function includeConnectedOverlay(imageData, crop, mode) {
    var width = imageData.width;
    var height = imageData.height;
    var data = imageData.data;
    var step = Math.max(1, Math.ceil(width / 320));
    var gridWidth = Math.ceil(width / step);

    function classify(x, y) {
      var i = (Math.min(height - 1, y * step) * width + Math.min(width - 1, x * step)) * 4;
      var r = data[i];
      var g = data[i + 1];
      var b = data[i + 2];
      var max = Math.max(r, g, b);
      var min = Math.min(r, g, b);
      var luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
      return max - min < 24 ? (luma < 30 ? 1 : (luma > 232 ? 2 : 0)) : 0;
    }

    function connectedEdge(seedY, minY, maxY) {
      if (seedY < minY || seedY > maxY) return null;
      var gridHeight = Math.ceil(height / step);
      var startY = Math.max(0, Math.floor(minY / step));
      var endY = Math.min(gridHeight - 1, Math.floor(maxY / step));
      var y = Math.min(endY, Math.max(startY, Math.floor(seedY / step)));
      var counts = [0, 0, 0];
      for (var x = 0; x < gridWidth; x++) counts[classify(x, y)]++;
      var color = counts[1] >= counts[2] ? 1 : 2;
      if (counts[color] < gridWidth * 0.35) return null;

      var visited = new Uint8Array(gridWidth * (endY - startY + 1));
      var queue = [];
      for (x = 0; x < gridWidth; x++) {
        if (classify(x, y) === color) queue.push([x, y]);
      }
      var minFound = y;
      var maxFound = y;
      for (var q = 0; q < queue.length; q++) {
        var point = queue[q];
        x = point[0];
        y = point[1];
        var key = (y - startY) * gridWidth + x;
        if (visited[key] || classify(x, y) !== color) continue;
        visited[key] = 1;
        minFound = Math.min(minFound, y);
        maxFound = Math.max(maxFound, y);
        if (x > 0) queue.push([x - 1, y]);
        if (x + 1 < gridWidth) queue.push([x + 1, y]);
        if (y > startY) queue.push([x, y - 1]);
        if (y < endY) queue.push([x, y + 1]);
      }
      return { min: minFound * step, max: Math.min(height, (maxFound + 1) * step) };
    }

    function bottomOverlayTop(bottom) {
      var sampleStep = Math.max(1, Math.ceil(width / 600));
      var minY = Math.max(crop.top + 1, bottom - Math.min(Math.round(height * 0.12), Math.round(width * 0.22)));
      function backgroundRatio(y) {
        var background = 0;
        var total = 0;
        for (var x = 0; x < width; x += sampleStep) {
          var i = (y * width + x) * 4;
          var r = data[i];
          var g = data[i + 1];
          var b = data[i + 2];
          var max = Math.max(r, g, b);
          var min = Math.min(r, g, b);
          var luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
          if ((luma < 24 || luma > 238) && max - min < 22) background++;
          total++;
        }
        return background / total;
      }
      function hasUiBackgroundBelow(y) {
        var end = Math.min(bottom, y + Math.max(8, Math.round(height * 0.025)));
        var total = 0;
        var rows = 0;
        for (var scanY = y + 2; scanY < end; scanY += 2) {
          total += backgroundRatio(scanY);
          rows++;
        }
        return rows && total / rows > 0.48;
      }
      for (var y = minY; y < bottom; y++) {
        var run = 0;
        for (var x = 0; x < width; x += sampleStep) {
          var current = (y * width + x) * 4;
          var previous = ((y - 1) * width + x) * 4;
          var difference = Math.abs(data[current] - data[previous]) +
            Math.abs(data[current + 1] - data[previous + 1]) +
            Math.abs(data[current + 2] - data[previous + 2]);
          run = difference > 90 ? run + sampleStep : 0;
          if (run >= width * 0.12 && hasUiBackgroundBelow(y)) return y;
        }
      }
      return bottom;
    }

    var reach = Math.round(height * 0.18);
    if (mode === 'bold' && crop.bottom < height) {
      var originalBottom = crop.bottom;
      var bottomOverlay = connectedEdge(crop.bottom, Math.max(0, crop.bottom - reach), height - 1);
      if (bottomOverlay) crop.bottom = Math.min(crop.bottom, bottomOverlay.min);
      if (!bottomOverlay || originalBottom - crop.bottom < width * 0.03) crop.bottom = bottomOverlayTop(originalBottom);
    }
    if (crop.bottom - crop.top < height * 0.2) return findCrop(rowStats(imageData), height, mode);
    return crop;
  }

  function addItem(file, img) {
    var thumbPair = document.createElement('button');
    thumbPair.className = 'thumb-pair';
    thumbPair.type = 'button';
    thumbPair.title = file.name;
    thumbPair.innerHTML =
      '<span class="thumb"><canvas width="180" height="180"></canvas><span></span></span>' +
      '<span class="thumb"><canvas width="180" height="180"></canvas><span></span></span>';
    thumbList.appendChild(thumbPair);

    var item = {
      file: file,
      img: img,
      sourceCanvas: document.createElement('canvas'),
      resultCanvas: document.createElement('canvas'),
      thumbPair: thumbPair,
      sourceThumbCanvas: thumbPair.querySelectorAll('canvas')[0],
      thumbCanvas: thumbPair.querySelectorAll('canvas')[1],
      cropMode: currentGlobalCropMode(),
      url: ''
    };
    thumbPair.addEventListener('click', function() {
      selectItem(item, true);
    });
    items.push(item);
    setHasItems(true);
    if (items.length === 1) selectItem(item, false);
    cropItem(item);
  }

  function drawThumb(canvas, source) {
    var scale = Math.min(180 / source.width, 180 / source.height);
    canvas.width = Math.max(1, Math.round(source.width * scale));
    canvas.height = Math.max(1, Math.round(source.height * scale));
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(source, 0, 0, canvas.width, canvas.height);
  }

  function cropItem(item) {
    var sourceCanvas = item.sourceCanvas;
    var resultCanvas = item.resultCanvas;
    var sourceCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
    var resultCtx = resultCanvas.getContext('2d');
    sourceCanvas.width = item.img.naturalWidth;
    sourceCanvas.height = item.img.naturalHeight;
    sourceCtx.drawImage(item.img, 0, 0);
    drawThumb(item.sourceThumbCanvas, sourceCanvas);
    var imageData = sourceCtx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
    var removeOverlay = true;
    var cropSides = true;
    var mode = item.cropMode || currentGlobalCropMode();
    var crop = findCrop(rowStats(imageData), sourceCanvas.height, mode);
    if (removeOverlay) crop = includeConnectedOverlay(imageData, crop, mode);
    crop.left = 0;
    crop.right = sourceCanvas.width;
    if (cropSides) crop = findSideCrop(imageData, crop, mode);
    var cropHeight = crop.bottom - crop.top;
    var cropWidth = crop.right - crop.left;
    resultCanvas.width = cropWidth;
    resultCanvas.height = cropHeight;
    resultCtx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
    resultCtx.drawImage(sourceCanvas, crop.left, crop.top, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);
    drawThumb(item.thumbCanvas, resultCanvas);
    if (item.thumbPair.classList.contains('active')) drawSelectedPreview(item);
    if (item.url) URL.revokeObjectURL(item.url);
    resultCanvas.toBlob(function(blob) {
      item.url = URL.createObjectURL(blob);
    }, 'image/png');
  }

  function cropAll() {
    var mode = currentGlobalCropMode();
    items.forEach(function(item) {
      item.cropMode = mode;
      cropItem(item);
    });
    updateSelectedCropMode(selectedItem());
    if (items.length) setStatus('已重新处理 ' + items.length + ' 张图片');
  }

  function cropSelected(mode) {
    var item = selectedItem();
    if (!item) return;
    item.cropMode = mode;
    cropItem(item);
    setStatus('已将 ' + item.file.name + ' 切换为' + (mode === 'bold' ? '大胆裁剪' : '谨慎裁剪'));
  }

  function croppedName(name) {
    return name.replace(/\.[^.]+$/, '') + '-cropped.png';
  }

  function downloadItem(item) {
    if (!item.url) return;
    var a = document.createElement('a');
    a.href = item.url;
    a.download = croppedName(item.file.name);
    a.click();
  }

  function clearAll() {
    items.forEach(function(item) {
      if (item.url) URL.revokeObjectURL(item.url);
    });
    items = [];
    thumbList.innerHTML = '';
    selectedSourcePreviewCanvas.width = 0;
    selectedSourcePreviewCanvas.height = 0;
    selectedPreviewCanvas.width = 0;
    selectedPreviewCanvas.height = 0;
    updateSelectedCropMode(null);
    fileInput.value = '';
    setHasItems(false);
    setStatus('等待图片');
  }

  dropZone.addEventListener('dragover', function(event) {
    event.preventDefault();
    dropZone.classList.add('dragging');
  });
  dropZone.addEventListener('dragleave', function() {
    dropZone.classList.remove('dragging');
  });
  dropZone.addEventListener('drop', function(event) {
    event.preventDefault();
    dropZone.classList.remove('dragging');
    loadFiles(event.dataTransfer.files);
  });
  fileInput.addEventListener('change', function() {
    loadFiles(fileInput.files);
  });
  window.addEventListener('resize', updatePreviewHeight);
  cropModeInputs.forEach(function(input) {
    input.addEventListener('change', cropAll);
  });
  selectedCropModeInputs.forEach(function(input) {
    input.addEventListener('change', function() {
      cropSelected(input.value);
    });
  });
  document.addEventListener('keydown', function(event) {
    if (event.target && /^(INPUT|TEXTAREA|SELECT)$/.test(event.target.tagName)) return;
    if (event.key === 'ArrowLeft' || event.key === 'ArrowRight') {
      event.preventDefault();
      moveSelection(event.key === 'ArrowRight' ? 1 : -1);
    }
  });
  clearAllBtn.addEventListener('click', clearAll);
  downloadAllBtn.addEventListener('click', function() {
    items.forEach(function(item, index) {
      setTimeout(function() { downloadItem(item); }, index * 120);
    });
  });
})();
</script>
</body>
</html>
