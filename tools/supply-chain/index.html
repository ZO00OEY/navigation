<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>供应链小工具 - 芝士的摸鱼站</title>
<script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="../../guides/shared.css">
<style>
/* ---- Blob overrides ---- */
.bg-decor { overflow: visible; }
.blob { filter: blur(120px); opacity: 0.45; }
.blob-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(80,100,220,0.5), transparent); top: -200px; left: -150px; }
.blob-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(140,80,200,0.4), transparent); top: 50%; right: -200px; bottom: auto; transform: translateY(-50%); }
.blob-3 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(60,180,160,0.35), transparent); bottom: -150px; left: 30%; top: auto; }
[data-theme="light"] .blob { opacity: 0.35; }
[data-theme="light"] .blob-1 { background: radial-gradient(circle, rgba(251,130,160,0.42), transparent); }
[data-theme="light"] .blob-2 { background: radial-gradient(circle, rgba(220,150,200,0.36), transparent); }
[data-theme="light"] .blob-3 { background: radial-gradient(circle, rgba(255,180,140,0.32), transparent); }

/* ---- Layout ---- */
.app { max-width: 1100px; }

/* ---- Top Row ---- */
.tools-top { margin-bottom: 18px; }
.back-link {
  display: inline-flex; align-items: center; gap: 4px;
  color: var(--text-tertiary); text-decoration: none;
  font-size: 0.82rem; transition: color 0.2s;
}
.back-link:hover { color: var(--link-color); }

/* ---- Shell: sidebar + iframe ---- */
.shell {
  display: flex;
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: var(--radius); overflow: hidden;
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  box-shadow: 0 4px 24px var(--card-shadow);
  min-height: 620px;
}

/* ---- Sidebar ---- */
.shell-sidebar {
  width: 178px; flex-shrink: 0;
  background: var(--card-bg);
  border-right: 1px solid var(--card-border);
  padding: 14px 0; display: flex; flex-direction: column;
}
.sb-label {
  font-size: 0.65rem; font-weight: 600; color: var(--text-tertiary);
  text-transform: uppercase; letter-spacing: 0.06em;
  padding: 8px 16px 4px;
}
.sb-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; border: none; background: none;
  text-align: left; font-size: 0.8rem; color: var(--text-secondary);
  cursor: pointer; font-family: inherit;
  transition: all 0.15s;
  border-left: 2px solid transparent;
  text-decoration: none;
}
.sb-item:hover { background: var(--link-item-hover); color: var(--text); }
.sb-item.active {
  background: var(--link-item-hover); color: var(--link-color);
  font-weight: 600; border-left-color: var(--link-color);
}
.sb-num {
  font-weight: 700; font-size: 0.7rem; min-width: 20px;
  color: var(--text-tertiary); flex-shrink: 0;
}
.sb-item.active .sb-num { color: var(--link-color); }

/* ---- Content iframe ---- */
.shell-content { flex: 1; min-width: 0; }
.shell-content iframe {
  width: 100%; height: 100%; border: none;
  display: block; min-height: 620px;
}

/* ---- Footer ---- */
.footer { text-align: center; margin-top: 32px; }
.footer span { font-size: 0.72rem; color: var(--text-tertiary); opacity: 0.6; }

/* ---- Responsive ---- */
@media (max-width: 700px) {
  .shell { flex-direction: column; }
  .shell-sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 0; border-right: none; border-bottom: 1px solid var(--card-border); }
  .shell-sidebar .sb-label { display: none; }
  .shell-sidebar .sb-item { border-left: none; border-bottom: 2px solid transparent; white-space: nowrap; flex-shrink: 0; padding: 10px 14px; }
  .shell-sidebar .sb-item.active { border-left-color: transparent; border-bottom-color: var(--link-color); }
  .shell-content iframe { min-height: 500px; }
}
</style>
</head>
<body>

<div class="float-wrapper" id="floatWrapper">
  <div class="float-stack open" id="floatStack">
    <div class="bookmark-strip">
      <div class="bookmark-tab" id="floatHandle" title="展开工具栏" aria-label="展开工具栏"></div>
      <div class="bookmark-buttons">
        <button class="theme-toggle" id="themeToggle" title="切换主题" aria-label="切换日夜间模式"></button>
        <a href="../../index.html" class="float-btn" title="返回导航">⌂</a>
        <button class="float-btn" id="backToTop" title="回到顶部">↑</button>
      </div>
    </div>
  </div>
  <div class="float-w"></div>
</div>

<div class="bg-decor"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

<div class="app">
  <div class="tools-top">
    <a class="back-link" href="../../index.html">← 返回导航</a>
  </div>

  <div class="shell">
    <!-- ===== Sidebar ===== -->
    <nav class="shell-sidebar" id="sidebar">
      <button class="sb-item active" data-page="links.html"><span class="sb-num">01</span>常用入口汇总</button>
      <button class="sb-item" data-page="export.html"><span class="sb-num">02</span>数据导出</button>
      <div class="sb-label">采购单</div>
      <button class="sb-item" data-page="purchase-order.html"><span class="sb-num">03</span>生成纵向采购单</button>
    </nav>

    <!-- ===== Content ===== -->
    <div class="shell-content">
      <iframe id="contentFrame" src="links.html"></iframe>
    </div>
  </div>

  <footer class="footer"><span>🌱 供应链小工具</span></footer>
</div>

<script src="../../guides/shared.js"></script>
<script>
/* ---- Tab switching ---- */
(function() {
  var sidebar = document.getElementById('sidebar');
  var frame = document.getElementById('contentFrame');
  var items = sidebar.querySelectorAll('.sb-item');

  sidebar.addEventListener('click', function(e) {
    var item = e.target.closest('.sb-item');
    if (!item) return;
    items.forEach(function(b) { b.classList.remove('active'); });
    item.classList.add('active');
    frame.src = item.getAttribute('data-page');
  });

  /* ---- Theme sync: parent → iframe ---- */
  var html = document.documentElement;
  function syncThemeToFrame() {
    var theme = html.getAttribute('data-theme') || 'dark';
    try {
      frame.contentWindow.postMessage({ type: 'set-theme', theme: theme }, '*');
    } catch(e) {}
  }

  // Sync on theme toggle (observe attribute change)
  var observer = new MutationObserver(function(mutations) {
    mutations.forEach(function(m) {
      if (m.attributeName === 'data-theme') syncThemeToFrame();
    });
  });
  observer.observe(html, { attributes: true });

  // Sync after iframe loads
  frame.addEventListener('load', syncThemeToFrame);
})();

/* ---- Listen for messages from iframe (e.g. navigation requests) ---- */
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'nav') {
    var target = e.data.page;
    var sidebar = document.getElementById('sidebar');
    var frame = document.getElementById('contentFrame');
    var items = sidebar.querySelectorAll('.sb-item');
    items.forEach(function(b) {
      b.classList.toggle('active', b.getAttribute('data-page') === target);
    });
    frame.src = target;
  }
});
</script>
</body>
</html>
